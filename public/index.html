<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1e1b4b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Youth Camp">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon.svg">
<link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<title>My Youth Camp</title>
<style>
:root{
/* palette */
--navy:#1e1b4b;--blue:#4f46e5;--blue2:#818cf8;--purple:#9333ea;--violet:#7c3aed;--teal:#06b6d4;--amber:#f59e0b;--rose:#e11d48;--green:#16a34a;--paper:#f5f4ff;--card:#fff;--ink:#1e1a3a;--muted:#6b7280;--line:#e4e2f5;--chip:#ede9fe;
/* design tokens */
--s1:4px;--s2:8px;--s3:12px;--s4:16px;--s5:24px;--s6:32px;--r-sm:10px;--r:14px;--r-lg:20px;
--shadow-sm:0 4px 12px rgba(30,27,75,.07);--shadow:0 10px 24px rgba(30,27,75,.10);
--ok:#16a34a;--warn:#b45309;--danger:#b91c1c;--info:#4f46e5;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;height:100dvh;}
body{font:15px/1.55 "Plus Jakarta Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--ink);background:#0b0a1a;display:flex;justify-content:center;height:100dvh;overflow:hidden;}
/* height:100dvh on body+app (not 100% of the layout viewport): on mobile the layout
   viewport can be shorter than the visual viewport when the URL bar is hidden, which
   left a strip of dark body background BELOW the bottom nav ("nav not at the bottom").
   Anchoring both to the dynamic viewport makes #tabs sit flush at the bottom. */
.app{width:100%;max-width:460px;height:100dvh;background:var(--paper);display:flex;flex-direction:column;position:relative;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.5);}
.bar{background:linear-gradient(135deg,var(--violet),var(--navy));color:#fff;padding:max(14px,env(safe-area-inset-top)) 14px 6px;display:flex;align-items:center;flex-wrap:wrap;column-gap:7px;row-gap:2px;flex:none;z-index:20;}
.bar .bk{width:34px;height:34px;border-radius:50%;display:none;place-items:center;background:rgba(255,255,255,.12);font-size:1.1rem;flex:none;cursor:pointer;align-self:center;}
.bar.canback .bk{display:grid;}
/* Title + subtitle share one line ("My Church Hub — All churches"); the subtitle
   truncates first, the title stays whole. */
.bar .ttl{flex:1 0 calc(100% - 41px);min-width:0;display:flex;align-items:baseline;gap:6px;overflow:hidden;}
.bar .ttl .t{font-weight:700;font-size:1rem;white-space:nowrap;flex:none;}
.bar .ttl .s{font-size:.72rem;color:#c4b5fd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
.bar .ttl .s:not(:empty)::before{content:"— ";opacity:.7;}
/* Badges/sign-out: smaller and dropped to the bottom of the bar so they don't
   crowd the title's vertical space. */
.bar-actions{display:flex;align-items:center;gap:6px;flex:none;margin-left:auto;}
.mode-badge{font-size:.56rem;font-weight:800;padding:2px 8px;border-radius:999px;white-space:nowrap;flex:none;letter-spacing:.04em;}
.role-badge{font-size:.56rem;font-weight:800;background:rgba(255,255,255,.18);color:#fff;border-radius:999px;padding:2px 8px;white-space:nowrap;flex:none;letter-spacing:.03em;}
.sign-out{padding:3px 10px;border-radius:999px;background:rgba(255,255,255,.15);font-size:.66rem;font-weight:700;flex:none;cursor:pointer;white-space:nowrap;border:1px solid rgba(255,255,255,.2);}
.stage{flex:1;position:relative;overflow:hidden;}
.screen{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 26px;display:none;}
.screen.active{display:block;animation:rise .25s ease;}
@keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.tabs{display:flex;background:#fff;border-top:1px solid var(--line);flex:none;padding:4px 6px calc(4px + env(safe-area-inset-bottom));gap:2px;z-index:20;}
.tab{flex:1;text-align:center;padding:7px 4px 6px;font-size:.72rem;color:var(--muted);cursor:pointer;border:none;background:none;position:relative;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px;border-radius:12px;transition:background .15s,color .15s;}
.tab .ic{display:block;transition:transform .15s;}
.tab.on{color:var(--blue);font-weight:700;background:#ede9fe;}
.tab.on .ic{transform:scale(1.08);}
.tab .tb{position:absolute;top:4px;right:50%;transform:translateX(16px);background:var(--rose);color:#fff;font-size:.6rem;font-weight:800;border-radius:999px;min-width:16px;height:16px;padding:0 4px;display:none;place-items:center;}
.hero{background:radial-gradient(130% 130% at 0% 0%,#9333ea,#1e1b4b 72%);color:#fff;border-radius:22px;padding:18px;margin-bottom:14px;position:relative;overflow:hidden;}
.hero:after{content:"";position:absolute;right:-40px;top:-40px;width:150px;height:150px;background:rgba(255,255,255,.06);border-radius:50%;}
.hero:before{content:"";position:absolute;left:-20px;bottom:-30px;width:100px;height:100px;background:rgba(124,58,237,.3);border-radius:50%;}
.hero .k{font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:#d8b4fe;font-weight:700;}
.hero h2{font-size:1.4rem;margin:5px 0 2px;font-weight:800;}
.hero .cd{display:flex;gap:12px;align-items:flex-end;margin-top:12px;}
.hero .big{font-size:2.8rem;font-weight:800;line-height:.9;}.hero .cd .meta{font-size:.8rem;color:#e9d5ff;padding-bottom:4px;}
.nownext{background:linear-gradient(135deg,#5b21b6,#1e1b4b);color:#fff;border-radius:16px;padding:14px 16px;margin-bottom:12px;}
.nownext .now{font-weight:800;}.nownext .nx{font-size:.82rem;color:#ddd6fe;margin-top:2px;}
.notice{display:flex;gap:10px;align-items:flex-start;background:#f5f3ff;border:1px solid #ddd6fe;border-radius:14px;padding:12px 14px;margin-bottom:12px;cursor:pointer;transition:background .12s;}
.notice:active{background:#ede9fe;}
.notice.urg{background:#fef2f2;border-color:#fecaca;}
.notice .nico{font-size:1rem;line-height:1.35;flex:none;}
.notice .nt{font-weight:700;font-size:.86rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.notice .ns{font-size:.72rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.notice .ndis{flex:none;margin-left:6px;border:none;background:transparent;color:var(--muted);font-size:1.25rem;line-height:1;cursor:pointer;padding:0 2px;}
.notice .ndis:active{color:#111;}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(30,27,75,.06);}
.card.tap{cursor:pointer;transition:transform .12s,box-shadow .12s;}.card.tap:active{transform:scale(.985);box-shadow:none;}
.rowsb{display:flex;justify-content:space-between;align-items:center;gap:10px;}
.lbl{font-size:.72rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:2px 0 9px;}
.h3{font-size:.74rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin:16px 2px 9px;}
h3.sec{font-size:.74rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:18px 2px 9px;}
.bar7{height:9px;border-radius:999px;background:#ede9fe;overflow:hidden;margin:9px 0 8px;}.bar7>i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--violet),var(--blue2));}
.pill{font-size:.66rem;font-weight:700;padding:3px 9px;border-radius:999px;display:inline-block;letter-spacing:.02em;}
.pill.ok{background:#dcfce7;color:#15803d;}.pill.warn{background:#fee2e2;color:#b91c1c;}.pill.amb{background:#fef3c7;color:#92400e;}.pill.info{background:#ede9fe;color:#5b21b6;}
.pills{display:flex;gap:7px;flex-wrap:wrap;}
.tiles{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;margin-bottom:4px;grid-auto-rows:1fr;}
.tile{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px 10px;min-height:92px;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;transition:transform .12s,box-shadow .12s;box-shadow:0 2px 8px rgba(30,27,75,.06);position:relative;}
.tile:active{transform:scale(.95);box-shadow:none;}.tile .ic{font-size:1.65rem;display:block;color:var(--purple);}.tile .l{font-size:.76rem;font-weight:700;margin-top:7px;color:#1e1a3a;}
.tile .sub{max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* SVG icon system (3.1) */
.ic-svg{width:20px;height:20px;display:inline-block;vertical-align:middle;flex:none;stroke:currentColor;}
.tile .ic-svg{width:26px;height:26px;}
.tab .ic-svg{width:21px;height:21px;}
.notice .nico .ic-svg{width:18px;height:18px;}
.search .ic-svg{width:18px;height:18px;color:var(--blue);}
.btn .ic-svg{width:15px;height:15px;margin-right:3px;}
/* Account rows (admin → Accounts): one line per login with icon actions */
.acct-row{display:flex;align-items:center;gap:8px;padding:9px 2px;border-top:1px solid var(--line);}
.acct-row:first-child{border-top:none;}
.acct-actions{display:flex;gap:5px;flex:none;}
.iconbtn{background:#f1f0ff;border:1px solid var(--line);border-radius:9px;width:32px;height:32px;display:grid;place-items:center;cursor:pointer;color:var(--blue);padding:0;}
.iconbtn .ic-svg{width:17px;height:17px;}
.iconbtn:active{background:#e0ddff;}
.iconbtn.danger{color:var(--danger);background:#fef2f2;border-color:#fecaca;}
.acct-legend{display:flex;flex-wrap:wrap;gap:12px;font-size:.72rem;color:var(--muted);background:#f5f3ff;border-radius:10px;padding:9px 11px;margin-bottom:10px;}
.acct-legend span{display:inline-flex;align-items:center;gap:5px;}
.acct-legend .ic-svg{width:15px;height:15px;}
.tile .b{position:absolute;top:7px;right:8px;background:var(--rose);color:#fff;font-size:.58rem;font-weight:800;border-radius:999px;padding:2px 6px;}
.row{display:flex;align-items:center;gap:11px;padding:11px 13px;background:#fff;border:1px solid var(--line);border-radius:14px;margin-bottom:8px;cursor:pointer;transition:background .12s;}
.row:active{background:#f5f3ff;}
.row.checked{background:#f0fdf4;border-color:#bbf7d0;}
.av{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;font-size:.8rem;font-weight:700;color:#5b21b6;background:#ede9fe;flex:none;}
.av.male{background:#dbeafe;color:#1d4ed8;}.av.female{background:#fce7f3;color:#be185d;}
.nm{font-weight:700;font-size:.9rem;color:var(--ink);}.sub{font-size:.73rem;color:var(--muted);}
.chev{color:#c4b5fd;font-size:1.1rem;font-weight:700;}
.search{display:flex;align-items:center;gap:8px;background:#fff;border:2px solid var(--blue);border-radius:14px;padding:11px 13px;margin-bottom:12px;box-shadow:0 0 0 3px rgba(79,70,229,.08);}
.search input{border:none;outline:none;font-size:1rem;flex:1;background:none;font-family:inherit;}
.faq-item{background:#fff;border:1px solid var(--line);border-radius:13px;margin-bottom:8px;overflow:hidden;}
.faq-item .q{padding:13px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-weight:600;font-size:.9rem;gap:10px;}
.faq-item .q .pm{color:var(--blue);font-size:1.2rem;transition:transform .2s;flex:none;}
.faq-item .a{max-height:0;overflow:hidden;transition:max-height .25s ease;font-size:.86rem;color:#475569;padding:0 14px;}
.faq-item.open .a{max-height:360px;padding:0 14px 13px;}.faq-item.open .q .pm{transform:rotate(45deg);}
.findcard{background:#f8fbff;border:1.5px solid #dbe6ff;border-radius:14px;padding:13px;margin-bottom:10px;}
.kv{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed #dbe6ff;font-size:.86rem;gap:10px;}
.kv:last-of-type{border:none;}.kv .k{color:var(--muted);}.kv .v{font-weight:600;text-align:right;}
.kv2{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line);font-size:.9rem;gap:10px;}
.kv2:last-child{border:none;}.kv2 .k{color:var(--muted);}.kv2 .v{font-weight:600;text-align:right;}
.med{background:#fde2e1;color:#b91c1c;border-radius:8px;padding:4px 9px;font-size:.76rem;font-weight:600;display:inline-block;margin:5px 0;}
.seg{display:flex;background:#ede9fe;border-radius:14px;padding:4px;gap:4px;margin-bottom:12px;}
.seg button{flex:1;border:none;background:none;padding:9px 4px;border-radius:10px;font-size:.8rem;font-weight:700;color:var(--muted);cursor:pointer;transition:background .15s,color .15s,box-shadow .15s;font-family:inherit;}
.seg button.on{background:#fff;color:var(--blue);box-shadow:0 2px 8px rgba(79,70,229,.15);}
.filters{display:flex;gap:8px;margin-bottom:11px;}
.filters select{flex:1;font-size:.82rem;padding:8px 10px;}
.ncard{background:#fff;border:1px solid var(--line);border-left:4px solid #c4b5fd;border-radius:14px;padding:12px 14px;margin-bottom:9px;}
.ncard.urgent{border-left-color:var(--rose);}.ncard.zone{border-left-color:var(--teal);}
.ntag{font-size:.62rem;font-weight:800;text-transform:uppercase;padding:2px 9px;border-radius:999px;background:#ede9fe;color:#5b21b6;letter-spacing:.03em;}
.ntime{margin-left:auto;font-size:.7rem;color:#94a3b8;}.ntop{display:flex;gap:7px;align-items:center;margin-bottom:4px;}
.ntitle{font-weight:700;font-size:.92rem;}.nbody{font-size:.84rem;color:#475569;margin-top:2px;}.nfrom{font-size:.72rem;color:#94a3b8;margin-top:5px;}
.noteitem{background:#faf5ff;border:1px solid #e9d5ff;border-radius:12px;padding:10px 12px;margin-bottom:7px;font-size:.86rem;}
.noteitem .meta{font-size:.7rem;color:#94a3b8;margin-top:3px;}
.note-hint{font-size:.74rem;color:var(--muted);text-align:center;margin-top:10px;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px 0;color:var(--muted);gap:12px;}
.spin{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#e2e8f0;flex-shrink:0;}
.sync-dot.pending{background:#fbbf24;animation:pulse 1s infinite;}
.sync-dot.synced{background:#22c55e;}
.sync-dot.error{background:#ef4444;}
.loading .lt{font-size:.78rem;font-weight:600;}
.callbox{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:14px;padding:13px;font-size:.86rem;color:#166534;margin-bottom:10px;}
.warnbox{background:#fffbeb;border:1px solid #fcd34d;border-radius:14px;padding:13px;font-size:.84rem;color:#92400e;margin-bottom:10px;}
.infobox{background:#f5f3ff;border:1px solid #ddd6fe;border-radius:14px;padding:13px;font-size:.84rem;color:#5b21b6;margin-bottom:10px;}
.toast{position:absolute;left:50%;bottom:88px;transform:translateX(-50%) translateY(20px);background:linear-gradient(135deg,#3730a3,#1e1b4b);color:#fff;padding:11px 20px;border-radius:999px;font-size:.86rem;font-weight:700;opacity:0;pointer-events:none;transition:.25s;z-index:40;max-width:90%;text-align:center;box-shadow:0 4px 16px rgba(79,70,229,.35);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.modal{position:absolute;inset:0;background:rgba(14,10,30,.6);display:none;align-items:flex-end;z-index:50;}
.modal.show{display:flex;}
.sheet{background:#fff;width:100%;border-radius:24px 24px 0 0;padding:20px 17px max(20px,env(safe-area-inset-bottom));animation:rise .2s;max-height:88dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.sheet::before{content:"";display:block;width:36px;height:4px;background:#e4e2f5;border-radius:2px;margin:0 auto 14px;}
.sheet h3{font-size:1.08rem;color:var(--navy);margin-bottom:8px;font-weight:800;}
label{display:block;font-size:.74rem;font-weight:700;color:var(--muted);margin:12px 2px 5px;letter-spacing:.04em;text-transform:uppercase;}
.fld,select,textarea{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:11px 13px;font-size:.94rem;font-family:inherit;background:#fff;outline:none;transition:border-color .15s,box-shadow .15s;}
.fld:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,70,229,.1);}
textarea{min-height:84px;resize:vertical;}
.btn{display:block;width:100%;background:linear-gradient(135deg,var(--violet),var(--blue));color:#fff;border:none;border-radius:14px;padding:14px;font-size:.94rem;font-weight:700;text-align:center;cursor:pointer;margin-top:8px;letter-spacing:.01em;}
.btn:active{transform:scale(.98);opacity:.92;}.btn.alt{background:#fff;color:var(--blue);border:1.5px solid var(--blue);background:none;}
.btn.sm{width:auto;padding:8px 13px;margin:0;font-size:.76rem;border-radius:10px;}
.btn.red{background:linear-gradient(135deg,#e11d48,#9f1239);}.btn.ghost{background:#f1f0ff;color:#3730a3;}
.detail-hd{background:linear-gradient(135deg,#9333ea,#1e1b4b);color:#fff;border-radius:22px;padding:20px 18px;margin-bottom:14px;text-align:center;}
.detail-hd .av-lg{width:66px;height:66px;border-radius:50%;background:rgba(255,255,255,.2);display:grid;place-items:center;font-size:1.4rem;font-weight:800;margin:0 auto 10px;}
.detail-hd h2{font-size:1.3rem;}
.snap .bignum{font-size:2.2rem;font-weight:800;line-height:1;color:var(--navy);}
.accbadge{font-size:.7rem;font-weight:800;padding:7px 12px;border-radius:999px;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.accbadge.tent{background:#dcfce7;color:#15803d;}.accbadge.classroom{background:#ede9fe;color:#5b21b6;}.accbadge.mixed{background:#fef3c7;color:#92400e;}
.gbar{display:flex;height:16px;border-radius:999px;overflow:hidden;background:#eef2f8;margin:4px 0 6px;}
.gbar i{display:block;height:100%;}.gbar .m{background:linear-gradient(90deg,#818cf8,#4f46e5);}.gbar .f{background:linear-gradient(90deg,#f472b6,#db2777);}
.glabels{font-size:.76rem;color:var(--muted);font-weight:600;display:flex;justify-content:space-between;}
.gradebars{display:flex;gap:6px;align-items:flex-end;height:92px;padding-top:8px;}
.gcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;justify-content:flex-end;}
.gcol .gbar-col{width:100%;max-width:30px;border-radius:6px 6px 3px 3px;background:linear-gradient(180deg,#c4b5fd,var(--blue));min-height:4px;}
.gcol.empty .gbar-col{background:#e6ecf5;}.gcol .n{font-size:.72rem;font-weight:800;color:var(--navy);}.gcol .g{font-size:.62rem;color:var(--muted);font-weight:700;}
.statband{display:flex;gap:8px;margin-bottom:12px;}
.statband .s{flex:1;background:#fff;border:1px solid var(--line);border-radius:14px;padding:11px 8px;text-align:center;}
.statband .s b{display:block;font-size:1.4rem;color:var(--navy);line-height:1.1;font-weight:800;}.statband .s span{font-size:.64rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
.selrow{display:flex;gap:8px;margin-bottom:12px;}.selrow>div{flex:1;}.selrow label{margin-top:0;}
.lead-tag{font-size:.58rem;font-weight:800;background:#ede9fe;color:#6d28d9;border-radius:6px;padding:1px 6px;margin-left:6px;vertical-align:middle;}
.gradepill{font-size:.6rem;font-weight:800;background:#eef2f8;color:#475569;border-radius:6px;padding:1px 6px;margin-left:6px;vertical-align:middle;}
.err{background:#fde2e1;color:#7f1d1d;border-radius:10px;padding:9px 12px;font-size:.82rem;margin-top:8px;display:none;}
#login{position:absolute;inset:0;background:radial-gradient(140% 100% at 50% 0%,#9333ea 0%,#4f46e5 40%,#0d0a1e 80%);display:flex;flex-direction:column;justify-content:center;padding:28px;z-index:60;}
#login h1{color:#fff;font-size:1.85rem;text-align:center;margin-bottom:5px;letter-spacing:-.03em;font-weight:800;}
#login p{color:#e9d5ff;text-align:center;font-size:.88rem;margin-bottom:22px;font-weight:500;}
#login .card{background:rgba(255,255,255,.97);border-radius:20px;}
.quick{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.quick button{flex:1;min-width:44%;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;border-radius:12px;padding:9px 8px;font-size:.76rem;cursor:pointer;font-weight:600;font-family:inherit;transition:background .12s;}
.quick button:active{background:rgba(255,255,255,.22);}
/* ── At-camp preview banner ── */

   NOTE: the shell markup uses class="app" / id="bar" / id="stage", so the grid targets
   #app (added to the .app div), #bar (the header), and #stage (the content area). An
   earlier markup rebuild left these selectors as #header/#main, which matched nothing,
   so the desktop grid silently never activated (app stayed a 460px phone column). */

<script>
/* ===== API (real backend) ===== */
/* The Express backend returns results bare (no {ok,data} envelope); errors come as
   an HTTP error status with a JSON body {code,message}. 204 = no content. */
/* Resilience (ported from connection-made-simple Phase 3): every request has an
   AbortController TIMEOUT so a hung fetch (cold start / flaky signal / slow DB)
   fails FAST with a recoverable error instead of leaving the UI on an infinite
   loading screen. Imports get a longer window. Concurrent in-flight GETs for the
   same path are COALESCED so the post-login prefetch and a navigation don't
   double-fire. */
const API_TIMEOUT_MS=20000, API_IMPORT_TIMEOUT_MS=90000;
const _inflight=new Map(); // path -> Promise (GET coalescing)
/* ===== DATA CACHE (30s TTL — makes back-navigation instant; ported from
   connection-made-simple). GET results are cached; every write invalidates the
   affected resource prefixes. Pass {noCache:true} to force a fresh read. ===== */
const Cache=(()=>{const store=new Map();const TTL=30000;
  const matches=(sk,k)=>sk===k||sk.startsWith(k+'/')||sk.startsWith(k+'?');
  return{
    get(k){const e=store.get(k);return(e&&Date.now()-e.ts<TTL)?e.data:null;},
    getStale(k){const e=store.get(k);return e?e.data:null;},
    set(k,d){store.set(k,{data:d,ts:Date.now()});},
    del(...keys){for(const k of keys){for(const sk of[...store.keys()]){if(matches(sk,k))store.delete(sk);}}},
    clear(){store.clear();}
  };})();
function _allCached(...paths){return paths.every(p=>Cache.get(p)!==null);}
// Map a write path to the cached resources it makes stale. /home aggregates almost
// everything, so any write drops it.
function _invalidate(path){
  if(path.startsWith('/import')){Cache.clear();return;}
  Cache.del('/home');
  if(path.startsWith('/accounts'))Cache.del('/accounts','/registrants');
  else if(path.startsWith('/settings'))Cache.del('/settings','/schedule','/checkin');
  else if(path.startsWith('/schedule'))Cache.del('/schedule','/checkin');
  else if(path.startsWith('/attendance')||path.startsWith('/checkin'))Cache.del('/checkin');
  else if(path.startsWith('/notifications'))Cache.del('/notifications');
  else if(path.startsWith('/notes'))Cache.del('/notes');
  else if(path.startsWith('/registrants'))Cache.del('/registrants');
  else if(path.startsWith('/accommodation'))Cache.del('/accommodation');
  else Cache.del(path);
}
async function _doFetch(path,opt){
  const isImport=path.indexOf('/import')===0||path.indexOf('/import')===path.length-7;
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),isImport?API_IMPORT_TIMEOUT_MS:API_TIMEOUT_MS);
  let res;
  try{
    res=await fetch(path,{method:opt.method||'GET',signal:ctrl.signal,
      headers:{'Content-Type':'application/json',...(TOKEN?{Authorization:'Bearer '+TOKEN}:{})},
      ...(opt.body!==undefined?{body:JSON.stringify(opt.body)}:{})});
  }catch(e){
    if(e&&e.name==='AbortError')throw new Error('Request timed out — check your connection and try again.');
    throw new Error('Network error — is the server running?');
  }finally{clearTimeout(timer);}
  if(res.status===401&&TOKEN){sessionExpired();throw new Error('Session expired — please sign in again.');}
  if(res.status===204)return null;
  let j=null;try{j=await res.json();}catch(e){j=null;}
  if(!res.ok)throw new Error((j&&(j.message||j.error))||('Request failed ('+res.status+')'));
  return j;
}
async function api(path,opt={}){
  const method=(opt.method||'GET').toUpperCase();
  if(method!=='GET'){
    if(PREVIEW_MODE){toast('Preview mode — sign-in actions are disabled');throw new Error('Preview mode — read only');}
    const r=await _doFetch(path,opt);
    _invalidate(path); // a write invalidates the resources it touched
    return r;
  }
  if(!opt.noCache){const cached=Cache.get(path);if(cached!==null)return cached;}
  if(_inflight.has(path))return _inflight.get(path);
  const p=_doFetch(path,opt)
    .then(d=>{if(!opt.noCache&&d!==null)Cache.set(path,d);return d;})
    .finally(()=>_inflight.delete(path));
  _inflight.set(path,p);
  return p;
}
/* After login, warm the endpoints the first few screens need so navigation is
   instant. Fire-and-forget; failures are ignored (the screen will retry). */
function _prefetch(){
  const common=['/settings','/home','/notifications'];
  const byMode=CAMP_MODE==='at-camp'?['/checkin/sessions']:['/registrants'];
  [...common,...byMode].forEach(p=>api(p).catch(()=>{}));
}
/* ===== STATE ===== */
let TOKEN=null,ACTOR=null,SETTINGS=null,CAMP_MODE='pre-camp',STACK=['home'],PREVIEW_MODE=false;
let SESSIONS=[],SEL_SESSION=null,FILTER={gender:'all',grade:'all',church:'all',zone:'all'};
let LAST_LEADER='';
const GRADES=[7,8,9,10,11,12];

/* ===== UTILS ===== */

key:'<circle cx="7.5" cy="15.5" r="3.5"/><path d="m10 13 9-9 3 3"/><path d="m15.5 7.5 2 2"/>',
trash:'<path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/>'
};

const canReadNotes=()=>ACTOR&&['zoneLeader','director','admin'].includes(ACTOR.role);
/* Notes ON AN INDIVIDUAL PROFILE: church may see notes for its OWN campers (no
   consolidated list — the Notes tab stays zone/director/admin via canReadNotes()).
   Backend GET /notes/camper/:id allows note:write, which church holds + scopes to

let tT;
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('show'),2400);}

function timeFmt(iso){try{return new Date(iso).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});}catch{return iso;}}
function dtFmt(iso){try{return new Date(iso).toLocaleString();}catch{return iso;}}

function sessionExpired(){
  Cache.clear();
  TOKEN=null;ACTOR=null;SESSIONS=[];SEL_SESSION=null;SETTINGS=null;STACK=['home'];
  document.getElementById('bar').style.display='none';
  document.getElementById('stage').style.display='none';
  document.getElementById('tabs').style.display='none';
  closeModal();
  const lg=document.getElementById('login');lg.style.display='flex';
  const err=document.getElementById('loginErr');if(err){err.textContent='Session expired — please sign in again.';err.style.display='block';}
}

/* ===== AUTH ===== */
// Demo quick-login is shown ONLY on local/dev hosts — never in production, where
// advertising valid usernames + the shared demo password would be a security leak.
function _isDemoHost(){const h=location.hostname;return h==='localhost'||h==='127.0.0.1'||h===''||h.endsWith('.local');}
function _initDemoLogin(){
  if(!_isDemoHost())return;
  const box=document.getElementById('demoLogin');if(!box)return;
  const accts=[['victory','Church (Victory)'],['gracepoint','Church (Grace Point)'],['yellowzone','Zone Leader'],['director','Director'],['admin','Admin']];
  box.innerHTML=`<p style="color:#9cc0ff;font-size:.68rem;margin:12px 0 4px;text-align:center;font-weight:700;text-transform:uppercase;letter-spacing:.08em">Quick login · demo</p>
    <div class="quick">${accts.map(([u,l])=>`<button onclick="quick('${u}')">${l}</button>`).join('')}</div>`;
}
function quick(u){document.getElementById('username').value=u;document.getElementById('password').value='demo1234';doLogin();}
async function doLogin(){
  const err=document.getElementById('loginErr');if(err)err.style.display='none';
  try{
    Cache.clear(); // never carry one user's cached data into another's session
    const d=await api('/auth/login',{method:'POST',body:{username:document.getElementById('username').value.trim(),password:document.getElementById('password').value}});
    TOKEN=d.token;ACTOR={...d.user,displayName:((d.user.firstName||'')+' '+(d.user.lastName||'')).trim()};
    SETTINGS=await api('/settings');
    CAMP_MODE=SETTINGS.campMode||'pre-camp';
    localStorage.setItem('ycp_token',TOKEN);localStorage.setItem('ycp_actor',JSON.stringify(ACTOR));
    document.getElementById('login').style.display='none';
    document.getElementById('bar').style.display='flex';
    document.getElementById('stage').style.display='block';
    document.getElementById('tabs').style.display='flex';
    updateModeUI();buildTabs();_prefetch();STACK=['home'];await gotoTab('home');
  }catch(e){if(err){err.textContent=e.message;err.style.display='block';}else toast(e.message);}
}
function logout(){
  // Clear preview state before the POST so the write guard doesn't block the logout call.
  PREVIEW_MODE=false;
  api('/auth/logout',{method:'POST'}).catch(()=>{});
  localStorage.removeItem('ycp_token');localStorage.removeItem('ycp_actor');
  TOKEN=null;ACTOR=null;location.reload();
}
function updateModeUI(){
  const b=document.getElementById('modeBadge'),r=document.getElementById('roleBadge');
  if(PREVIEW_MODE){b.textContent='PREVIEW';b.style.background='#92400e';b.style.color='#fff';}
  else if(CAMP_MODE==='at-camp'){b.textContent='AT CAMP';b.style.background='#16a34a';b.style.color='#fff';}
  else{b.textContent='PRE-CAMP';b.style.background='#9333ea';b.style.color='#fff';}
  if(r&&ACTOR)r.textContent=ACTOR.role==='admin'?'Admin':ACTOR.role==='director'?'Director':ACTOR.role==='zoneLeader'?'Zone·'+ACTOR.zone:'Church';
  const db=document.getElementById('dayBadge');
  if(db){if(CAMP_MODE==='at-camp'){db.style.display='';const day=(SETTINGS&&SETTINGS.campDay)||1;db.innerHTML='DAY '+day+' <span style="opacity:.75">⇄</span>';db.style.background='#4f46e5';db.style.color='#fff';}else db.style.display='none';}
}
/* ===== AT-CAMP PREVIEW ===== */
function enterPreview(){
  if(SETTINGS&&SETTINGS.campMode!=='pre-camp'){toast('Already in at-camp mode');return;}
  PREVIEW_MODE=true;
  CAMP_MODE='at-camp';
  SESSIONS=[];SEL_SESSION=null; // reset so check-in fetches fresh sessions
  document.getElementById('previewBanner').classList.add('show');
  updateModeUI();buildTabs();STACK=['home'];gotoTab('home');
}
function exitPreview(){
  PREVIEW_MODE=false;
  CAMP_MODE=(SETTINGS&&SETTINGS.campMode)||'pre-camp';
  SESSIONS=[];SEL_SESSION=null;
  document.getElementById('previewBanner').classList.remove('show');
  updateModeUI();buildTabs();STACK=['home'];gotoTab('home');
}

/* campDay is client-side only — the backend has no campDay field. Per-device view state. */
function switchDay(){const cur=(SETTINGS&&SETTINGS.campDay)||1;const next=cur===1?2:1;
  if(SETTINGS)SETTINGS.campDay=next;updateModeUI();
  toast(next===1?'Day 1 — First Day Sign In':'Day '+next+' — testimonies open');STACK=['home'];RENDER.home();}

/* ===== ROUTER ===== */
const TAB_OF={home:'home',people:'people',student:'people',help:'help',
  admin:'admin',adminAccounts:'admin',adminFaq:'admin',adminSettings:'admin',adminAccom:'admin',adminData:'admin',
  adminDevos:'admin',adminFaqEdit:'admin',adminSchedEdit:'admin',adminContacts:'admin',
  adminChurchImport:'admin',adminRecords:'admin',adminCloseOut:'admin',adminWizard:'admin',
  checkin:'checkin',search:'search',notifs:'notifs',compose:'notifs',
  data:'data',
  camper:'home',myyouth:'home',firstday:'home',schedule:'schedule',devotional:'home',faq:'home',notes:'home',testimonies:'home',budget:'home',accom:'home',import:'home'};

function _showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el=document.getElementById(id);if(el)el.classList.add('active');
  document.getElementById('bar').classList.toggle('canback',STACK.length>1);
  const tab=TAB_OF[id];
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',!!(tab&&t.dataset.tab===tab)));
}
function _paint(id,html,t,s){
  document.getElementById('barT').textContent=t;
  document.getElementById('barS').textContent=s||'';}
  
/* Navigation core (ported resilience from CMS Phase 5/8):
   - shows the target screen with a SPINNER immediately, so a slow RENDER never
     leaves the UI on a blank/stale screen ("pre-loading screen");
   - issues a nav token so a RENDER that finishes after the user has navigated
     away can bail via _stale() instead of overwriting the new screen
     ("stuck spinner / wrong page" guard). */
let _navToken=0, _navId=null;
function _stale(tok){return tok!==_navToken;}
function _spinner(id,label){
  const el=document.getElementById(id);
  if(el){el.innerHTML='<div class="loading"><div class="spin"></div><div class="lt">'+(label||'Loading…')+'</div></div>';el.scrollTop=0;}
  _showScreen(id);
}
async function _navTo(id,arg){
  const tok=++_navToken; _navId=id;
  // Stale-while-revalidate: if this screen already holds its previous render, show it
  // instantly and let RENDER repaint when (cached, usually instant) data arrives —
  // no spinner flash on revisits. Only first visits (empty screen) get a spinner.
  const el=document.getElementById(id);
  const hasContent=el&&el.innerHTML.trim()!==''&&!el.querySelector('.loading');
  if(hasContent)_showScreen(id);else _spinner(id);
  try{ if(RENDER[id]) await RENDER[id](arg,tok); }
  catch(e){ if(!_stale(tok)) { const el2=document.getElementById(id); if(el2)el2.innerHTML='<p class="note-hint">'+esc(e.message||'Something went wrong')+'</p>'; } }
}
async function go(id,arg){STACK.push(id);await _navTo(id,arg);}

function paint(id,html,t,s){
  // Stale-render guard: if the user has navigated to a DIFFERENT screen while this
  // render was awaiting, don't overwrite it. (id===_navId means this is still the
  // active target — including same-screen re-renders.)
  if(_navId&&_navId!==id&&!STACK.includes(id))return;
  _paint(id,html,t,s);
  const el=document.getElementById(id);
  if(el){el.innerHTML=html;el.scrollTop=0;}
  _showScreen(id);
  _renderWideNav(id);
}

    ];

function _ciLabel(session){
  try{

    const wk=d.toLocaleDateString(undefined,{weekday:'short',timeZone:'UTC'});
    const h=parseInt((session.startTime||'09:00').split(':')[0]);

/* ===== DAILY CHECK-IN ===== */
// Optimistic check-in queue — queued writes drain in order, survive brief offline.
const CHECKIN_QUEUE=[];let _draining=false,_onlineHandlerAdded=false;
let _undoTimer=null,_undoCamperId=null,_undoType=null;
let _lastRoster=null;

function _queueEntry(camperId,type){
  CHECKIN_QUEUE.push({camperId,type,sessionId:SEL_SESSION});
  _updateSyncDots(camperId,'pending');
  if(!_draining)drainQueue();
  if(!_onlineHandlerAdded){window.addEventListener('online',drainQueue);_onlineHandlerAdded=true;}
}
async function drainQueue(){
  if(_draining)return;_draining=true;
  while(CHECKIN_QUEUE.length>0){
    const entry=CHECKIN_QUEUE[0];
    try{
      await api('/checkin',{method:'POST',body:{camperId:entry.camperId,sessionId:entry.sessionId,type:entry.type}});
      CHECKIN_QUEUE.shift();_markSynced(entry.camperId);
    }catch(e){
      if(!navigator.onLine)break; // wait for online event
      CHECKIN_QUEUE.shift();_markSynced(entry.camperId,'error');
    }
  }
  _draining=false;
  await RENDER.checkin();
}
function _updateSyncDots(camperId,state){
  document.querySelectorAll('.sync-dot[data-id="'+camperId+'"]').forEach(el=>{el.className='sync-dot '+state;});
}
function _markSynced(camperId,state='synced'){_updateSyncDots(camperId,state);}
function _optimisticState(camperId,roster,queue){
  const pending=queue.filter(e=>e.camperId===camperId);
  if(!pending.length)return roster.find(r=>r.id===camperId)?.present??false;
  return pending[pending.length-1].type==='in';
}

  function rowHtml(c,isDue){

    </div>
    ${completionBanner}

function _performCheck(camperId,type,name){
  if(type==='out'){confirmCheckOut(camperId,name);return;}
  // Optimistic flip
  _queueEntry(camperId,type);
  // Start undo window
  clearTimeout(_undoTimer);_undoCamperId=camperId;_undoType=type;
  _undoTimer=setTimeout(()=>{_undoCamperId=null;_hideUndoToast();},4000);
  // Immediate local re-render
  RENDER.checkin();
}

    <p class="sub" style="margin:6px 0 14px">This will mark them as not yet in for this session.</p>

function _showUndoToast(){

  if(!el){el=document.createElement('div');el.id='undoToast';el.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;border-radius:10px;padding:10px 18px;display:flex;align-items:center;gap:10px;z-index:9999;font-size:.9rem';document.body.appendChild(el);}

  el.style.display='flex';
}
function _hideUndoToast(){const el=document.getElementById('undoToast');if(el)el.style.display='none';}
function undoCheck(){
  clearTimeout(_undoTimer);
  const id=_undoCamperId,type=_undoType;
  _undoCamperId=null;_undoType=null;_hideUndoToast();
  if(!id)return;
  // Remove from queue if still pending
  const idx=CHECKIN_QUEUE.findIndex(e=>e.camperId===id);
  if(idx>=0){CHECKIN_QUEUE.splice(idx,1);RENDER.checkin();return;}
  // Already sent — send the reverse
  _queueEntry(id,type==='in'?'out':'in');

  window._budgetRegs=regs||[];

  const selHtml=`<div class="filters"><select id="budChurch" onchange="drawBudget()"><option value="all">All ministries</option>${churches.map(c=>`<option value="${esc(c.id)}">${esc(c.name)}</option>`).join('')}</select></div>`;

};
function drawBudget(){

  const scope=sel('budChurch')||'all';
  const campers=(scope==='all'?regs:regs.filter(r=>r.churchId===scope)).filter(r=>r.kind==='camper');
  const withCost=campers.filter(r=>r.registrationCost!=null);
  const noCost=campers.length-withCost.length;
  const total=withCost.reduce((s,r)=>s+(r.registrationCost||0),0);
  // Group by registration type
  const byType={};
  withCost.forEach(r=>{const t=r.registrationType||'Standard';byType[t]=(byType[t]||{count:0,sum:0});byType[t].count++;byType[t].sum+=(r.registrationCost||0);});
  const typeRows=Object.entries(byType).sort((a,b)=>a[0].localeCompare(b[0])).map(([t,v])=>`<div class="card"><div class="rowsb"><div><div style="font-weight:600">${esc(t)}</div><div class="sub">${v.count} ${v.count===1?'camper':'campers'}</div></div><b style="font-size:1.05rem">$${v.sum.toLocaleString()}</b></div></div>`).join('');

    <div class="lbl" style="color:#d8b4fe;margin:0">Fees${scope==='all'?' · all ministries':''}</div>
    <div style="font-size:2rem;font-weight:800">$${total.toLocaleString()}</div>
    <div style="font-size:.8rem;color:#cfe0ff">${withCost.length} campers${noCost?' · '+noCost+' without cost recorded':''}</div></div>`;
  const box=document.getElementById('budgetBody');if(box)box.innerHTML=head+(typeRows?`<h3 class="sec">By registration type</h3>`+typeRows:'');
}

/* ===== ACCOMMODATION ALLOCATIONS (director/admin) =====
   Classroom rooms (capacity) + an allocation map (roomId -> [{key:"churchId|gender", n}]).
   Eligible groups = per church+gender where >=75% of that church's campers are
   classroom-kind; auto-fill places min(group remaining, room remaining); rooms are
   single-gender; un-allocate cascades the freed people into other rooms. Tent City
   below is an auto-distribution view (7 per tent, leaders in separate tents). */
RENDER.accom=async function(){
  if(!['director','admin'].includes(ACTOR.role)){paint('accom','<p class="note-hint" style="margin-top:24px;text-align:center">Accommodation allocations are available to directors only.</p>','Accommodation allocations','');return;}
  const [regs,rooms,alloc]=await Promise.all([api('/registrants'),api('/accommodation/classrooms'),api('/accommodation/allocations')]);
  window._accomRegs=regs||[];window._accomRooms=rooms||[];window._accomAlloc=alloc||{};
  paint('accom','<div id="accomBody"></div>','Accommodation allocations','Classrooms by ministry & gender');
  drawAccom();
};
function accomChurches(regs){
  const by={};
  (regs||[]).filter(r=>r.kind==='camper').forEach(r=>{const c=by[r.churchId]||(by[r.churchId]={id:r.churchId,name:r.churchName,total:0,classroom:0,maleCls:0,femaleCls:0});c.total++;
    if(r.accommodationKind==='classroom'){c.classroom++;if(r.gender==='male')c.maleCls++;else c.femaleCls++;}});
  return by;
}
function accomGroups(regs){
  const by=accomChurches(regs),groups=[];
  Object.values(by).forEach(c=>{const elig=c.total>0&&c.classroom/c.total>=0.75;if(elig){
    if(c.maleCls>0)groups.push({key:c.id+'|male',church:c.name,gender:'male',label:'Guys',n:c.maleCls});
    if(c.femaleCls>0)groups.push({key:c.id+'|female',church:c.name,gender:'female',label:'Girls',n:c.femaleCls});}});
  return groups;
}
async function addAlloc(roomId,key){if(!key)return;const rooms=window._accomRooms||[],a=JSON.parse(JSON.stringify(window._accomAlloc||{}));
  const groups=accomGroups(window._accomRegs||[]),g=groups.find(x=>x.key===key);if(!g)return;
  let allocated=0;Object.values(a).forEach(arr=>(arr||[]).forEach(e=>{if(e.key===key)allocated+=e.n;}));
  const availN=g.n-allocated;if(availN<=0){toast('All of that group is already allocated');return;}
  const room=rooms.find(r=>r.id===roomId);if(!room)return;const entries=a[roomId]||[];const used=entries.reduce((s,e)=>s+e.n,0);const rem=room.capacity-used;
  if(rem<=0){toast('Room is full');return;}
  const rg=entries.length?(groups.find(x=>x.key===entries[0].key)||{}).gender:null;
  if(rg&&rg!==g.gender){toast('That room is '+(rg==='male'?'Guys':'Girls')+' only');return;}
  const place=Math.min(availN,rem);
  a[roomId]=a[roomId]||[];const ex=a[roomId].find(e=>e.key===key);if(ex)ex.n+=place;else a[roomId].push({key,n:place});
  try{await api('/accommodation/allocations',{method:'PATCH',body:{allocations:a}});window._accomAlloc=await api('/accommodation/allocations');drawAccom();if(place<availN)toast(place+' placed · '+(availN-place)+' still to allocate elsewhere');}catch(e){toast(e.message);}}
async function removeAlloc(roomId,key){const rooms=window._accomRooms||[];const a=JSON.parse(JSON.stringify(window._accomAlloc||{}));
  const entry=(a[roomId]||[]).find(e=>e.key===key);if(!entry)return;
  let freed=entry.n;a[roomId]=(a[roomId]||[]).filter(e=>e.key!==key);
  for(const rm of rooms){if(rm.id===roomId)continue;const arr=a[rm.id];if(!arr)continue;const ex=arr.find(e=>e.key===key);if(!ex)continue;const used=arr.reduce((s,e)=>s+e.n,0);const rem=rm.capacity-used;if(rem>0&&freed>0){const add=Math.min(rem,freed);ex.n+=add;freed-=add;}}
  try{await api('/accommodation/allocations',{method:'PATCH',body:{allocations:a}});window._accomAlloc=await api('/accommodation/allocations');drawAccom();}catch(e){toast(e.message);}}
function tentDist(regs){const by={};(regs||[]).filter(r=>r.accommodationKind==='tent').forEach(r=>{const c=by[r.churchId]||(by[r.churchId]={name:r.churchName,m:{stu:0,ld:0},f:{stu:0,ld:0}});const g=r.gender==='male'?c.m:c.f;if(r.kind==='leader')g.ld++;else g.stu++;});return by;}
function drawAccom(){
  const regs=window._accomRegs||[],rooms=window._accomRooms||[],alloc=window._accomAlloc||{};
  const groups=accomGroups(regs);
  const gByKey=Object.fromEntries(groups.map(g=>[g.key,g]));
  const allocByKey={};Object.values(alloc).forEach(arr=>(arr||[]).forEach(e=>{allocByKey[e.key]=(allocByKey[e.key]||0)+e.n;}));
  groups.forEach(g=>g.avail=g.n-(allocByKey[g.key]||0));
  const availGroups=groups.filter(g=>g.avail>0);
  const roomCards=rooms.length?rooms.map(rm=>{
    const entries=(alloc[rm.id]||[]).filter(e=>gByKey[e.key]);
    const used=entries.reduce((s,e)=>s+e.n,0);const rem=rm.capacity-used;
    const roomGender=entries.length?gByKey[entries[0].key].gender:null;
    const addable=roomGender?availGroups.filter(g=>g.gender===roomGender):availGroups;
    const chips=entries.map(e=>{const g=gByKey[e.key];return `<div class="rowsb" style="align-items:center;background:#fff;border:1px solid var(--line);border-radius:8px;padding:6px 10px;margin-top:6px"><span style="font-size:.85rem">${esc(g.church)} — ${g.label} (${e.n})</span><button class="btn ghost sm" onclick="removeAlloc('${rm.id}','${e.key}')">Remove</button></div>`;}).join('');
    const addSel=(rem>0&&addable.length)?`<select onchange="addAlloc('${rm.id}',this.value);this.value=''" style="width:100%;margin-top:8px"><option value="">＋ Add ministry…</option>${addable.map(g=>`<option value="${g.key}">${esc(g.church)} — ${g.label} (${g.avail} left)</option>`).join('')}</select>`:(rem<=0?`<div class="sub" style="margin-top:8px">Room full.</div>`:`<div class="sub" style="margin-top:8px">${roomGender?'No more '+(roomGender==='male'?'Guys':'Girls')+' groups to add.':'All eligible groups are allocated.'}</div>`);
    const tone=used?'ok':'info';const lbl=used+'/'+rm.capacity;
    return `<div class="card"><div class="rowsb"><div style="font-weight:600">⌂ ${esc(rm.name)} <span class="sub">· cap ${rm.capacity}</span></div><span class="pill ${tone}">${lbl}</span></div>${chips}${addSel}</div>`;
  }).join(''):'<p class="note-hint">No classroom rooms yet — add them in Admin → Accommodation.</p>';
  const out=[];
  const by=accomChurches(regs);
  Object.values(by).forEach(c=>{const elig=c.total>0&&c.classroom/c.total>=0.75;
    if(!elig&&c.classroom>0)out.push([c.name,'Classroom',c.classroom,'Under 75% — not allocated']);});
  availGroups.forEach(g=>out.push([g.church,g.label,g.avail,g.avail<g.n?(g.avail+' of '+g.n+' to allocate'):'Awaiting a room']));
  const table=out.length?`<table style="width:100%;border-collapse:collapse;font-size:.82rem">
    <tr style="text-align:left;color:var(--muted)"><th style="padding:6px 4px">Ministry</th><th>Group</th><th>#</th><th>Status</th></tr>
    ${out.map(r=>`<tr style="border-top:1px solid var(--line)"><td style="padding:6px 4px">${esc(r[0])}</td><td>${esc(r[1])}</td><td>${r[2]}</td><td><span class="sub">${esc(r[3])}</span></td></tr>`).join('')}
  </table>`:'<p class="note-hint">Everyone is allocated ✓</p>';
  const td=tentDist(regs);
  const tentTable=(gk,label)=>{const rows=Object.values(td).filter(c=>c[gk].stu+c[gk].ld>0).map(c=>{const g=c[gk];const st=Math.ceil(g.stu/7),lt=Math.ceil(g.ld/7);return `<tr style="border-top:1px solid var(--line)"><td style="padding:6px 4px">${esc(c.name)}</td><td style="text-align:center">${g.stu}</td><td style="text-align:center">${g.ld}</td><td style="text-align:center">${st}</td><td style="text-align:center">${lt}</td></tr>`;}).join('');
    if(!rows)return '';
    return `<h3 class="sec">Tent City — ${label}</h3><table style="width:100%;border-collapse:collapse;font-size:.8rem"><tr style="text-align:left;color:var(--muted)"><th style="padding:6px 4px">Ministry</th><th style="text-align:center">Students</th><th style="text-align:center">Leaders</th><th style="text-align:center">Student tents</th><th style="text-align:center">Leader tents</th></tr>${rows}</table>`;};
  const tentHtml=tentTable('m','Male')+tentTable('f','Female');
  const box=document.getElementById('accomBody');if(!box)return;
  box.innerHTML=`<h3 class="sec" style="margin-top:2px">Classroom rooms</h3>${roomCards}
    <h3 class="sec">Not in a classroom allocation</h3>${table}
    ${tentHtml||'<p class="note-hint" style="margin-top:14px">Tent City auto-distribution appears once registrants have a tent accommodation kind set.</p>'}`;
}

    <label>Priority</label><div class="seg" id="priSeg"><button class="on" data-pri="normal" onclick="setPri(this)">◈ Normal</button><button data-pri="urgent" onclick="setPri(this)">⚠︎ Urgent</button></div>

function setAud(b){document.querySelectorAll('#audSeg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');window._aud=b.dataset.aud;const z=document.getElementById('zoneWrap');if(z)z.style.display=window._aud==='zone'?'block':'none';}

async function sendNotif(){const title=document.getElementById('ntitle').value.trim(),body=document.getElementById('nbody').value.trim();

RENDER.firstday=async function(){

  const [camperPage,regList]=await Promise.all([api('/campers?pageSize=300'),api('/registrants')]);

  window._fdAll=[...registrants,...campers];
  window._fdPending=new Set();
  window._fdGender='all';window._fdGrade='all';
  fdDraw();
};
function fdDraw(){
  const students=window._fdAll||[];
  const notIn=students.filter(c=>!c.atCamp);
  const alreadyIn=students.filter(c=>c.atCamp);
  const gen=window._fdGender||'all';
  const gr=window._fdGrade||'all';
  const visible=notIn.filter(c=>(gen==='all'||c.gender===gen)&&(gr==='all'||String(c.grade)===gr));
  const pending=window._fdPending||(window._fdPending=new Set());
  const gradeOpts=['all',...GRADES].map(g=>`<option value="${g}" ${String(g)===gr?'selected':''}>${g==='all'?'All grades':'Yr '+g}</option>`).join('');
  function fdRow(c,done){
    const av=`<div class="av ${esc(c.gender)}">${initials(c.firstName+' '+c.lastName)}</div>`;
    const info=`<div style="flex:1;min-width:0"><div class="nm">${esc(c.firstName+' '+c.lastName)}<span class="gradepill">Yr ${c.grade||'—'}</span></div><div class="sub">${esc(c.churchName)}</div></div>`;
    if(done){
      return `<div class="row" style="opacity:.45;cursor:default">${av}${info}<span class="pill ok">✓ In</span></div>`;
    }
    const sel=pending.has(c.id);
    return `<div class="row ${sel?'checked':''}" style="cursor:pointer" onclick="fdToggle('${c.id}',this)" data-id="${c.id}">
      ${av}${info}
      <div style="width:26px;height:26px;border-radius:50%;border:2px solid ${sel?'#16a34a':'#c2cdda'};background:${sel?'#16a34a':'transparent'};display:grid;place-items:center;flex:none;transition:.15s">
        ${sel?'<span style="color:#fff;font-size:.9rem;line-height:1">✓</span>':''}
      </div></div>`;
  }
  const pendingCount=pending.size;
  let html=`
    <div class="filters" style="margin-bottom:10px">
      <select onchange="window._fdGender=this.value;fdDraw()">
        <option value="all" ${gen==='all'?'selected':''}>All genders</option>
        <option value="male" ${gen==='male'?'selected':''}>Guys</option>
        <option value="female" ${gen==='female'?'selected':''}>Girls</option>
      </select>
      <select onchange="window._fdGrade=this.value;fdDraw()">${gradeOpts}</select>
    </div>
    ${visible.length?visible.map(c=>fdRow(c,false)).join(''):'<p class="note-hint">No students match these filters.</p>'}
    ${notIn.length===0?'<div class="callbox">All students in your group are signed in ✓</div>':''}
    ${alreadyIn.length?`<h3 class="sec" style="margin-top:16px">Already signed in (${alreadyIn.length})</h3>`+alreadyIn.map(c=>fdRow(c,true)).join(''):''}
    <div id="fdConfirmBar" style="display:${pendingCount>0?'block':'none'};position:sticky;bottom:10px;margin-top:16px">
      <button class="btn" style="background:#16a34a" onclick="fdConfirmAll()">Confirm ${pendingCount} sign-in${pendingCount===1?'':'s'}</button>
    </div>`;
  const el=document.getElementById('firstday');
  if(el)el.innerHTML=html;
  document.getElementById('barT').textContent='First Day Sign In';
  document.getElementById('barS').textContent=(notIn.length-pendingCount)+' remaining';
}
function fdToggle(id,rowEl){
  const pending=window._fdPending||(window._fdPending=new Set());
  if(pending.has(id))pending.delete(id);else pending.add(id);
  fdDraw();
}
async function fdConfirmAll(){
  const pending=[...(window._fdPending||new Set())];
  if(!pending.length)return;
  const btn=document.querySelector('#fdConfirmBar button');
  if(btn){btn.textContent='Signing in…';btn.disabled=true;}
  let ok=0,fail=0;
  await Promise.all(pending.map(id=>
    api('/attendance/sign-in',{method:'POST',body:{camperId:id,leaderName:ACTOR.displayName}})
      .then(()=>{
        const c=window._fdAll.find(s=>s.id===id);
        if(c)c.atCamp=true;
        window._fdPending.delete(id);
        ok++;
      })
      .catch(()=>fail++)
  ));
  if(fail)toast(fail+' failed — please retry');
  else toast(ok+' student'+(ok===1?'':'s')+' signed in ✓');
  fdDraw();
}

function filterMyYouth(){
  const zone=sel('myZoneF')||'all',gen=sel('myGenderF')||'all',gr=sel('myGradeF')||'all';
  const all=(window._myYouthAll||[]).filter(c=>(zone==='all'||c.zone===zone)&&(gen==='all'||c.gender===gen)&&(gr==='all'||String(c.grade)===gr));
  const notArrived=all.filter(c=>c.kind==='student'&&!c.atCamp&&(!c.signOutHistory||c.signOutHistory.length===0));
  const signedOut=all.filter(c=>!c.atCamp&&c.signOutHistory&&c.signOutHistory.length>0);
  const atCamp=all.filter(c=>c.atCamp);
  const el=document.getElementById('myYouthList');if(!el)return;
  function myRow(c){
    const lead=c.kind==='leader';
    const badge=lead?` <span class="lead-tag">LEADER</span>`:'';
    const sub=`${esc(c.zone)} Zone · ${esc(c.churchName)} · ${lead?'Leader':'Yr '+c.grade}`;
    return `<div class="row" onclick="openCamper('${c.id}')"><div class="av ${esc(c.gender)}">${initials(c.firstName+' '+c.lastName)}</div>
      <div style="flex:1;min-width:0"><div class="nm">${esc(c.firstName+' '+c.lastName)}${badge}</div>
      <div class="sub">${sub}</div></div><span class="chev">›</span></div>`;
  }
  let html='';
  if(atCamp.length){
    html+=`<h3 class="sec" style="margin-top:4px">At camp (${atCamp.length})</h3>`;
    html+=atCamp.map(myRow).join('');
  }
  if(signedOut.length){
    html+=`<h3 class="sec">Signed out of camp (${signedOut.length})</h3>`;
    html+=signedOut.map(myRow).join('');
  }
  if(notArrived.length){
    html+=`<h3 class="sec">Late arrivals (${notArrived.length})</h3>`;
    html+=`<div class="infobox" style="font-size:.8rem;margin-bottom:8px">First Day Sign In is closed. Sign in late arrivals here — tap a name, then “Sign in to camp”. A note is logged automatically.</div>`;
    html+=notArrived.map(myRow).join('');
  }
  if(!html)html='<p class="note-hint" style="margin-top:24px;text-align:center">No students match these filters.</p>';
  el.innerHTML=html;
}

  const fullName=p.fullName||p.firstName+' '+p.lastName;

    </div>
    ${camp}

      <div class="kv"><span class="k">Name</span><span class="v">${esc(p.parentGuardianName||'—')}${p.parentRelation?' ('+esc(p.parentRelation)+')':''}</span></div>

function drawNotes(){

    if(!resp.ok){const e=await resp.json().catch(()=>({}));toast(e.message||'Export failed');return;}
    const blob=await resp.blob();
    const url=URL.createObjectURL(blob);const a=document.createElement('a');
    a.href=url;a.download='camp-audit-export.xlsx';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
    toast('Audit workbook downloaded ✓');
  }catch(e){toast(e.message||'Export failed');}
}
async function downloadCsvExport(path,filename){

    toast('Downloaded ✓');

// Pure date helpers (UTC-anchored to match dayLong/timeFmt). YYYY-MM-DD in/out.
function _addDays(dateStr,n){const d=new Date(dateStr+'T12:00:00Z');if(isNaN(d))return'';d.setUTCDate(d.getUTCDate()+n);return d.toISOString().slice(0,10);}
function _datesBetween(start,end){const out=[];if(!start)return out;const s=new Date(start+'T12:00:00Z');let e=end?new Date(end+'T12:00:00Z'):s;if(isNaN(s)||isNaN(e)||e<s)return start&&!isNaN(s)?[start]:[];let cur=new Date(s);let guard=0;while(cur<=e&&guard++<60){out.push(cur.toISOString().slice(0,10));cur.setUTCDate(cur.getUTCDate()+1);}return out;}

function dataFilters(){
  return {
    churchId:document.getElementById('dfCh')?.value||'',
    gender:document.getElementById('dfGen')?.value||'',
    grade:document.getElementById('dfGr')?.value||'',
  };
}
function dataApply(){
  const f=dataFilters();const rows=(_dataCache||[]).filter(r=>{
    if(f.churchId&&r.churchId!==f.churchId)return false;
    if(f.gender&&r.gender!==f.gender)return false;
    if(f.grade==='leader'){if(r.kind!=='leader')return false;}
    else if(f.grade){if(r.kind==='leader'||String(r.grade??'')!==f.grade)return false;}
    return true;
  });
  const hdr=['Name','Church','Gender','Grade','Reg type','Cost','Discount code','Mobile','Medical','Dietary','Other','Blue card'];
  const td=v=>`<td style="border-bottom:1px solid var(--line);padding:5px 8px;white-space:nowrap;max-width:220px;overflow:hidden;text-overflow:ellipsis">${esc(v||'—')}</td>`;
  const body=rows.map(r=>{
    const grade=r.kind==='leader'?'Leader':(r.grade??'—');
    const cost=r.registrationCost!=null?'$'+r.registrationCost.toLocaleString():'—';
    return `<tr>${td(r.lastName+', '+r.firstName)}${td(r.churchName)}${td(r.gender)}${td(grade)}${td(r.registrationType)}${td(cost)}${td(r.discountCode)}${td(r.mobile)}${td((r.medicalConditions||[]).join(', '))}${td((r.dietaryRequirements||[]).join(', '))}${td(r.otherMedications)}${td(r.blueCardNumber)}</tr>`;
  }).join('');
  const t=document.getElementById('dataTbl');
  if(t)t.innerHTML=`<thead><tr>${hdr.map(h=>`<th style="text-align:left;border-bottom:2px solid var(--line);padding:6px 8px;color:var(--muted)">${h}</th>`).join('')}</tr></thead><tbody>${body||'<tr><td colspan="12" style="padding:10px;color:var(--muted)">No matching registrants</td></tr>'}</tbody>`;
  const c=document.getElementById('dataCount');if(c)c.textContent=`${rows.length} of ${(_dataCache||[]).length} registrants`;
}
async function dataExport(filtered){
  try{
    let qs='';
    if(filtered){const f=dataFilters();const params=new URLSearchParams();
      if(f.churchId)params.set('churchId',f.churchId);
      if(f.gender)params.set('gender',f.gender);
      if(f.grade==='leader')params.set('kind','leader');
      else if(f.grade)params.set('grade',f.grade);
      const s=params.toString();if(s)qs='?'+s;}
    const csv=await api('/export/registrants'+qs);
    if(!csv||typeof csv!=='string'){toast('Nothing to export');return;}
    const url=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
    const a=document.createElement('a');a.href=url;
    a.download='camp-registrations-'+new Date().toISOString().slice(0,10)+'.csv';
    document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
  }catch(e){toast(e.message);}
}

  let phantomHtml='';
  if(phantoms.length){
    const autoUser=n=>n.toLowerCase().replace(/[^a-z0-9]/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'').slice(0,30)||'church';
    const rows=phantoms.map((n,i)=>`<div style="border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:8px">

        <div style="flex:2;min-width:140px"><label style="font-size:.7rem">Username</label><input class="fld" id="pzUser_${i}" value="${esc(autoUser(n))}" autocapitalize="none" autocorrect="off" spellcheck="false"></div>
        <div style="flex:2;min-width:140px"><label style="font-size:.7rem">Password (min 6)</label><input class="fld" id="pzPass_${i}" placeholder="min 6 chars"></div>
      </div></div>`).join('');
    const btnLabel=`Create ${phantoms.length} church${phantoms.length===1?'':'es'} →`;
    phantomHtml=`<div class="warnbox">⚠ ${phantoms.length} unrecognised church${phantoms.length===1?'':'es'} in the CSV — set zone, username &amp; password to create them first:</div>
      ${rows}
      <button class="btn" style="margin-top:6px" onclick="_createPhantomChurches(${esc(JSON.stringify(phantoms))})">${btnLabel}</button>
      <button class="btn ghost" style="margin-top:6px;margin-left:6px" onclick="_clearImport()">Cancel</button>`;
  }
  const confirmHtml=_pendingImportCsv&&!phantoms.length?`<button class="btn" style="margin-top:8px" onclick="_confirmImport()">Confirm &amp; import</button> <button class="btn ghost" style="margin-top:8px;margin-left:6px" onclick="_clearImport()">Cancel</button>`:'';
  box.innerHTML=`<div class="infobox"><b>Preview (dry-run):</b> ${r.created} to add \xb7 ${r.updated} to update \xb7 ${r.skipped} to skip \xb7 ${(r.errors||[]).length} errors</div>
    ${phantomHtml}${errHtml}${confirmHtml}`;
}
async function _createPhantomChurches(names){
  const btn=event.currentTarget||event.target;
  const origLabel=btn?btn.textContent:'';
  if(btn){btn.disabled=true;btn.textContent='Creating…';}
  const autoUser=n=>n.toLowerCase().replace(/[^a-z0-9]/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'').slice(0,30)||'church';
  for(let i=0;i<names.length;i++){
    const name=names[i];
    const zone=sel('pzZone_'+i)||'Yellow';
    const username=(document.getElementById('pzUser_'+i)?.value||'').trim()||autoUser(name);
    const pass=(document.getElementById('pzPass_'+i)?.value||'').trim();
    if(pass.length<6){toast('Password for "'+name+'" must be 6+ chars');if(btn){btn.disabled=false;btn.textContent=origLabel;}return;}
    if(!/^[A-Za-z0-9._-]{2,40}$/.test(username)){toast('Username for "'+name+'" is invalid — use letters, numbers, . _ - only (min 2 chars)');if(btn){btn.disabled=false;btn.textContent=origLabel;}return;}
    try{await api('/accounts/churches',{method:'POST',body:{churchName:name,zone,accountFirstName:name,accountLastName:'Team',accountUsername:username,accountPassword:pass}});}
    catch(e){toast('Failed to create "'+name+'": '+(e.message||'error'));if(btn){btn.disabled=false;btn.textContent='Retry';}return;}
  }
  toast(names.length+' church'+(names.length===1?'':'es')+' created ✓');
  try{const r=await api('/import/csv',{method:'POST',body:{csvData:_pendingImportCsv,updateExisting:true,dryRun:true}});_renderImportPreview(r);}catch(e){toast(e.message);}
}

    _pendingImportCsv=null;

}

  +`<input class="fld" id="sr_n_${d}_${r}" placeholder="Activity" value="${esc(n||'')}"></div>`;}
const SCHED_MIN_ROWS=10;
RENDER.adminSchedEdit=async function(){
  const days=SETTINGS?.checkInDays||[];
  if(!days.length){paint('adminSchedEdit','<p class="note-hint">Set the camp dates first (Camp settings).</p>','Schedule','');return;}
  const blocks=await Promise.all(days.map(async d=>{
    const items=(await api('/schedule?day='+d).catch(()=>[])).slice()
      .sort((a,b)=>String(a.startTime||'').localeCompare(String(b.startTime||'')));
    const n=Math.max(SCHED_MIN_ROWS,items.length);
    let rows='';for(let r=0;r<n;r++){const it=items[r]||{};rows+=_schedRow(d,r,it.startTime,it.title);}
    return `<div class="card"><div class="h3" style="margin-top:0">${dayLong(d)} <span style="color:var(--muted);font-weight:600">· ${d}</span></div>
      <div style="display:grid;grid-template-columns:92px 1fr;gap:6px;font-size:.6rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px"><span>Time</span><span>Activity</span></div>
      <div id="schedRows_${d}">${rows}</div>
      <div style="display:flex;gap:6px;margin-top:8px">
        <button class="btn ghost sm" style="flex:1" onclick="addSchedRow('${d}')">+ Add row</button>
        <button class="btn sm" style="flex:1" onclick="saveSchedDay('${d}')">Save ${dayLong(d)}</button></div></div>`;
  }));
  paint('adminSchedEdit',blocks.join(''),'Schedule','Fill a day, then Save');
};
function addSchedRow(d){const wrap=document.getElementById('schedRows_'+d);if(!wrap)return;
  wrap.insertAdjacentHTML('beforeend',_schedRow(d,wrap.children.length,'',''));}
// Table is the source of truth: saving replaces the whole day's schedule with the
// filled rows (time + title both present). Cleared rows are dropped.
async function saveSchedDay(d){
  const wrap=document.getElementById('schedRows_'+d);if(!wrap)return;
  const entries=[];
  for(let r=0;r<wrap.children.length;r++){const t=val('sr_t_'+d+'_'+r),n=val('sr_n_'+d+'_'+r);if(t&&n)entries.push({startTime:t,title:n});}
  try{
    const existing=await api('/schedule?day='+d,{noCache:true}).catch(()=>[]);
    for(const it of (existing||[])){await api('/schedule/'+it.id,{method:'DELETE'});}
    for(const e of entries){await api('/schedule',{method:'POST',body:{day:d,startTime:e.startTime,title:e.title,type:'activity'}});}
    toast('Saved '+dayLong(d)+' ✓');await _rSched();
  }catch(e){toast(e.message);await _rSched();}
}

/* ===== ADMIN CONTACTS ===== */
RENDER.adminContacts=async function(){
  const churches=await api('/accounts/churches');
  const card=c=>{const ct=c.contacts||{};
    const mp=ct.male?.primary||{},mb=ct.male?.backup||{},fp=ct.female?.primary||{},fb=ct.female?.backup||{};
    const filled=[mp,mb,fp,fb].filter(x=>x&&x.name&&String(x.name).trim()).length;
    const pill=filled===4?'ok':filled?'amb':'info';
    const pair=(lbl,n,p,nv,pv)=>`<label>${lbl}</label><div style="display:flex;gap:6px"><input class="fld" id="${n}" placeholder="Name" value="${esc(nv||'')}"><input class="fld" id="${p}" placeholder="Phone" value="${esc(pv||'')}"></div>`;
    return `<div class="card" style="padding:0;overflow:hidden">
      <div class="rowsb" style="padding:13px 14px;cursor:pointer" onclick="toggleContactCard('${c.id}')">
        <div style="min-width:0"><div style="font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(c.name)}</div><div class="sub" style="font-size:.74rem">${esc(c.zone||'—')}</div></div>
        <div style="display:flex;align-items:center;gap:8px;flex:none">
          <span class="pill ${pill}">${filled}/4 Contacts</span>
          <span id="contactChev_${c.id}" style="display:inline-flex;transition:transform .15s;color:var(--muted)">${ic('chevron')}</span>
        </div>
      </div>
      <div id="contactBody_${c.id}" style="display:none;padding:0 14px 14px;border-top:1px solid var(--line)">
        ${pair('Guys — primary leader','mp_n_'+c.id,'mp_p_'+c.id,mp.name,mp.phone)}
        ${pair('Guys — secondary leader','mb_n_'+c.id,'mb_p_'+c.id,mb.name,mb.phone)}
        ${pair('Girls — primary leader','fp_n_'+c.id,'fp_p_'+c.id,fp.name,fp.phone)}
        ${pair('Girls — secondary leader','fb_n_'+c.id,'fb_p_'+c.id,fb.name,fb.phone)}
        <button class="btn" style="margin-top:10px" onclick="saveContacts('${c.id}')">Save ${esc(c.name)}</button>
        <p class="note-hint">Leave blank to clear. Numbers are masked until audited reveal.</p>
      </div></div>`;};
  paint('adminContacts',churches.map(card).join('')||'<p class="note-hint">No churches yet.</p>','Ministry contacts','Tap a church to edit');
};
function toggleContactCard(id){const b=document.getElementById('contactBody_'+id),ch=document.getElementById('contactChev_'+id);if(!b)return;const open=b.style.display!=='none';b.style.display=open?'none':'block';if(ch)ch.style.transform=open?'':'rotate(90deg)';}
async function saveContacts(id){const C=(n,p)=>({name:val(n),phone:val(p)});
  try{await api('/accounts/churches/'+id,{method:'PATCH',body:{contacts:{male:{primary:C('mp_n_'+id,'mp_p_'+id),backup:C('mb_n_'+id,'mb_p_'+id)},female:{primary:C('fp_n_'+id,'fp_p_'+id),backup:C('fb_n_'+id,'fb_p_'+id)}}}});toast('Contacts saved ✓');await _rContacts();}catch(e){toast(e.message);}}

async function _tryRestoreSession(){
  const tok=localStorage.getItem('ycp_token');const actorJson=localStorage.getItem('ycp_actor');
  if(!tok||!actorJson)return;
  TOKEN=tok;
  try{
    ACTOR=JSON.parse(actorJson);
    SETTINGS=await api('/settings');
    CAMP_MODE=SETTINGS.campMode||'pre-camp';
    document.getElementById('login').style.display='none';
    document.getElementById('bar').style.display='flex';
    document.getElementById('stage').style.display='block';
    document.getElementById('tabs').style.display='flex';
    updateModeUI();buildTabs();_prefetch();STACK=['home'];await gotoTab('home');
  }catch(e){
    TOKEN=null;ACTOR=null;
    localStorage.removeItem('ycp_token');localStorage.removeItem('ycp_actor');
  }
}

document.getElementById('password').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('username').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&document.getElementById('modal').classList.contains('show'))closeModal();});
_initDemoLogin();_tryRestoreSession();

/* PWA: register the service worker (network-first HTML shell, network-only API,
   cache-first assets). On a new SW taking control after a deploy, reload once so
   users get the latest UI without a manual refresh. */
if('serviceWorker'in navigator){
  let _reloading=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(_reloading)return;_reloading=true;location.reload();
  });
  window.addEventListener('load',()=>{navigator.serviceWorker.register('/sw.js').catch(()=>{});});
}
