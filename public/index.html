<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#12233b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Camp Platform">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon.svg">
<link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
<title>Youth Camp Platform</title>
<style>
:root{--navy:#12233b;--blue:#2563eb;--blue2:#3b82f6;--teal:#0ea5a4;--amber:#f59e0b;--rose:#e11d48;--green:#16a34a;--paper:#f4f7fc;--card:#fff;--ink:#1f2937;--muted:#647488;--line:#e8edf4;--chip:#eef4ff;
/* design tokens (3.2) */
--s1:4px;--s2:8px;--s3:12px;--s4:16px;--s5:24px;--s6:32px;--r-sm:10px;--r:13px;--r-lg:18px;
--shadow-sm:0 4px 12px rgba(12,26,48,.06);--shadow:0 10px 24px rgba(12,26,48,.08);
--ok:#16a34a;--warn:#b45309;--danger:#b91c1c;--info:#2563eb;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--ink);background:#0b1220;display:flex;justify-content:center;}
.app{width:100%;max-width:460px;height:100dvh;background:var(--paper);display:flex;flex-direction:column;position:relative;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.5);}
.bar{background:var(--navy);color:#fff;padding:max(14px,env(safe-area-inset-top)) 14px 12px;display:flex;align-items:center;gap:7px;flex:none;z-index:20;}
.bar .bk{width:34px;height:34px;border-radius:50%;display:none;place-items:center;background:rgba(255,255,255,.12);font-size:1.1rem;flex:none;cursor:pointer;}
.bar.canback .bk{display:grid;}
.bar .ttl{flex:1;min-width:0;}.bar .ttl .t{font-weight:700;font-size:1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar .ttl .s{font-size:.7rem;color:#9fb6d6;}
.mode-badge{font-size:.58rem;font-weight:800;padding:3px 8px;border-radius:999px;white-space:nowrap;flex:none;}
.role-badge{font-size:.58rem;font-weight:800;background:#f59e0b;color:#3a2a00;border-radius:999px;padding:3px 8px;white-space:nowrap;flex:none;}
.sign-out{padding:5px 10px;border-radius:999px;background:rgba(255,255,255,.15);font-size:.72rem;font-weight:700;flex:none;cursor:pointer;white-space:nowrap;}
.stage{flex:1;position:relative;overflow:hidden;}
.screen{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 26px;display:none;}
.screen.active{display:block;animation:rise .25s ease;}
@keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.tabs{display:flex;background:#fff;border-top:1px solid var(--line);flex:none;padding-bottom:env(safe-area-inset-bottom);z-index:20;}
.tab{flex:1;text-align:center;padding:7px 4px;font-size:.7rem;color:var(--muted);cursor:pointer;border:none;background:none;position:relative;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:1px;}
.tab .ic{display:block;}
.tab.on{color:var(--blue);font-weight:700;}.tab.on .ic{opacity:1;}
.tab .tb{position:absolute;top:4px;right:50%;transform:translateX(16px);background:var(--rose);color:#fff;font-size:.55rem;font-weight:800;border-radius:999px;min-width:15px;height:15px;padding:0 4px;display:none;place-items:center;}
.hero{background:radial-gradient(130% 130% at 0% 0%,#2f6bf6,#12233b 75%);color:#fff;border-radius:18px;padding:16px;margin-bottom:13px;position:relative;overflow:hidden;}
.hero:after{content:"";position:absolute;right:-40px;top:-40px;width:140px;height:140px;background:rgba(255,255,255,.07);border-radius:50%;}
.hero .k{font-size:.64rem;letter-spacing:.16em;text-transform:uppercase;color:#9cc0ff;font-weight:700;}
.hero h2{font-size:1.35rem;margin:4px 0 2px;}
.hero .cd{display:flex;gap:12px;align-items:flex-end;margin-top:12px;}
.hero .big{font-size:2.6rem;font-weight:800;line-height:.9;}.hero .cd .meta{font-size:.78rem;color:#cfe0ff;padding-bottom:4px;}
.nownext{background:linear-gradient(135deg,#1d3a6e,#12233b);color:#fff;border-radius:14px;padding:13px 15px;margin-bottom:12px;}
.nownext .now{font-weight:800;}.nownext .nx{font-size:.8rem;color:#9fb6d6;margin-top:2px;}
.notice{display:flex;gap:10px;align-items:flex-start;background:#eef4ff;border:1px solid #dbe6ff;border-radius:13px;padding:11px 13px;margin-bottom:12px;cursor:pointer;}
.notice.urg{background:#fef2f2;border-color:#fecaca;}
.notice .nico{font-size:1rem;line-height:1.35;flex:none;}
.notice .nt{font-weight:700;font-size:.86rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.notice .ns{font-size:.72rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.notice .ndis{flex:none;margin-left:6px;border:none;background:transparent;color:var(--muted);font-size:1.25rem;line-height:1;cursor:pointer;padding:0 2px;}
.notice .ndis:active{color:#111;}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px;margin-bottom:10px;box-shadow:0 3px 10px rgba(18,35,59,.05);}
.card.tap{cursor:pointer;transition:transform .12s;}.card.tap:active{transform:scale(.985);}
.rowsb{display:flex;justify-content:space-between;align-items:center;gap:10px;}
.lbl{font-size:.7rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:2px 0 9px;}
.h3{font-size:.72rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin:14px 2px 8px;}
h3.sec{font-size:.72rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:16px 2px 8px;}
.bar7{height:9px;border-radius:999px;background:#eaeef5;overflow:hidden;margin:9px 0 8px;}.bar7>i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,#2563eb,#3b82f6);}
.pill{font-size:.62rem;font-weight:700;padding:3px 8px;border-radius:999px;display:inline-block;}
.pill.ok{background:#e7f7ec;color:#15803d;}.pill.warn{background:#fdecec;color:#b91c1c;}.pill.amb{background:#fef3c7;color:#92660b;}.pill.info{background:#e7efff;color:#2851a3;}
.pills{display:flex;gap:7px;flex-wrap:wrap;}
.tiles{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:4px;grid-auto-rows:1fr;}
.tile{background:#fff;border:1px solid var(--line);border-radius:15px;padding:12px 8px;min-height:86px;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;transition:transform .12s;box-shadow:0 3px 10px rgba(18,35,59,.05);position:relative;}
.tile:active{transform:scale(.96);}.tile .ic{font-size:1.55rem;display:block;color:var(--blue);}.tile .l{font-size:.74rem;font-weight:600;margin-top:6px;color:#334155;}
.tile .sub{max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* SVG icon system (3.1) */
.ic-svg{width:20px;height:20px;display:inline-block;vertical-align:middle;flex:none;stroke:currentColor;}
.tile .ic-svg{width:26px;height:26px;}
.tab .ic-svg{width:21px;height:21px;}
.notice .nico .ic-svg{width:18px;height:18px;}
.search .ic-svg{width:18px;height:18px;color:var(--blue);}
.btn .ic-svg{width:15px;height:15px;margin-right:3px;}
.tile .b{position:absolute;top:7px;right:8px;background:var(--rose);color:#fff;font-size:.58rem;font-weight:800;border-radius:999px;padding:2px 6px;}
.row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fff;border:1px solid var(--line);border-radius:13px;margin-bottom:8px;cursor:pointer;}
.row.checked{background:#f3fbf5;border-color:#cdeccf;}
.av{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-size:.78rem;font-weight:700;color:#2851a3;background:#dbe6ff;flex:none;}
.av.male{background:#dbe6ff;color:#2851a3;}.av.female{background:#fce4f1;color:#c0257e;}
.nm{font-weight:600;font-size:.88rem;}.sub{font-size:.7rem;color:var(--muted);}
.chev{color:#c2cdda;font-size:1.1rem;}
.search{display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid var(--blue);border-radius:13px;padding:11px 13px;margin-bottom:12px;}
.search input{border:none;outline:none;font-size:1rem;flex:1;background:none;}
.faq-item{background:#fff;border:1px solid var(--line);border-radius:13px;margin-bottom:8px;overflow:hidden;}
.faq-item .q{padding:13px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-weight:600;font-size:.9rem;gap:10px;}
.faq-item .q .pm{color:var(--blue);font-size:1.2rem;transition:transform .2s;flex:none;}
.faq-item .a{max-height:0;overflow:hidden;transition:max-height .25s ease;font-size:.86rem;color:#475569;padding:0 14px;}
.faq-item.open .a{max-height:360px;padding:0 14px 13px;}.faq-item.open .q .pm{transform:rotate(45deg);}
.findcard{background:#f8fbff;border:1.5px solid #dbe6ff;border-radius:14px;padding:13px;margin-bottom:10px;}
.kv{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed #dbe6ff;font-size:.86rem;gap:10px;}
.kv:last-of-type{border:none;}.kv .k{color:var(--muted);}.kv .v{font-weight:600;text-align:right;}
.kv2{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line);font-size:.9rem;gap:10px;}
.kv2:last-child{border:none;}.kv2 .k{color:var(--muted);}.kv2 .v{font-weight:600;text-align:right;}
.med{background:#fde2e1;color:#b91c1c;border-radius:8px;padding:4px 9px;font-size:.76rem;font-weight:600;display:inline-block;margin:5px 0;}
.seg{display:flex;background:#eef2f8;border-radius:12px;padding:4px;gap:4px;margin-bottom:10px;}
.seg button{flex:1;border:none;background:none;padding:9px 4px;border-radius:9px;font-size:.78rem;font-weight:700;color:var(--muted);cursor:pointer;}
.seg button.on{background:#fff;color:var(--blue);box-shadow:0 2px 6px rgba(18,35,59,.12);}
.filters{display:flex;gap:8px;margin-bottom:11px;}
.filters select{flex:1;font-size:.82rem;padding:8px 10px;}
.ncard{background:#fff;border:1px solid var(--line);border-left:4px solid #cbd5e1;border-radius:12px;padding:11px 13px;margin-bottom:9px;}
.ncard.urgent{border-left-color:var(--rose);}.ncard.zone{border-left-color:var(--teal);}
.ntag{font-size:.58rem;font-weight:800;text-transform:uppercase;padding:2px 8px;border-radius:999px;background:#e7efff;color:#2851a3;}
.ntime{margin-left:auto;font-size:.7rem;color:#94a3b8;}.ntop{display:flex;gap:7px;align-items:center;margin-bottom:4px;}
.ntitle{font-weight:700;font-size:.92rem;}.nbody{font-size:.84rem;color:#475569;margin-top:2px;}.nfrom{font-size:.72rem;color:#94a3b8;margin-top:5px;}
.noteitem{background:#fffdf5;border:1px solid #f2e6c7;border-radius:10px;padding:9px 11px;margin-bottom:7px;font-size:.84rem;}
.noteitem .meta{font-size:.7rem;color:#94a3b8;margin-top:3px;}
.note-hint{font-size:.74rem;color:var(--muted);text-align:center;margin-top:10px;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px 0;color:var(--muted);gap:12px;}
.spin{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading .lt{font-size:.78rem;font-weight:600;}
.callbox{background:#ecfdf5;border:1px solid #bbf7d0;border-radius:12px;padding:12px;font-size:.84rem;color:#166534;margin-bottom:10px;}
.warnbox{background:#fffbeb;border:1px solid #fcd980;border-radius:12px;padding:12px;font-size:.82rem;color:#92660b;margin-bottom:10px;}
.infobox{background:#eef4ff;border:1px solid #cdddff;border-radius:12px;padding:12px;font-size:.82rem;color:#2851a3;margin-bottom:10px;}
.toast{position:absolute;left:50%;bottom:84px;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:11px 18px;border-radius:999px;font-size:.84rem;font-weight:600;opacity:0;pointer-events:none;transition:.3s;z-index:40;max-width:90%;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.modal{position:absolute;inset:0;background:rgba(8,14,25,.55);display:none;align-items:flex-end;z-index:50;}
.modal.show{display:flex;}
.sheet{background:#fff;width:100%;border-radius:20px 20px 0 0;padding:18px 16px max(18px,env(safe-area-inset-bottom));animation:rise .2s;max-height:88dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.sheet h3{font-size:1.05rem;color:var(--navy);margin-bottom:6px;}
label{display:block;font-size:.72rem;font-weight:700;color:var(--muted);margin:10px 2px 4px;letter-spacing:.03em;text-transform:uppercase;}
.fld,select,textarea{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:10px 12px;font-size:.92rem;font-family:inherit;background:#fff;outline:none;}
textarea{min-height:78px;resize:vertical;}
.btn{display:block;width:100%;background:var(--blue);color:#fff;border:none;border-radius:12px;padding:13px;font-size:.92rem;font-weight:700;text-align:center;cursor:pointer;margin-top:8px;}
.btn:active{transform:scale(.99);}.btn.alt{background:#fff;color:var(--blue);border:1.5px solid var(--blue);}
.btn.sm{width:auto;padding:7px 11px;margin:0;font-size:.74rem;}
.btn.red{background:linear-gradient(135deg,#e11d48,#9f1239);}.btn.ghost{background:#eef2f8;color:#334155;}
.detail-hd{background:linear-gradient(135deg,#2f6bf6,#12233b);color:#fff;border-radius:18px;padding:18px;margin-bottom:14px;text-align:center;}
.detail-hd .av-lg{width:62px;height:62px;border-radius:50%;background:rgba(255,255,255,.18);display:grid;place-items:center;font-size:1.3rem;font-weight:800;margin:0 auto 9px;}
.detail-hd h2{font-size:1.3rem;}
.snap .bignum{font-size:2.2rem;font-weight:800;line-height:1;color:var(--navy);}
.accbadge{font-size:.7rem;font-weight:800;padding:7px 12px;border-radius:999px;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.accbadge.tent{background:#e7f7ec;color:#15803d;}.accbadge.classroom{background:#e7efff;color:#2851a3;}.accbadge.mixed{background:#fef3c7;color:#92660b;}
.gbar{display:flex;height:16px;border-radius:999px;overflow:hidden;background:#eef2f8;margin:4px 0 6px;}
.gbar i{display:block;height:100%;}.gbar .m{background:linear-gradient(90deg,#60a5fa,#2563eb);}.gbar .f{background:linear-gradient(90deg,#f472b6,#db2777);}
.glabels{font-size:.76rem;color:var(--muted);font-weight:600;display:flex;justify-content:space-between;}
.gradebars{display:flex;gap:6px;align-items:flex-end;height:92px;padding-top:8px;}
.gcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;justify-content:flex-end;}
.gcol .gbar-col{width:100%;max-width:30px;border-radius:6px 6px 3px 3px;background:linear-gradient(180deg,#93c5fd,#2563eb);min-height:4px;}
.gcol.empty .gbar-col{background:#e6ecf5;}.gcol .n{font-size:.72rem;font-weight:800;color:var(--navy);}.gcol .g{font-size:.62rem;color:var(--muted);font-weight:700;}
.statband{display:flex;gap:8px;margin-bottom:12px;}
.statband .s{flex:1;background:#fff;border:1px solid var(--line);border-radius:13px;padding:10px;text-align:center;}
.statband .s b{display:block;font-size:1.35rem;color:var(--navy);line-height:1.1;}.statband .s span{font-size:.62rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.03em;}
.selrow{display:flex;gap:8px;margin-bottom:12px;}.selrow>div{flex:1;}.selrow label{margin-top:0;}
.lead-tag{font-size:.58rem;font-weight:800;background:#ede9fe;color:#6d28d9;border-radius:6px;padding:1px 6px;margin-left:6px;vertical-align:middle;}
.gradepill{font-size:.6rem;font-weight:800;background:#eef2f8;color:#475569;border-radius:6px;padding:1px 6px;margin-left:6px;vertical-align:middle;}
.err{background:#fde2e1;color:#7f1d1d;border-radius:10px;padding:9px 12px;font-size:.82rem;margin-top:8px;display:none;}
#login{position:absolute;inset:0;background:radial-gradient(130% 90% at 50% 0%,#2f6bf6,#0b1220);display:flex;flex-direction:column;justify-content:center;padding:26px;z-index:60;}
#login h1{color:#fff;font-size:1.7rem;text-align:center;margin-bottom:4px;letter-spacing:-.02em;}
#login p{color:#cfe0ff;text-align:center;font-size:.85rem;margin-bottom:18px;}
#login .card{background:rgba(255,255,255,.97);}
.quick{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.quick button{flex:1;min-width:44%;border:1px solid rgba(255,255,255,.35);background:rgba(255,255,255,.12);color:#fff;border-radius:10px;padding:8px;font-size:.74rem;cursor:pointer;font-weight:600;}
</style>
</head>
<body>
<div class="app">
  <header class="bar" id="bar" style="display:none">
    <div class="bk" onclick="back()">&#8249;</div>
    <div class="ttl"><div class="t" id="barT">Camp Platform</div><div class="s" id="barS"></div></div>
    <div class="mode-badge" id="modeBadge"></div>
    <div class="mode-badge" id="dayBadge" onclick="switchDay()" style="cursor:pointer;display:none" title="Tap to switch camp day"></div>
    <div class="role-badge" id="roleBadge"></div>
    <div class="sign-out" onclick="logout()">Sign out</div>
  </header>
  <div class="stage" id="stage" style="display:none">
    <section class="screen" id="home"></section>
    <section class="screen" id="people"></section>
    <section class="screen" id="help"></section>
    <section class="screen" id="student"></section>
    <section class="screen" id="codes"></section>
    <section class="screen" id="checkin"></section>
    <section class="screen" id="search"></section>
    <section class="screen" id="notifs"></section>
    <section class="screen" id="compose"></section>
    <section class="screen" id="camper"></section>
    <section class="screen" id="firstday"></section>
    <section class="screen" id="myyouth"></section>
    <section class="screen" id="schedule"></section>
    <section class="screen" id="devotional"></section>
    <section class="screen" id="faq"></section>
    <section class="screen" id="notes"></section>
    <section class="screen" id="testimonies"></section>
    <section class="screen" id="budget"></section>
    <section class="screen" id="accom"></section>
    <section class="screen" id="admin"></section>
    <section class="screen" id="adminAccounts"></section>
    <section class="screen" id="adminAccom"></section>
    <section class="screen" id="adminFaq"></section>
    <section class="screen" id="adminSettings"></section>
    <section class="screen" id="adminData"></section>
    <section class="screen" id="import"></section>
    <section class="screen" id="adminDevos"></section>
    <section class="screen" id="adminFaqEdit"></section>
    <section class="screen" id="adminSchedEdit"></section>
    <section class="screen" id="adminContacts"></section>
  </div>
  <nav class="tabs" id="tabs" style="display:none"></nav>
  <div class="modal" id="modal" onclick="if(event.target===this)closeModal()"><div class="sheet" id="sheet"></div></div>
  <div class="toast" id="toast"></div>
  <div id="login">
    <h1>Youth Camp Platform</h1>
    <p>Registration &amp; on-ground management</p>
    <div class="card">
      <label>Username</label><input class="fld" id="username" placeholder="username" autocapitalize="none" autocomplete="username" autocorrect="off" spellcheck="false">
      <label>Password</label><input class="fld" id="password" type="password" autocomplete="current-password">
      <button class="btn" onclick="doLogin()">Sign in</button>
      <div class="err" id="loginErr"></div>
    </div>
    <!-- Demo quick-login: only rendered for the in-memory demo build, injected by
         _initDemoLogin() when /settings reports a demo/seed backend. Never shipped
         with prefilled credentials in production. -->
    <div id="demoLogin"></div>
  </div>
</div>

<script>
/* ===== API (real backend) ===== */
/* The Express backend returns results bare (no {ok,data} envelope); errors come as
   an HTTP error status with a JSON body {code,message}. 204 = no content. */
/* Resilience (ported from connection-made-simple Phase 3): every request has an
   AbortController TIMEOUT so a hung fetch (cold start / flaky signal / slow DB)
   fails FAST with a recoverable error instead of leaving the UI on an infinite
   loading screen. Imports get a longer window. Concurrent in-flight GETs for the
   same path are COALESCED so the post-login prefetch and a navigation don't
   double-fire. */
const API_TIMEOUT_MS=20000, API_IMPORT_TIMEOUT_MS=90000;
const _inflight=new Map(); // path -> Promise (GET coalescing)
async function _doFetch(path,opt){
  const isImport=path.indexOf('/import')===0||path.indexOf('/import')===path.length-7;
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),isImport?API_IMPORT_TIMEOUT_MS:API_TIMEOUT_MS);
  let res;
  try{
    res=await fetch(path,{method:opt.method||'GET',signal:ctrl.signal,
      headers:{'Content-Type':'application/json',...(TOKEN?{Authorization:'Bearer '+TOKEN}:{})},
      ...(opt.body!==undefined?{body:JSON.stringify(opt.body)}:{})});
  }catch(e){
    if(e&&e.name==='AbortError')throw new Error('Request timed out — check your connection and try again.');
    throw new Error('Network error — is the server running?');
  }finally{clearTimeout(timer);}
  if(res.status===401&&TOKEN){sessionExpired();throw new Error('Session expired — please sign in again.');}
  if(res.status===204)return null;
  let j=null;try{j=await res.json();}catch(e){j=null;}
  if(!res.ok)throw new Error((j&&(j.message||j.error))||('Request failed ('+res.status+')'));
  return j;
}
async function api(path,opt={}){
  const method=(opt.method||'GET').toUpperCase();
  if(method!=='GET')return _doFetch(path,opt); // only GETs are safe to coalesce
  if(_inflight.has(path))return _inflight.get(path);
  const p=_doFetch(path,opt).finally(()=>_inflight.delete(path));
  _inflight.set(path,p);
  return p;
}

/* Navigation core (ported resilience from CMS Phase 5/8):
   - shows the target screen with a SPINNER immediately, so a slow RENDER never
     leaves the UI on a blank/stale screen ("pre-loading screen");
   - issues a nav token so a RENDER that finishes after the user has navigated
     away can bail via _stale() instead of overwriting the new screen
     ("stuck spinner / wrong page" guard). */
let _navToken=0, _navId=null;
function _stale(tok){return tok!==_navToken;}
function _spinner(id,label){
  const el=document.getElementById(id);
  if(el){el.innerHTML='<div class="loading"><div class="spin"></div><div class="lt">'+(label||'Loading…')+'</div></div>';el.scrollTop=0;}
  _showScreen(id);
}
async function _navTo(id,arg){
  const tok=++_navToken; _navId=id;
  _spinner(id);
  try{ if(RENDER[id]) await RENDER[id](arg,tok); }
  catch(e){ if(!_stale(tok)) { const el=document.getElementById(id); if(el)el.innerHTML='<p class="note-hint">'+esc(e.message||'Something went wrong')+'</p>'; } }
}
async function go(id,arg){STACK.push(id);await _navTo(id,arg);}
async function gotoTab(id){
  const keepHome=['checkin','search','notifs'];
  STACK=keepHome.includes(id)?['home',id]:[id];
  await _navTo(id);
}
async function back(){if(STACK.length>1){STACK.pop();const id=STACK[STACK.length-1];await _navTo(id);}}

function paint(id,html,t,s){
  // Stale-render guard: if the user has navigated to a DIFFERENT screen while this
  // render was awaiting, don't overwrite it. (id===_navId means this is still the
  // active target — including same-screen re-renders.)
  if(_navId&&_navId!==id&&!STACK.includes(id))return;
  _paint(id,html,t,s);
  const el=document.getElementById(id);
  if(el){el.innerHTML=html;el.scrollTop=0;}
  _showScreen(id);
}

  const grades=GRADES.map(gr=>({gr,n:campers.filter(c=>c.grade===gr).length})),maxG=Math.max(1,...grades.map(x=>x.n));

    <div class="lbl" style="margin-top:12px">Leader split</div>
    <div class="gbar"><i class="m" style="width:${lg.male/lgtot*100}%"></i><i class="f" style="width:${lg.female/lgtot*100}%"></i></div>
    <div class="glabels"><span>♂ Guys <b style="color:#2563eb">${lg.male}</b></span><span>Girls <b style="color:#db2777">${lg.female}</b> ♀</span></div>
    <div class="lbl" style="margin-top:14px">By grade</div><div class="gradebars">${cols}</div>
    <div class="rowsb" style="margin-top:12px;font-size:.8rem"><span style="font-weight:700">${leaders.length} leaders</span>${wwc?`<span class="pill warn">${wwc} need blue card</span>`:'<span class="pill ok">blue cards ✓</span>'}</div></div>`;

function scopeRegs(){const c=sel('myChurch')||'all';let base=ALLREG;if(ACTOR&&ACTOR.role==='zoneLeader')base=ALLREG.filter(r=>r.zone===ACTOR.zone);return c==='all'?base:base.filter(r=>r.churchId===c);}

function _ciLabel(session){
  try{
    const d=new Date(session.day+'T12:00:00Z');
    const wk=d.toLocaleDateString(undefined,{weekday:'short',timeZone:'UTC'});
    const h=parseInt((session.startTime||'09:00').split(':')[0]);
    return wk+' '+(h<12?'AM':h<17?'PM':'Eve');
  }catch(e){return session.label||session.id;}
}
/* ===== DAILY CHECK-IN ===== */
RENDER.checkin=async function renderCheckin(){
  if(SESSIONS.length===0)SESSIONS=await api('/checkin/sessions');
  if(!SEL_SESSION){const cur=await api('/checkin/sessions/current').catch(()=>null);SEL_SESSION=(cur&&cur.id)||(SESSIONS[0]&&SESSIONS[0].id);}
  if(!SEL_SESSION){paint('checkin','<p class="note-hint">No check-in sessions configured. Set camp dates in admin settings.</p>','Daily Check-in','');return;}
  // Real status: {session, roster:[{camperId,firstName,lastName,church,zone,checkedIn}], checkedInCount, totalCount}.
  // Roster carries no gender/grade — enrich from /campers so those filters work.
  const [st,campers]=await Promise.all([api('/checkin/sessions/'+SEL_SESSION+'/status'),api('/campers').catch(()=>[])]);
  const cmap={};(campers||[]).forEach(c=>{cmap[c.id]={gender:c.gender,grade:c.grade};});
  const roster=(st.roster||[]).map(r=>({id:r.camperId,name:(r.firstName+' '+r.lastName).trim(),church:r.church,zone:r.zone,present:!!r.checkedIn,gender:(cmap[r.camperId]||{}).gender,grade:(cmap[r.camperId]||{}).grade}));
  const DUE=(st.totalCount!=null?st.totalCount:roster.length)-(st.checkedInCount!=null?st.checkedInCount:roster.filter(c=>c.present).length);
  const tb=document.getElementById('tabDue');if(tb){if(DUE>0){tb.style.display='grid';tb.textContent=DUE;}else tb.style.display='none';}
  const showZone=['director','admin'].includes(ACTOR.role);
  const showChurch=['zoneLeader','director','admin'].includes(ACTOR.role);
  const zonesOpt=['all',...new Set(roster.map(c=>c.zone))].filter((v,i,a)=>a.indexOf(v)===i);
  let churchPool=FILTER.zone!=='all'?roster.filter(c=>c.zone===FILTER.zone):roster;
  const churchesOpt=['all',...new Set(churchPool.map(c=>c.church))].filter((v,i,a)=>a.indexOf(v)===i);
  let list=roster.filter(c=>(FILTER.gender==='all'||c.gender===FILTER.gender)&&
    (FILTER.grade==='all'||String(c.grade)===FILTER.grade)&&
    (FILTER.zone==='all'||c.zone===FILTER.zone)&&
    (FILTER.church==='all'||c.church===FILTER.church));
  list.sort((a,b)=>a.present-b.present);
  const dueShown=list.filter(c=>!c.present).length,presentShown=list.length-dueShown;
  const label=_ciLabel(st.session||SESSIONS.find(x=>x.id===SEL_SESSION)||{});
  const dayBtns=SESSIONS.map(s=>`<button class="${s.id===SEL_SESSION?'on':''}" onclick="selDay('${s.id}')">${esc(_ciLabel(s))}</button>`).join('');
  const gradeOpts=['all',...GRADES].map(g=>`<option value="${g}" ${String(g)===FILTER.grade?'selected':''}>${g==='all'?'All grades':'Grade '+g}</option>`).join('');
  const zoneSelOpts=zonesOpt.map(z=>`<option value="${z}" ${z===FILTER.zone?'selected':''}>${z==='all'?'All zones':z+' Zone'}</option>`).join('');
  const churchSelOpts=churchesOpt.map(ch=>`<option value="${esc(ch)}" ${ch===FILTER.church?'selected':''}>${ch==='all'?'All churches':esc(ch)}</option>`).join('');
  const html=`<div class="seg" id="dayseg">${dayBtns}</div>
    ${(showZone||showChurch)?`<div class="filters">${showZone?`<select onchange="setFilter('zone',this.value)">${zoneSelOpts}</select>`:''}${showChurch?`<select onchange="setFilter('church',this.value)">${churchSelOpts}</select>`:''}</div>`:''}
    <div class="filters">
      <select onchange="setFilter('gender',this.value)"><option value="all" ${FILTER.gender==='all'?'selected':''}>All genders</option><option value="female" ${FILTER.gender==='female'?'selected':''}>Girls</option><option value="male" ${FILTER.gender==='male'?'selected':''}>Guys</option></select>
      <select onchange="setFilter('grade',this.value)">${gradeOpts}</select>
    </div>
    <div class="card" style="display:flex;justify-content:space-between;align-items:center">
      <div><div class="nm">${esc(label)} check-in</div><div class="sub">${presentShown}/${list.length} present${list.length!==roster.length?' · filtered':''}</div></div>
      ${dueShown>0?`<div style="text-align:right"><div style="font-weight:800;font-size:1.4rem;line-height:1;color:#b45309">${dueShown}</div><div class="sub" style="font-size:.68rem">not yet checked in${list.length!==roster.length?' (filtered)':''}</div></div>`:`<span class="pill ok">All checked in ✓</span>`}
    </div>
    ${list.map(c=>`<div class="row ${c.present?'checked':''}"><div class="av ${esc(c.gender||'')}">${initials(c.name)}</div>
      <div style="flex:1;min-width:0"><div class="nm">${esc(c.name)}</div><div class="sub">${esc(c.church||c.zone)}${c.grade?' · Yr '+c.grade:''}</div></div>
      <button class="btn ghost sm" onclick="notePrompt('${c.id}','${esc(c.name)}')">＋ note</button>
      ${c.present?`<button class="btn alt sm" onclick="doCheck('${c.id}','out')">✓ in</button>`:`<button class="btn sm" onclick="doCheck('${c.id}','in')">Check in</button>`}
    </div>`).join('')}
    <p class="note-hint">Notes are visible to zone leaders &amp; directors only.</p>`;
  paint('checkin',html,'Daily Check-in',label);
};

   no fee-tier, so every camper is charged the full price for their accommodation kind. */
RENDER.budget=async function(){
  if(!['director','admin'].includes(ACTOR.role)){paint('budget','<p class="note-hint" style="margin-top:24px;text-align:center">Budget is available to directors only.</p>','Budget & costings','');return;}
  const [regs,blocks]=await Promise.all([api('/registrants'),api('/accommodation/blocks')]);
  const priceOf=k=>{const b=(blocks||[]).find(x=>x.kind===k);return b?Number(b.price)||0:0;};
  window._budgetPrice={tent:priceOf('tent')||140,classroom:priceOf('classroom')||120};
  window._budgetRegs=regs||[];
  const churches=[...new Map((regs||[]).map(r=>[r.churchId,r.churchName])).entries()].map(([id,name])=>({id,name}));
  const selHtml=`<div class="filters"><select id="budChurch" onchange="drawBudget()"><option value="all">All ministries</option>${churches.map(c=>`<option value="${esc(c.id)}">${esc(c.name)}</option>`).join('')}</select></div>`;
  paint('budget',`${selHtml}<div id="budgetBody"></div>`,'Budget & costings','Camper fees by accommodation');
  drawBudget();
};
function budgetAmount(r,price){return price[r.accommodationKind]||0;}
function drawBudget(){
  const regs=window._budgetRegs||[],price=window._budgetPrice||{tent:140,classroom:120};
  const scope=sel('budChurch')||'all';
  const campers=(scope==='all'?regs:regs.filter(r=>r.churchId===scope)).filter(r=>r.kind==='camper');
  const cats=[{key:'tent',label:'△ Tent'},{key:'classroom',label:'⌂ Classroom'}];
  let total=0;
  const rows=cats.map(t=>{const grp=campers.filter(r=>r.accommodationKind===t.key);const amt=grp.reduce((s,r)=>s+budgetAmount(r,price),0);total+=amt;
    return `<div class="card"><div class="rowsb"><div><div style="font-weight:600">${t.label}</div><div class="sub">${grp.length} ${grp.length===1?'camper':'campers'} · $${price[t.key]||0} ea</div></div><b style="font-size:1.05rem">$${amt.toLocaleString()}</b></div></div>`;
  }).join('');
  const unset=campers.filter(r=>r.accommodationKind!=='tent'&&r.accommodationKind!=='classroom').length;
  const head=`<div class="card" style="background:linear-gradient(135deg,#2f6bf6,#12233b);color:#fff;border:none">
    <div class="lbl" style="color:#9cc0ff;margin:0">Fees${scope==='all'?' · all ministries':''}</div>
    <div style="font-size:2rem;font-weight:800">$${total.toLocaleString()}</div>
    <div style="font-size:.8rem;color:#cfe0ff">${campers.length} campers${unset?' · '+unset+' without accommodation set':''}</div></div>`;
  const box=document.getElementById('budgetBody');if(box)box.innerHTML=head+`<h3 class="sec">By accommodation</h3>`+rows;
}

/* ===== ACCOMMODATION ALLOCATIONS (director/admin) =====
   Backend model = accommodation blocks (spaces) + per-church reservations (spot counts).
   There is no room-by-room placement entity, so allocation is per-church tent/classroom
   spot counts; Tent City below is a client-side planning view from registrant data. */
RENDER.accom=async function(){
  if(!['director','admin'].includes(ACTOR.role)){paint('accom','<p class="note-hint" style="margin-top:24px;text-align:center">Accommodation allocations are available to directors only.</p>','Accommodation allocations','');return;}
  const [blocks,churches,regs]=await Promise.all([api('/accommodation/blocks'),api('/accounts/churches'),api('/registrants')]);
  window._accomBlocks=blocks||[];window._accomChurches=churches||[];window._accomRegs=regs||[];
  paint('accom','<div id="accomBody"></div>','Accommodation allocations','Spaces · church spots · tent city');
  drawAccom();
};
function tentDist(regs){const by={};(regs||[]).filter(r=>r.accommodationKind==='tent').forEach(r=>{const c=by[r.churchId]||(by[r.churchId]={name:r.churchName,m:{stu:0,ld:0},f:{stu:0,ld:0}});const g=r.gender==='male'?c.m:c.f;if(r.kind==='leader')g.ld++;else g.stu++;});return by;}
function drawAccom(){
  const blocks=window._accomBlocks||[],churches=window._accomChurches||[],regs=window._accomRegs||[];
  const spaceCards=blocks.length?blocks.map(b=>{const cap=b.capacity||0,taken=b.liveTaken!=null?b.liveTaken:(b.baseTaken||0),avail=b.available!=null?b.available:(cap-taken);const pct=cap?Math.round(taken/cap*100):0;
    return `<div class="card"><div class="rowsb"><b>${b.kind==='tent'?'△':'⌂'} ${esc(b.name)}</b><span class="pill ${avail>0?'ok':'warn'}">${avail} left</span></div>
      <div class="bar7"><i style="width:${pct}%"></i></div><div class="sub" style="font-size:.74rem">${taken}/${cap} taken · $${b.price||0}</div></div>`;}).join(''):'<p class="note-hint">No accommodation spaces yet — add them in Admin → Accommodation.</p>';
  const churchCards=churches.map(c=>{const res=c.reservations||[];const t=(res.find(r=>r.kind==='tent')||{}).spots||0;const cl=(res.find(r=>r.kind==='classroom')||{}).spots||0;
    return `<div class="card" style="background:#fafbff"><div style="font-weight:700;margin-bottom:6px">${esc(c.name)} <span style="color:var(--muted)">· ${esc(c.zone||'—')}</span></div>
    <div style="display:flex;gap:8px"><div style="flex:1"><label>△ Tent spots</label><input class="fld" id="acT_${c.id}" value="${t}"></div>
    <div style="flex:1"><label>⌂ Classroom spots</label><input class="fld" id="acC_${c.id}" value="${cl}"></div></div>
    <button class="btn sm" style="width:100%;margin-top:8px" onclick="saveChurchAlloc('${c.id}')">Save allocation</button></div>`;}).join('')||'<p class="note-hint">No churches yet.</p>';
  const td=tentDist(regs);
  const tentTable=(gk,label)=>{const rows=Object.values(td).filter(c=>c[gk].stu+c[gk].ld>0).map(c=>{const g=c[gk];const st=Math.ceil(g.stu/7),lt=Math.ceil(g.ld/7);return `<tr style="border-top:1px solid var(--line)"><td style="padding:6px 4px">${esc(c.name)}</td><td style="text-align:center">${g.stu}</td><td style="text-align:center">${g.ld}</td><td style="text-align:center">${st}</td><td style="text-align:center">${lt}</td></tr>`;}).join('');
    if(!rows)return '';
    return `<h3 class="sec">Tent City — ${label}</h3><table style="width:100%;border-collapse:collapse;font-size:.8rem"><tr style="text-align:left;color:var(--muted)"><th style="padding:6px 4px">Ministry</th><th style="text-align:center">Students</th><th style="text-align:center">Leaders</th><th style="text-align:center">Student tents</th><th style="text-align:center">Leader tents</th></tr>${rows}</table>`;};
  const tentHtml=tentTable('m','Male')+tentTable('f','Female');
  const box=document.getElementById('accomBody');if(!box)return;
  box.innerHTML=`<h3 class="sec" style="margin-top:2px">Camp spaces</h3>${spaceCards}
    <h3 class="sec">Allocation to ministries</h3>${churchCards}
    ${tentHtml||'<p class="note-hint" style="margin-top:14px">Tent City auto-distribution appears once registrants have a tent accommodation kind set.</p>'}`;
}
async function saveChurchAlloc(churchId){
  const t=Number(val('acT_'+churchId))||0,c=Number(val('acC_'+churchId))||0;
  const reservations=[];
  if(t>0)reservations.push({kind:'tent',spots:t,label:'Tent City',confirmed:true});
  if(c>0)reservations.push({kind:'classroom',spots:c,label:'Classroom',confirmed:true});
  try{await api('/accommodation/reservations',{method:'POST',body:{churchId,reservations}});toast('Allocation saved ✓');}catch(e){toast(e.message);}}
RENDER.compose=function(){
  const isDir=['director','admin'].includes(ACTOR.role);
  paint('compose',`<label>Send to</label><div class="seg" id="audSeg">
    ${isDir?`<button class="on" data-aud="camp" onclick="setAud(this)">◆ Camp-wide</button><button data-aud="zone" onclick="setAud(this)">A zone</button>`
      :`<button class="on" data-aud="myzone" onclick="setAud(this)">${esc(ACTOR.zone)} Zone</button>`}
    </div>
    ${isDir?`<div id="zoneWrap" style="display:none"><label>Zone</label><select id="zoneSel">${ZONES.map(z=>`<option>${z}</option>`).join('')}</select></div>`:''}
    <label>Priority</label><div class="seg" id="priSeg"><button class="on" data-pri="normal" onclick="setPri(this)">◈ Normal</button><button data-pri="urgent" onclick="setPri(this)">⚠︎ Urgent</button></div>
    <label>Title</label><input class="fld" id="ntitle">
    <label>Message</label><textarea id="nbody"></textarea>
    <button class="btn" id="sendBtn" onclick="sendNotif()">Send notice</button>`,'Send a notice','Goes to leaders');
  window._aud=isDir?'camp':'myzone';window._pri='normal';
};
function setAud(b){document.querySelectorAll('#audSeg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');window._aud=b.dataset.aud;const z=document.getElementById('zoneWrap');if(z)z.style.display=window._aud==='zone'?'block':'none';}
function setPri(b){document.querySelectorAll('#priSeg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');window._pri=b.dataset.pri;}
async function sendNotif(){const title=document.getElementById('ntitle').value.trim(),body=document.getElementById('nbody').value.trim();
  if(!title||!body){toast('Enter title + message');return;}
  let p={priority:window._pri,title,body};
  if(window._aud==='camp')p.scope='camp';else if(window._aud==='myzone'){p.scope='zone';p.zone=ACTOR.zone;}
  else{p.scope='zone';p.zone=document.getElementById('zoneSel').value;}
  if(p.scope==='camp'||window._pri==='urgent'){if(!confirm('Send '+(window._pri==='urgent'?'URGENT ':'')+(p.scope==='camp'?'camp-wide':p.zone+' zone')+' notice?'))return;}
  try{await api('/notifications',{method:'POST',body:p});toast('Delivered ✓');back();}catch(e){toast(e.message);}}

RENDER.firstday=async function(){
  paint('firstday','<p class="note-hint" style="margin-top:40px;text-align:center">Loading…</p>','First Day Sign In','Select students to confirm');
  const page=await api('/campers?pageSize=300');
  window._fdAll=(Array.isArray(page)?page:page.items||[]).filter(c=>c.kind==='student');
  window._fdPending=new Set();
  window._fdGender='all';window._fdGrade='all';
  fdDraw();
};
function fdDraw(){
  const students=window._fdAll||[];
  const notIn=students.filter(c=>!c.atCamp);
  const alreadyIn=students.filter(c=>c.atCamp);
  const gen=window._fdGender||'all';
  const gr=window._fdGrade||'all';
  const visible=notIn.filter(c=>(gen==='all'||c.gender===gen)&&(gr==='all'||String(c.grade)===gr));
  const pending=window._fdPending||(window._fdPending=new Set());
  const gradeOpts=['all',...GRADES].map(g=>`<option value="${g}" ${String(g)===gr?'selected':''}>${g==='all'?'All grades':'Yr '+g}</option>`).join('');
  function fdRow(c,done){
    const av=`<div class="av ${esc(c.gender)}">${initials(c.firstName+' '+c.lastName)}</div>`;
    const info=`<div style="flex:1;min-width:0"><div class="nm">${esc(c.firstName+' '+c.lastName)}<span class="gradepill">Yr ${c.grade||'—'}</span></div><div class="sub">${esc(c.churchName)}</div></div>`;
    if(done){
      return `<div class="row" style="opacity:.45;cursor:default">${av}${info}<span class="pill ok">✓ In</span></div>`;
    }
    const sel=pending.has(c.id);
    return `<div class="row ${sel?'checked':''}" style="cursor:pointer" onclick="fdToggle('${c.id}',this)" data-id="${c.id}">
      ${av}${info}
      <div style="width:26px;height:26px;border-radius:50%;border:2px solid ${sel?'#16a34a':'#c2cdda'};background:${sel?'#16a34a':'transparent'};display:grid;place-items:center;flex:none;transition:.15s">
        ${sel?'<span style="color:#fff;font-size:.9rem;line-height:1">✓</span>':''}
      </div></div>`;
  }
  const pendingCount=pending.size;
  let html=`
    <div class="filters" style="margin-bottom:10px">
      <select onchange="window._fdGender=this.value;fdDraw()">
        <option value="all" ${gen==='all'?'selected':''}>All genders</option>
        <option value="male" ${gen==='male'?'selected':''}>Guys</option>
        <option value="female" ${gen==='female'?'selected':''}>Girls</option>
      </select>
      <select onchange="window._fdGrade=this.value;fdDraw()">${gradeOpts}</select>
    </div>
    ${visible.length?visible.map(c=>fdRow(c,false)).join(''):'<p class="note-hint">No students match these filters.</p>'}
    ${notIn.length===0?'<div class="callbox">All students in your group are signed in ✓</div>':''}
    ${alreadyIn.length?`<h3 class="sec" style="margin-top:16px">Already signed in (${alreadyIn.length})</h3>`+alreadyIn.map(c=>fdRow(c,true)).join(''):''}
    <div id="fdConfirmBar" style="display:${pendingCount>0?'block':'none'};position:sticky;bottom:10px;margin-top:16px">
      <button class="btn" style="background:#16a34a" onclick="fdConfirmAll()">Confirm ${pendingCount} sign-in${pendingCount===1?'':'s'}</button>
    </div>`;
  const el=document.getElementById('firstday');
  if(el)el.innerHTML=html;
  document.getElementById('barT').textContent='First Day Sign In';
  document.getElementById('barS').textContent=(notIn.length-pendingCount)+' remaining';
}
function fdToggle(id,rowEl){
  const pending=window._fdPending||(window._fdPending=new Set());
  if(pending.has(id))pending.delete(id);else pending.add(id);
  fdDraw();
}
async function fdConfirmAll(){
  const pending=[...(window._fdPending||new Set())];
  if(!pending.length)return;
  const btn=document.querySelector('#fdConfirmBar button');
  if(btn){btn.textContent='Signing in…';btn.disabled=true;}
  let ok=0,fail=0;
  await Promise.all(pending.map(id=>
    api('/attendance/sign-in',{method:'POST',body:{camperId:id,leaderName:ACTOR.displayName}})
      .then(()=>{
        const c=window._fdAll.find(s=>s.id===id);
        if(c)c.atCamp=true;
        window._fdPending.delete(id);
        ok++;
      })
      .catch(()=>fail++)
  ));
  if(fail)toast(fail+' failed — please retry');
  else toast(ok+' student'+(ok===1?'':'s')+' signed in ✓');
  fdDraw();
}

function filterMyYouth(){

    html+=signedOut.map(myRow).join('');
  }
  if(notArrived.length){
    html+=`<h3 class="sec">Late arrivals (${notArrived.length})</h3>`;
    html+=`<div class="infobox" style="font-size:.8rem;margin-bottom:8px">First Day Sign In is closed. Sign in late arrivals here — tap a name, then “Sign in to camp”. A note is logged automatically.</div>`;
    html+=notArrived.map(myRow).join('');

  el.innerHTML=html;
}

async function submitTestimony(){const camperId=sel('tmCamper'),leader=val('tmLeader'),body=val('tmBody');
  if(!camperId){toast('Pick a student');return;}if(!body){toast('Write the testimony');return;}LAST_LEADER=leader;

RENDER.notes=async function(){
  // /notes/recent returns bare notes (no camper details) — join /campers for name/church/zone/gender/grade.
  const [notes,page]=await Promise.all([api('/notes/recent'),api('/campers?pageSize=300').catch(()=>[])]);
  const camps=Array.isArray(page)?page:page.items||[];const cmap={};camps.forEach(c=>{cmap[c.id]=c;});
  window._notesAll=(notes||[]).map(n=>{const c=cmap[n.camperId]||{};return Object.assign({},n,{camperName:c.firstName?(c.firstName+' '+c.lastName):n.camperId,church:c.churchName,zone:c.zone,gender:c.gender,grade:c.grade,cat:n.category||'note'});});
  const churches=[...new Set(window._notesAll.map(n=>n.church).filter(Boolean))].sort();
  const zonesPresent=[...new Set(window._notesAll.map(n=>n.zone).filter(Boolean))].sort();
  const recSel=`<div><label>Record</label><select id="ntCat" onchange="drawNotes()"><option value="all">All records</option><option value="testimony">Testimony</option><option value="note">Student note</option></select></div>`;
  const minSel=`<div><label>Ministry</label><select id="ntChurch" onchange="drawNotes()"><option value="all">All ministries</option>${churches.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('')}</select></div>`;
  const zoneSel=`<div><label>Zone</label><select id="ntZone" onchange="drawNotes()"><option value="all">All zones</option>${zonesPresent.map(z=>`<option value="${z}">${z} Zone</option>`).join('')}</select></div>`;
  paint('notes',`<button class="btn alt" onclick="exportNotes()">↓ Export (CSV)</button>
    <div class="selrow">${recSel}${minSel}</div><div class="selrow">${zoneSel}</div>
    <div id="notesList"></div>`,'Testimonies & Student Notes','All zones · whole camp');
  drawNotes();
};
function drawNotes(){
  let list=window._notesAll||[];
  const cat=sel('ntCat')||'all',ch=sel('ntChurch')||'all',z=sel('ntZone')||'all';
  if(cat!=='all')list=list.filter(n=>(n.cat||'note')===cat);
  if(ch!=='all')list=list.filter(n=>n.church===ch);
  if(z!=='all')list=list.filter(n=>n.zone===z);
  const box=document.getElementById('notesList');if(!box)return;
  const badge=c=>c==='testimony'?'<span class="pill info">Testimony</span>':'<span class="pill ok">Student note</span>';
  box.innerHTML=list.length?list.map(n=>{const c=n.cat||'note';const isT=c==='testimony';
    const right=(n.gender)?`<span class="sub" style="white-space:nowrap">${n.gender==='male'?'♂':'♀'}${n.grade?' · Yr '+n.grade:''}</span>`:'';
    return `<div class="card"><div class="rowsb" style="align-items:center"><div class="nm">${esc(n.camperName||'—')}</div>${right}</div>
    <div style="font-size:.86rem;color:#475569;margin:4px 0">${esc(n.body)}</div>
    <div class="sub">${esc(n.authorName)} · ${dtFmt(n.createdAt)}${n.church?' · '+esc(n.church):''} · ${badge(c)}</div></div>`;}).join(''):'<p class="note-hint">No records match these filters.</p>';
}
async function exportNotes(){
  try{const csv=await api('/notes/export');if(!csv||typeof csv!=='string'){toast('Nothing to export');return;}
    const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);const a=document.createElement('a');
    a.href=url;a.download='testimonies-and-notes-'+new Date().toISOString().slice(0,10)+'.csv';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
    toast('Exported ✓');
  }catch(e){toast(e.message);}}

/* ===== ADMIN FAQ (pre-camp) ===== */

  const faqs=await api('/faq');

    <label>Answer</label><textarea id="fa_${f.id}">${esc(f.answer)}</textarea>

};
async function saveFaqPre(id){try{await api('/faq/'+id,{method:'PATCH',body:{question:val('fq_'+id),answer:val('fa_'+id)}});toast('Saved ✓');}catch(e){toast(e.message);}}
async function delFaqPre(id){if(!confirm('Delete?'))return;try{await api('/faq/'+id,{method:'DELETE'});RENDER.adminFaq();}catch(e){toast(e.message);}}
async function addFaqPre(){if(!val('nfq')||!val('nfa')){toast('Enter question + answer');return;}try{await api('/faq',{method:'POST',body:{question:val('nfq'),answer:val('nfa'),order:99}});toast('Added ✓');RENDER.adminFaq();}catch(e){toast(e.message);}}

async function saveFaqAt(id){try{await api('/faq/'+id,{method:'PATCH',body:{question:val('fq_q_'+id),answer:val('fq_a_'+id)}});toast('Saved ✓');}catch(e){toast(e.message);}}
async function delFaqAt(id){if(!confirm('Delete?'))return;try{await api('/faq/'+id,{method:'DELETE'});RENDER.adminFaqEdit();}catch(e){toast(e.message);}}

/* ===== ADMIN SETTINGS ===== */
RENDER.adminSettings=async function(){
  const s=SETTINGS||await api('/settings');
  paint('adminSettings',`<div class="card">
    <label>Camp name</label><input class="fld" id="stName" value="${esc(s.campName||'')}">
    <label>Year</label><input class="fld" id="stYear" type="number" inputmode="numeric" value="${esc(s.year||'')}">
    <label>Start date (YYYY-MM-DD)</label><input class="fld" id="stStart" value="${esc(s.startDate||'')}">
    <label>End date (YYYY-MM-DD)</label><input class="fld" id="stEnd" value="${esc(s.endDate||'')}">
    <label>Timezone (IANA, e.g. Australia/Brisbane)</label><input class="fld" id="stTz" value="${esc(s.timezone||'')}">
    <label>Check-in location</label><input class="fld" id="stLoc" value="${esc(s.checkInLocation||'')}">
    <label>Check-in from</label><input class="fld" id="stFrom" value="${esc(s.checkInFrom||'')}">
    <label>Register base URL</label><input class="fld" id="stUrl" value="${esc(s.registerBaseUrl||'')}">
    <label>At-camp check-in days (comma-separated YYYY-MM-DD)</label>
    <input class="fld" id="stDays" value="${esc((s.checkInDays||[]).join(', '))}">
    <button class="btn" onclick="saveSettings()">Save camp settings</button>
    <p class="note-hint">Tent &amp; classroom prices are set per space in Admin → Accommodation. Changing check-in days updates the daily check-in automatically.</p></div>`,'Camp settings','Dates &amp; details');

async function saveSettings(){
  try{
    const days=document.getElementById('stDays').value.split(',').map(x=>x.trim()).filter(Boolean);
    await api('/settings',{method:'PATCH',body:{campName:val('stName'),year:Number(val('stYear'))||new Date().getFullYear(),startDate:val('stStart'),endDate:val('stEnd'),timezone:val('stTz'),checkInLocation:val('stLoc'),checkInFrom:val('stFrom'),registerBaseUrl:val('stUrl'),checkInDays:days}});
    SETTINGS=await api('/settings');SESSIONS=[];SEL_SESSION=null;SCHED_DAY=null;DEVO_DAY=null;
    toast('Settings saved ✓');
  }catch(e){toast(e.message);}
}

/* ===== ADMIN DATA ===== */
RENDER.adminData=function(){
  const uploadSection=CAMP_MODE==='at-camp'?`<div class="card"><div class="h3" style="margin-top:0">Upload students (CSV)</div>
    <input type="file" id="fileIn" accept=".csv" class="fld">
    <button class="btn" onclick="adminUpload()">Upload &amp; import</button>
    <p class="note-hint">Matches existing students by name — adds new ones and updates changed fields.</p>
    <div id="impResult" class="card" style="margin-top:10px;display:none"></div></div>
    <div class="card"><div class="h3" style="margin-top:0">Notifications</div><button class="btn red" onclick="adminClear()">Clear all notifications</button></div>`:'';
  paint('adminData',`${uploadSection}
    <div class="card"><div class="h3" style="margin-top:0">New year</div>
      <button class="btn" onclick="adminSaveDefaults()">Save baseline (incl. devotionals)</button>
      <p class="note-hint" style="text-align:left">Snapshots the current churches, accounts, accommodation, FAQ, schedule &amp; devotionals as the reusable baseline.</p>
      <button class="btn red" style="margin-top:10px" onclick="adminNewYear()">Purge &amp; start new year</button>
      <p class="note-hint" style="text-align:left">Purges registrations, students, notes &amp; notifications, then restores the saved baseline (requires one). Keeps the admin account &amp; settings. Restored church/zone accounts need passwords reset.</p></div>
    <div class="card"><div class="h3" style="margin-top:0">Factory reset</div>
      <button class="btn red" onclick="adminReset()">Full reset (wipe to bare)</button>
      <p class="note-hint" style="text-align:left">Deletes ALL data and every non-admin account, keeping only this admin account &amp; the camp settings. No restore. Signs you out.</p></div>`,'Camp data','Upload / reset');
};
/* Standalone import screen — gives director (who has import:run but not the Admin
   tab) a way to import. Reuses adminUpload()'s #fileIn/#impResult elements. */
RENDER.import=function(){
  if(!['director','admin'].includes(ACTOR.role)){paint('import','<p class="note-hint">Importing is restricted to directors and admins.</p>','Import','');return;}
  paint('import',`<div class="card"><div class="h3" style="margin-top:0">Upload students (CSV)</div>
    <input type="file" id="fileIn" accept=".csv" class="fld">
    <button class="btn" onclick="adminUpload()">Upload &amp; import</button>
    <p class="note-hint">Matches existing students by name (and phone when names clash) — adds new ones and updates changed fields.</p>
    <div id="impResult" class="card" style="margin-top:10px;display:none"></div></div>`,'Import students','CSV upload');
};
async function adminSaveDefaults(){if(!confirm('Save the current scaffold (churches, accounts, accommodation, FAQ, schedule, devotionals) as the new-year baseline?'))return;
  // Backend returns {ok:true} (no counts).
  try{await api('/admin/defaults',{method:'POST'});toast('Baseline saved ✓');}catch(e){toast(e.message);}}
async function adminNewYear(){if(!confirm('Purge registrations, students, notes & notifications and start a new year (restores the saved baseline)? Cannot be undone.'))return;
  // Backend returns the updated CampSettings (or 404 if no baseline snapshot exists).
  try{const s=await api('/admin/new-year',{method:'POST'});alert('New year '+(s&&s.year?s.year+' ':'')+'started — people & transient data purged, baseline restored. NOTE: restored church/zone accounts have no password until an admin sets one.');RENDER.adminData();}catch(e){alert(e.message.includes('snapshot')?'No saved baseline — use "Save baseline" first.':e.message);}}
async function adminReset(){if(!confirm('FULL RESET: wipe ALL data and every non-admin account, keeping only this admin account & settings? No restore. You will be signed out.'))return;
  try{await api('/admin/reset',{method:'POST'});alert('Full reset complete. Signing out.');logout();}catch(e){toast(e.message);}}
async function adminClear(){if(!confirm('Clear all notifications?'))return;
  try{const r=await api('/admin/notifications',{method:'DELETE'});toast('Cleared '+(r.deleted||r.cleared||0)+' notices');}catch(e){toast(e.message);}}
function adminUpload(){
  const f=document.getElementById('fileIn')?.files[0];if(!f){toast('Choose a CSV file first');return;}
  if(!f.name.toLowerCase().endsWith('.csv')){toast('Only CSV files are supported');return;}
  const reader=new FileReader();
  reader.onload=async()=>{try{
    const r=await api('/import/csv',{method:'POST',body:{csvData:reader.result,updateExisting:true}});
    const box=document.getElementById('impResult');box.style.display='block';
    box.innerHTML=`<b style="color:#15803d">${r.created}</b> new · <b>${r.updated}</b> updated · ${r.skipped} skipped · <b style="color:#b91c1c">${(r.errors||[]).length}</b> errors`;
    toast('Import complete');
  }catch(e){toast(e.message);}};
  if(isCsv)reader.readAsText(f);else reader.readAsArrayBuffer(f);
}

/* ===== ADMIN DEVOTIONALS ===== */
RENDER.adminDevos=async function(){
  const days=SETTINGS?.checkInDays||[];
  if(!days.length){paint('adminDevos','<p class="note-hint">Set the camp dates first (Camp settings).</p>','Devotionals','');return;}
  const blocks=await Promise.all(days.map(async d=>{
    const dv=await api('/devotional/'+d).catch(()=>null);
    const wk=dayLong(d);
    return `<div class="card"><div class="h3" style="margin-top:0">${wk} · ${d}</div>
      <textarea id="dv_v_${d}" placeholder="Verse">${esc(dv?.verse||'')}</textarea>
      <input class="fld" id="dv_r_${d}" placeholder="Reference" style="margin-top:8px" value="${esc(dv?.reference||'')}">
      <textarea id="dv_f_${d}" placeholder="Reflection" style="margin-top:8px">${esc(dv?.reflection||'')}</textarea>
      <textarea id="dv_p_${d}" placeholder="Prayer" style="margin-top:8px">${esc(dv?.prayer||'')}</textarea>
      <button class="btn" onclick="saveDevo('${d}')">Save ${wk}</button></div>`;
  }));
  paint('adminDevos',blocks.join(''),'Devotionals','Edit each camp day');
};
async function saveDevo(d){try{await api('/devotional',{method:'POST',body:{day:d,verse:val('dv_v_'+d),reference:val('dv_r_'+d),reflection:val('dv_f_'+d),prayer:val('dv_p_'+d)}});toast('Saved ✓');}catch(e){toast(e.message);}}

/* ===== ADMIN SCHEDULE ===== */
RENDER.adminSchedEdit=async function(){
  const days=SETTINGS?.checkInDays||[];
  if(!days.length){paint('adminSchedEdit','<p class="note-hint">Set the camp dates first (Camp settings).</p>','Schedule','');return;}
  const blocks=await Promise.all(days.map(async d=>{
    const items=await api('/schedule?day='+d).catch(()=>[]);const wk=dayLong(d);
    const rows=items.map(i=>`<div class="row"><div style="flex:1;min-width:0"><div class="nm">${esc(i.startTime)} · ${esc(i.title)}</div><div class="sub">${esc(i.location||'')}</div></div><button class="btn ghost sm" style="margin-right:4px" onclick='editSchedPrompt(${JSON.stringify(i)})'>Edit</button><button class="btn red sm" onclick="delSched('${i.id}')">✕</button></div>`).join('')||'<p class="sub">No items.</p>';
    return `<div class="card"><div class="h3" style="margin-top:0">${wk} · ${d}</div>${rows}
      <div style="display:flex;gap:6px;margin-top:8px"><input class="fld" id="sc_t_${d}" placeholder="HH:mm" style="flex:0 0 90px"><input class="fld" id="sc_n_${d}" placeholder="Title"></div>
      <input class="fld" id="sc_l_${d}" placeholder="Location (optional)" style="margin-top:6px">
      <button class="btn" onclick="addSched('${d}')">Add to ${wk}</button></div>`;
  }));
  paint('adminSchedEdit',blocks.join(''),'Schedule','Edit each camp day');
};
async function addSched(d){if(!val('sc_t_'+d)||!val('sc_n_'+d)){toast('Enter time + title');return;}
  try{await api('/schedule',{method:'POST',body:{day:d,startTime:val('sc_t_'+d),title:val('sc_n_'+d),location:val('sc_l_'+d)||undefined,type:'activity',isCheckInPoint:false}});toast('Added ✓');RENDER.adminSchedEdit();}catch(e){toast(e.message);}}
function editSchedPrompt(i){
  modal(`<h3>Edit schedule item</h3>
    <label>Time (HH:mm)</label><input class="fld" id="es_t" value="${esc(i.startTime)}">
    <label>Title</label><input class="fld" id="es_n" value="${esc(i.title)}">
    <label>Location</label><input class="fld" id="es_l" value="${esc(i.location||'')}">
    <div style="display:flex;align-items:center;gap:8px;margin-top:10px">
      <input type="checkbox" id="es_ci" ${i.isCheckInPoint?"checked":""} style="width:auto">
      <span style="font-size:.88rem">Is a check-in point</span></div>
    <button class="btn" onclick="saveSchedEdit('${i.id}')">Save changes</button>
    <button class="btn ghost" style="margin-top:6px" onclick="closeModal()">Cancel</button>`);}
async function saveSchedEdit(id){
  const t=document.getElementById("es_t").value.trim(),n=document.getElementById("es_n").value.trim(),l=document.getElementById("es_l").value.trim();
  if(!t||!n){toast("Enter time + title");return;}
  try{await api("/schedule/"+id,{method:"PATCH",body:{startTime:t,title:n,location:l||undefined,isCheckInPoint:document.getElementById("es_ci").checked}});closeModal();toast("Saved ✓");RENDER.adminSchedEdit();}catch(e){toast(e.message);}}
async function delSched(id){if(!confirm('Delete this item?'))return;try{await api('/schedule/'+id,{method:'DELETE'});toast('Deleted');RENDER.adminSchedEdit();}catch(e){toast(e.message);}}

/* ===== ADMIN CONTACTS ===== */
RENDER.adminContacts=async function(){
  const churches=await api('/accounts/churches');
  paint('adminContacts',churches.map(c=>{const ct=c.contacts||{};
    const mp=ct.male?.primary||{},mb=ct.male?.backup||{},fp=ct.female?.primary||{},fb=ct.female?.backup||{};
    const pair=(lbl,n,p,nv,pv)=>`<label>${lbl}</label><div style="display:flex;gap:6px"><input class="fld" id="${n}" placeholder="Name" value="${esc(nv||'')}"><input class="fld" id="${p}" placeholder="Phone" value="${esc(pv||'')}"></div>`;
    return `<div class="card"><div class="h3" style="margin-top:0">${esc(c.name)} <span style="color:var(--muted)">· ${esc(c.zone||'—')}</span></div>
      ${pair('Guys — primary leader','mp_n_'+c.id,'mp_p_'+c.id,mp.name,mp.phone)}
      ${pair('Guys — secondary leader','mb_n_'+c.id,'mb_p_'+c.id,mb.name,mb.phone)}
      ${pair('Girls — primary leader','fp_n_'+c.id,'fp_p_'+c.id,fp.name,fp.phone)}
      ${pair('Girls — secondary leader','fb_n_'+c.id,'fb_p_'+c.id,fb.name,fb.phone)}
      <button class="btn" onclick="saveContacts('${c.id}')">Save ${esc(c.name)}</button>
      <p class="note-hint">Leave blank to clear. Numbers are masked until audited reveal.</p></div>`;}).join(''),'Ministry contacts','Primary &amp; backup per gender');
};
async function saveContacts(id){const C=(n,p)=>({name:val(n),phone:val(p)});
  try{await api('/accounts/churches/'+id,{method:'PATCH',body:{contacts:{male:{primary:C('mp_n_'+id,'mp_p_'+id),backup:C('mb_n_'+id,'mb_p_'+id)},female:{primary:C('fp_n_'+id,'fp_p_'+id),backup:C('fb_n_'+id,'fb_p_'+id)}}}});toast('Contacts saved ✓');}catch(e){toast(e.message);}}

/* ===== BOOT ===== */
document.getElementById('password').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('username').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&document.getElementById('modal').classList.contains('show'))closeModal();});
_initDemoLogin();

/* PWA: register the service worker (network-first HTML shell, network-only API,
   cache-first assets). On a new SW taking control after a deploy, reload once so
   users get the latest UI without a manual refresh. */
if('serviceWorker'in navigator){
  let _reloading=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(_reloading)return;_reloading=true;location.reload();
  });
  window.addEventListener('load',()=>{navigator.serviceWorker.register('/sw.js').catch(()=>{});});
}
