function _budToggle(cid){const card=document.querySelector(`.budchurch[data-cid="${cid}"]`);if(card)card.classList.toggle('open');}
function exportBudget(){
  const scope=sel('budChurch')||'all';
  const rep=computeBudgetClient(window._budgetRegs,scope);
  const esc2=s=>{const str=String(s);return /[",\n]/.test(str)?'"'+str.replace(/"/g,'""')+'"':str;};
  const lines=[['Church','Audience','Category','Count','UnitPrice','LineTotal'].join(',')];
  const emit=(church,aud,rows)=>rows.forEach(r=>lines.push([esc2(church),aud,esc2(r.label),r.count,r.amount||0,r.lineTotal].join(',')));
  rep.churches.forEach(c=>{emit(c.churchName,'Camper',c.campers);emit(c.churchName,'Leader',c.leaders);
    lines.push([esc2(c.churchName),'Total','',c.camperCount+c.leaderCount,'',c.total].join(','));});
  lines.push(['ALL CHURCHES','Grand Total','',rep.camperCount+rep.leaderCount,'',rep.grandTotal].join(','));
  const blob=new Blob([lines.join('\n')],{type:'text/csv'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='budget-by-church.csv';a.click();URL.revokeObjectURL(url);
  toast('Budget CSV downloaded');
}

/* ===== ACCOMMODATION ALLOCATIONS (director/admin) =====
   Classroom rooms (capacity) + an allocation map (roomId -> [{key:"churchId|gender", n}]).
   Eligible groups = per church+gender where >=75% of that church's campers are
   classroom-kind; auto-fill places min(group remaining, room remaining); rooms are
   single-gender; un-allocate cascades the freed people into other rooms. Tent City
   below is an auto-distribution view (7 per tent, leaders in separate tents). */
RENDER.accom=async function(){
  if(!['director','admin'].includes(ACTOR.role)){paint('accom','<p class="note-hint" style="margin-top:24px;text-align:center">Accommodation allocations are available to directors only.</p>','Accommodation allocations','');return;}
  const [regs,rooms,alloc]=await Promise.all([api('/registrants'),api('/accommodation/classrooms'),api('/accommodation/allocations')]);
  window._accomRegs=regs||[];window._accomRooms=rooms||[];window._accomAlloc=alloc||{};
  paint('accom','<div id="accomBody"></div>','Accommodation allocations','Classrooms by ministry & gender');
  drawAccom();
};
// Mirrors src/services/accommodation-allocation.ts computeGroups (incl. PC-10 split).
// Pool = classroom-kind people per church×gender, INCLUDING leaders (matches backend).
const ACCOM_SPLIT_THRESHOLD=50;
function _bracketOfGrade(g){if(g==null)return null;if(g>=7&&g<=9)return '7-9';if(g>=10&&g<=12)return '10-12';return null;}
function accomChurches(regs){
  const by={};
  (regs||[]).filter(r=>r.status!=='cancelled').forEach(r=>{
    const c=by[r.churchId]||(by[r.churchId]={id:r.churchId,name:r.churchName,total:0,classroom:0,
      male:{cls:0,y79:0,y1012:0,yOther:0,ld:0},female:{cls:0,y79:0,y1012:0,yOther:0,ld:0}});
    c.total++;
    if(r.accommodationKind==='classroom'){c.classroom++;const g=r.gender==='male'?c.male:c.female;g.cls++;
      if(r.kind==='leader')g.ld++;else{const b=_bracketOfGrade(r.grade);if(b==='7-9')g.y79++;else if(b==='10-12')g.y1012++;else g.yOther++;}}});
  return by;
}
function _accomGenderGroups(c,gender,g){
  if(g.cls===0)return [];
  const lbl=gender==='male'?'Guys':'Girls';
  if(g.cls<=ACCOM_SPLIT_THRESHOLD)return [{key:c.id+'|'+gender,church:c.name,gender,label:lbl,n:g.cls}];
  const ld79=Math.ceil(g.ld/2),ld1012=g.ld-ld79;
  const n79=g.y79+g.yOther+ld79,n1012=g.y1012+ld1012;const out=[];
  if(n79>0)out.push({key:c.id+'|'+gender+'|7-9',church:c.name,gender,label:lbl+' Yr 7–9',n:n79,bracket:'7-9'});
  if(n1012>0)out.push({key:c.id+'|'+gender+'|10-12',church:c.name,gender,label:lbl+' Yr 10–12',n:n1012,bracket:'10-12'});
  return out;
}
function accomGroups(regs){
  const by=accomChurches(regs),groups=[];
  Object.values(by).forEach(c=>{const elig=c.total>0&&c.classroom/c.total>=0.75;if(elig){
    groups.push(..._accomGenderGroups(c,'male',c.male));
    groups.push(..._accomGenderGroups(c,'female',c.female));}});
  return groups;
}
async function addAlloc(roomId,key){if(!key)return;const rooms=window._accomRooms||[],a=JSON.parse(JSON.stringify(window._accomAlloc||{}));
  const groups=accomGroups(window._accomRegs||[]),g=groups.find(x=>x.key===key);if(!g)return;
  let allocated=0;Object.values(a).forEach(arr=>(arr||[]).forEach(e=>{if(e.key===key)allocated+=e.n;}));
  const availN=g.n-allocated;if(availN<=0){toast('All of that group is already allocated');return;}
  const room=rooms.find(r=>r.id===roomId);if(!room)return;const entries=a[roomId]||[];const used=entries.reduce((s,e)=>s+e.n,0);const rem=room.capacity-used;
  if(rem<=0){toast('Room is full');return;}
  const rg=entries.length?(groups.find(x=>x.key===entries[0].key)||{}).gender:null;
  if(rg&&rg!==g.gender){toast('That room is '+(rg==='male'?'Guys':'Girls')+' only');return;}
  const place=Math.min(availN,rem);
  a[roomId]=a[roomId]||[];const ex=a[roomId].find(e=>e.key===key);if(ex)ex.n+=place;else a[roomId].push({key,n:place});
  try{await api('/accommodation/allocations',{method:'PATCH',body:{allocations:a}});window._accomAlloc=await api('/accommodation/allocations');drawAccom();if(place<availN)toast(place+' placed · '+(availN-place)+' still to allocate elsewhere');}catch(e){toast(e.message);}}
async function removeAlloc(roomId,key){const rooms=window._accomRooms||[];const a=JSON.parse(JSON.stringify(window._accomAlloc||{}));
  const entry=(a[roomId]||[]).find(e=>e.key===key);if(!entry)return;
  let freed=entry.n;a[roomId]=(a[roomId]||[]).filter(e=>e.key!==key);
  for(const rm of rooms){if(rm.id===roomId)continue;const arr=a[rm.id];if(!arr)continue;const ex=arr.find(e=>e.key===key);if(!ex)continue;const used=arr.reduce((s,e)=>s+e.n,0);const rem=rm.capacity-used;if(rem>0&&freed>0){const add=Math.min(rem,freed);ex.n+=add;freed-=add;}}
  try{await api('/accommodation/allocations',{method:'PATCH',body:{allocations:a}});window._accomAlloc=await api('/accommodation/allocations');drawAccom();}catch(e){toast(e.message);}}
function tentDist(regs){const by={};(regs||[]).filter(r=>r.accommodationKind==='tent').forEach(r=>{const c=by[r.churchId]||(by[r.churchId]={name:r.churchName,m:{stu:0,ld:0},f:{stu:0,ld:0}});const g=r.gender==='male'?c.m:c.f;if(r.kind==='leader')g.ld++;else g.stu++;});return by;}
function drawAccom(){
  const regs=window._accomRegs||[],rooms=window._accomRooms||[],alloc=window._accomAlloc||{};
  const groups=accomGroups(regs);
  const gByKey=Object.fromEntries(groups.map(g=>[g.key,g]));
  const allocByKey={};Object.values(alloc).forEach(arr=>(arr||[]).forEach(e=>{allocByKey[e.key]=(allocByKey[e.key]||0)+e.n;}));
  groups.forEach(g=>g.avail=g.n-(allocByKey[g.key]||0));
  const availGroups=groups.filter(g=>g.avail>0);
  const roomCards=rooms.length?rooms.map(rm=>{
    const entries=(alloc[rm.id]||[]).filter(e=>gByKey[e.key]);
    const used=entries.reduce((s,e)=>s+e.n,0);const rem=rm.capacity-used;
    const roomGender=entries.length?gByKey[entries[0].key].gender:null;
    const addable=roomGender?availGroups.filter(g=>g.gender===roomGender):availGroups;
    const chips=entries.map(e=>{const g=gByKey[e.key];return `<div class="rowsb" style="align-items:center;background:#fff;border:1px solid var(--line);border-radius:8px;padding:6px 10px;margin-top:6px"><span style="font-size:.7rem;line-height:1.3">${esc(g.church)} — ${g.label} (${e.n})</span><button class="btn ghost sm" onclick="removeAlloc('${rm.id}','${e.key}')">Remove</button></div>`;}).join('');
    const addSel=(rem>0&&addable.length)?`<select onchange="addAlloc('${rm.id}',this.value);this.value=''" style="width:100%;margin-top:8px"><option value="">+ Add ministry…</option>${addable.map(g=>`<option value="${g.key}">${esc(g.church)} — ${g.label} (${g.avail} left)</option>`).join('')}</select>`:(rem<=0?`<div class="sub" style="margin-top:8px">Room full.</div>`:`<div class="sub" style="margin-top:8px">${roomGender?'No more '+(roomGender==='male'?'Guys':'Girls')+' groups to add.':'All eligible groups are allocated.'}</div>`);
    const tone=used?'ok':'info';const lbl=used+'/'+rm.capacity;
    return `<div class="card"><div class="rowsb"><div style="font-weight:600">${icSm('classroom')} ${esc(rm.name)} <span class="sub">· cap ${rm.capacity}</span></div><span class="pill ${tone}">${lbl}</span></div>${chips}${addSel}</div>`;
  }).join(''):'<p class="note-hint">No classroom rooms yet — add them in Admin → Accommodation.</p>';
  const out=[];
  const by=accomChurches(regs);
  Object.values(by).forEach(c=>{const elig=c.total>0&&c.classroom/c.total>=0.75;
    if(!elig&&c.classroom>0)out.push([c.name,'Classroom',c.classroom,'Under 75% — not allocated']);});
  availGroups.forEach(g=>out.push([g.church,g.label,g.avail,g.avail<g.n?(g.avail+' of '+g.n+' to allocate'):'Awaiting a room']));
  // Cell padding is applied to EVERY column (not just the first) so the columns don't crowd
  // together on a narrow phone; the count is right-aligned and the Status column gets the slack.
  const table=out.length?`<table style="width:100%;border-collapse:collapse;font-size:.82rem">
    <tr style="text-align:left;color:var(--muted)"><th style="padding:7px 12px 7px 4px">Ministry</th><th style="padding:7px 12px">Group</th><th style="padding:7px 12px;text-align:right">#</th><th style="padding:7px 4px 7px 12px">Status</th></tr>
    ${out.map(r=>`<tr style="border-top:1px solid var(--line)"><td style="padding:7px 12px 7px 4px">${esc(r[0])}</td><td style="padding:7px 12px">${esc(r[1])}</td><td style="padding:7px 12px;text-align:right">${r[2]}</td><td style="padding:7px 4px 7px 12px"><span class="sub">${esc(r[3])}</span></td></tr>`).join('')}
  </table>`:'<p class="note-hint">Everyone is allocated</p>';
  const td=tentDist(regs);
  // Tent City table (PC-11 owner rework): Ministry centred between the headcount columns
  // (Students / Leaders, left) and the tent-count columns (Student Tents / Leader Tents,
  // right); vertical divider lines stop the numbers blurring together; a centred "Totals:"
  // line sits under a bigger, black, centred heading.
  const tentTable=(gk,label)=>{
    const churchesG=Object.values(td).filter(c=>c[gk].stu+c[gk].ld>0);
    let totStu=0,totLd=0,totStuTents=0,totLdTents=0;
    const numTd='text-align:center;padding:8px 6px;font-weight:600';
    const midTd='text-align:center;padding:8px 6px;font-weight:700;border-left:1px solid var(--line);border-right:1px solid var(--line)';
    const rows=churchesG.map(c=>{const g=c[gk];const st=Math.ceil(g.stu/7),lt=Math.ceil(g.ld/7);
      totStu+=g.stu;totLd+=g.ld;totStuTents+=st;totLdTents+=lt;
      return `<tr style="border-top:1px solid var(--line)"><td style="${numTd}">${g.stu}</td><td style="${numTd}">${g.ld}</td><td style="${midTd}">${esc(c.name)}</td><td style="${numTd}">${st}</td><td style="${numTd}">${lt}</td></tr>`;}).join('');
    if(!rows)return '';
    const numTh='text-align:center;padding:7px 6px';
    const midTh='text-align:center;padding:7px 6px;border-left:1px solid var(--line);border-right:1px solid var(--line)';
    return `<h3 style="text-align:center;font-size:var(--t-h2);font-weight:800;color:#000;margin:0 0 4px">Tent City — ${label}</h3>`
      +`<div style="text-align:center;font-size:var(--t-sm);color:#000;margin-bottom:12px;line-height:1.55">`
        +`<div>Students Total: ${totStu} Regos in ${totStuTents} Tents</div>`
        +`<div>Leaders Total: ${totLd} Regos in ${totLdTents} Tents</div>`
      +`</div>`
      +`<table style="width:100%;border-collapse:collapse;font-size:.82rem;table-layout:fixed"><tr style="color:var(--muted)"><th style="${numTh};width:16%">Students</th><th style="${numTh};width:16%">Leaders</th><th style="${midTh};width:36%">Ministry</th><th style="${numTh};width:16%">Student Tents</th><th style="${numTh};width:16%">Leader Tents</th></tr>${rows}</table>`;
  };
  // Double the gap between the male and female sections (~18px → ~40px).
  // Bug-11: a help icon on the FIRST Tent City heading explains the automatic tent logic to a
  // leader who didn't build the app.
  const tentHelp=helpTip('Tent-kind registrants are grouped by church and gender, then split into tents of up to 7 — students and leaders separately. Filled automatically.',{left:true});
  const tentBlocks=[tentTable('m','Male'),tentTable('f','Female')].filter(Boolean);
  if(tentBlocks.length)tentBlocks[0]=tentBlocks[0].replace('</h3>',' '+tentHelp+'</h3>');
  const tentHtml=tentBlocks.map((b,i)=>`<div style="margin-top:${i===0?18:40}px">${b}</div>`).join('');
  const box=document.getElementById('accomBody');if(!box)return;
  // A7/PC-12: room cards reflow as wrapping narrow tiles (matches the accommodation-setup
  // tile pattern), 1→N columns by width, instead of a single fixed column.
  const roomGrid=rooms.length?`<div class="accom-rooms">${roomCards}</div>`:roomCards;
  box.innerHTML=`<h3 class="sec" style="margin-top:2px">Classrooms ${helpTip('Sleeping rooms you set up, each with a capacity. Single-gender, auto-filled to capacity. A church qualifies only when 75%+ of its campers chose classroom.',{left:true})}</h3>${roomGrid}
    <h3 class="sec">Classrooms (Pending Allocation) ${helpTip('Groups still needing a classroom spot, or not eligible. “Under 75%” means too few of that church\'s campers chose classroom, so they go to tents.',{left:true})}</h3>${table}
    ${tentHtml||'<p class="note-hint" style="margin-top:14px">Tent City auto-distribution appears once registrants have a tent accommodation kind set.</p>'}`;
}

function setAud(b){document.querySelectorAll('#audSeg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');window._aud=b.dataset.aud;const z=document.getElementById('zoneWrap');if(z)z.style.display=window._aud==='zone'?'block':'none';}
function setPri(b){document.querySelectorAll('#priSeg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');window._pri=b.dataset.pri;}
async function sendNotif(){const title=document.getElementById('ntitle').value.trim(),body=document.getElementById('nbody').value.trim();
  if(!title||!body){toast('Enter title + message');return;}
  let p={priority:window._pri,title,body};
  if(window._aud==='camp')p.scope='camp';else if(window._aud==='myzone'){p.scope='zone';p.zone=ACTOR.zone;}
  else{p.scope='zone';p.zone=document.getElementById('zoneSel').value;}
  if(p.scope==='camp'||window._pri==='urgent'){if(!confirm('Send '+(window._pri==='urgent'?'URGENT ':'')+(p.scope==='camp'?'camp-wide':p.zone+' zone')+' notice?'))return;}
  try{await api('/notifications',{method:'POST',body:p});toast('Delivered');back();}catch(e){toast(e.message);}}

RENDER.firstday=async function(){
  paint('firstday','<p class="note-hint" style="margin-top:40px;text-align:center">Loading…</p>','First Day Sign In','Select students to confirm');
  const [camperPage,regList]=await Promise.all([api('/campers?pageSize=300'),api('/registrants')]);
  const campers=(Array.isArray(camperPage)?camperPage:camperPage.items||[]).filter(c=>c.kind==='student');
  const camperIds=new Set(campers.map(c=>c.id));
  const registrants=(Array.isArray(regList)?regList:[]).filter(c=>c.kind!=='leader'&&!camperIds.has(c.id));
  window._fdAll=[...registrants,...campers];
  window._fdPending=new Set();
  window._fdGender='all';window._fdGrade='all';
  fdDraw();
};
function fdDraw(){
  const students=window._fdAll||[];
  const notIn=students.filter(c=>!c.atCamp);
  const alreadyIn=students.filter(c=>c.atCamp);
  const gen=window._fdGender||'all';
  const gr=window._fdGrade||'all';
  const matchFilter=c=>(gen==='all'||c.gender===gen)&&(gr==='all'||String(c.grade)===gr);
  const visible=notIn.filter(matchFilter);
  // AC-3: the gender/grade filter applies to the already-signed-in section too.
  const visibleIn=alreadyIn.filter(matchFilter);
  const pending=window._fdPending||(window._fdPending=new Set());
  const gradeOpts=['all',...GRADES].map(g=>`<option value="${g}" ${String(g)===gr?'selected':''}>${g==='all'?'All grades':'Yr '+g}</option>`).join('');
  function fdRow(c,done){
    // AC-4: initials bubble is gender-coloured via .av.male/.av.female (blue/pink).
    const av=`<div class="av ${esc(c.gender)}">${initials(c.firstName+' '+c.lastName)}</div>`;
    const info=`<div style="flex:1;min-width:0"><div class="nm">${esc(c.firstName+' '+c.lastName)}<span class="gradepill">Yr ${c.grade||'—'}</span></div><div class="sub">${esc(c.churchName)}</div></div>`;
    if(done){
      // AC-2: an already-signed-in student can be signed OUT here to correct a mistake.
      const nm=(c.firstName+' '+c.lastName).replace(/'/g,"\\'");
      return `<div class="row" style="cursor:pointer" onclick="signOutPrompt('${c.id}','${esc(nm)}')">${av}${info}<span class="pill ok">${icSm('check')} In</span><button class="btn ghost sm" style="flex:none" onclick="event.stopPropagation();signOutPrompt('${c.id}','${esc(nm)}')">Sign out</button></div>`;
    }
    const sel=pending.has(c.id);
    return `<div class="row ${sel?'checked':''}" style="cursor:pointer" onclick="fdToggle('${c.id}',this)" data-id="${c.id}">
      ${av}${info}
      <div style="width:26px;height:26px;border-radius:50%;border:2px solid ${sel?'#16a34a':'#c2cdda'};background:${sel?'#16a34a':'transparent'};display:grid;place-items:center;flex:none;transition:.15s">
        ${sel?icSm('check','cwhite'):''}
      </div></div>`;
  }
  const pendingCount=pending.size;
  let html=`
    <div class="rowsb" style="margin-bottom:8px"><span class="lbl" style="margin:0">First-day arrivals</span>${helpTip('Tick each student as they arrive on day one, then Confirm to sign them in. This marks them on site — use the daily check-in for the twice-daily roll call after that.')}</div>
    <div class="filters" style="margin-bottom:10px">
      <select onchange="window._fdGender=this.value;fdDraw()">
        <option value="all" ${gen==='all'?'selected':''}>All genders</option>
        <option value="male" ${gen==='male'?'selected':''}>Guys</option>
        <option value="female" ${gen==='female'?'selected':''}>Girls</option>
      </select>
      <select onchange="window._fdGrade=this.value;fdDraw()">${gradeOpts}</select>
    </div>
    ${visible.length?visible.map(c=>fdRow(c,false)).join(''):'<p class="note-hint">No students match these filters.</p>'}
    ${notIn.length===0?`<div class="callbox">${icSm('check')} All students in your group are signed in</div>`:''}
    ${visibleIn.length?`<h3 class="sec" style="margin-top:16px">Already signed in (${visibleIn.length})</h3>`+visibleIn.map(c=>fdRow(c,true)).join(''):''}
    <div id="fdConfirmBar" style="display:${pendingCount>0?'block':'none'};position:sticky;bottom:10px;margin-top:16px">
      <button class="btn" style="background:#16a34a" onclick="fdConfirmAll()">Confirm ${pendingCount} sign-in${pendingCount===1?'':'s'}</button>
    </div>`;
  const el=document.getElementById('firstday');
  if(el)el.innerHTML=html;
  document.getElementById('barT').textContent='First Day Sign In';
  document.getElementById('barS').textContent=(notIn.length-pendingCount)+' remaining';
}
function fdToggle(id,rowEl){
  const pending=window._fdPending||(window._fdPending=new Set());
  if(pending.has(id))pending.delete(id);else pending.add(id);
  fdDraw();
}
async function fdConfirmAll(){
  const pending=[...(window._fdPending||new Set())];
  if(!pending.length)return;
  const btn=document.querySelector('#fdConfirmBar button');
  if(btn){btn.textContent='Signing in…';btn.disabled=true;}
  let ok=0,fail=0;
  await Promise.all(pending.map(id=>
    api('/attendance/sign-in',{method:'POST',body:{camperId:id,leaderName:ACTOR.displayName}})
      .then(()=>{
        const c=window._fdAll.find(s=>s.id===id);
        if(c)c.atCamp=true;
        window._fdPending.delete(id);
        ok++;
      })
      .catch(()=>fail++)
  ));
  if(fail)toast(fail+' failed — please retry');
  else toast(ok+' student'+(ok===1?'':'s')+' signed in');
  fdDraw();
}

RENDER.myyouth=async function(){
  paint('myyouth','<p class="note-hint" style="margin-top:40px;text-align:center">Loading…</p>','My Youth Details','At camp · signed out · late');
  const page=await api('/campers?pageSize=300');
  const items=Array.isArray(page)?page:page.items||[];
  const isWide=['zoneLeader','director','admin'].includes(ACTOR.role);
  const zones=[...new Set(items.map(c=>c.zone))].sort();
  const zoneFilterHtml=isWide?`<select id="myZoneF" onchange="filterMyYouth()"><option value="all">All zones</option>${zones.map(z=>`<option value="${z}">${z} Zone</option>`).join('')}</select>`:'';
  window._myYouthAll=items;
  const base=`<div class="rowsb" style="margin-bottom:8px"><span class="lbl" style="margin:0">Your group</span>${helpTip('Everyone in your group, split into At camp, Signed out, and Not yet arrived. Tap a name to see their details and contacts.')}</div><div class="filters">${zoneFilterHtml}<select id="myGenderF" onchange="filterMyYouth()"><option value="all">All genders</option><option value="female">Girls</option><option value="male">Guys</option></select><select id="myGradeF" onchange="filterMyYouth()"><option value="all">All grades</option>${GRADES.map(g=>`<option value="${g}">Yr ${g}</option>`).join('')}</select></div><div id="myYouthList"></div>`;
  paint('myyouth',base,'My Youth Details','At camp · signed out · late');

function filterMyYouth(){
  const zone=sel('myZoneF')||'all',gen=sel('myGenderF')||'all',gr=sel('myGradeF')||'all';
  const all=(window._myYouthAll||[]).filter(c=>(zone==='all'||c.zone===zone)&&(gen==='all'||c.gender===gen)&&(gr==='all'||String(c.grade)===gr));
  const notArrived=all.filter(c=>c.kind==='student'&&!c.atCamp&&(!c.signOutHistory||c.signOutHistory.length===0));
  const signedOut=all.filter(c=>!c.atCamp&&c.signOutHistory&&c.signOutHistory.length>0);
  const atCamp=all.filter(c=>c.atCamp);
  const el=document.getElementById('myYouthList');if(!el)return;
  function myRow(c){
    const lead=c.kind==='leader';
    const badge=lead?` <span class="lead-tag">LEADER</span>`:'';
    const sub=`${esc(c.zone)} Zone · ${esc(c.churchName)} · ${lead?'Leader':'Yr '+c.grade}`;
    return `<div class="row" onclick="openCamper('${c.id}')"><div class="av ${esc(c.gender)}">${initials(c.firstName+' '+c.lastName)}</div>
      <div style="flex:1;min-width:0"><div class="nm">${esc(c.firstName+' '+c.lastName)}${badge}</div>
      <div class="sub">${sub}</div></div><span class="chev">›</span></div>`;
  }
  let html='';
  if(atCamp.length){
    html+=`<h3 class="sec" style="margin-top:4px">At camp (${atCamp.length})</h3>`;
    html+=atCamp.map(myRow).join('');
  }
  if(signedOut.length){
    html+=`<h3 class="sec">Signed out of camp (${signedOut.length})</h3>`;
    html+=signedOut.map(myRow).join('');
  }
  if(notArrived.length){
    html+=`<h3 class="sec">Late arrivals (${notArrived.length})</h3>`;
    html+=`<div class="infobox" style="font-size:.8rem;margin-bottom:8px">First Day Sign In is closed. Sign in late arrivals here — tap a name, then “Sign in to camp”. A note is logged automatically.</div>`;
    html+=notArrived.map(myRow).join('');
  }
  if(!html)html='<p class="note-hint" style="margin-top:24px;text-align:center">No students match these filters.</p>';
  el.innerHTML=html;
}
async function openCamper(id,push=true){

    ${p.atCamp?`<button class="btn red" onclick="signOutPrompt('${id}','${esc(p.fullName||p.firstName+' '+p.lastName)}')">Sign out of camp</button>`:`<button class="btn" onclick="signInPrompt('${id}','${esc(p.fullName||p.firstName+' '+p.lastName)}')">${(p.signOutHistory||[]).some(e=>e.type==='out')?'Sign back in to camp':'Sign in to camp (late arrival)'}</button>`}</div>`;
  const fullName=p.fullName||p.firstName+' '+p.lastName;
  document.getElementById('camper').innerHTML=`<div class="detail-hd"><div class="av-lg">${initials(fullName)}</div>
    <h2>${esc(fullName)}</h2><div style="color:#cfe0ff;font-size:.82rem">${esc(p.zone)} Zone · ${lead?'Leader (18+)':'Grade '+p.grade}</div></div>
    <div class="card">
      <div class="kv"><span class="k">Church</span><span class="v">${esc(p.churchName)}</span></div>
      <div class="kv"><span class="k">${lead?'Mobile':'Student mobile'}</span><span class="v"><a href="tel:${esc(p.mobile||'')}" style="color:#4f46e5;text-decoration:none">${esc(fmtPhone(p.mobile)||'—')}</a></span></div>
      ${lead?'':`<div class="kv"><span class="k">Medical</span><span class="v">${(p.medicalConditions||[]).join(', ')||'—'}</span></div>
      <div class="kv"><span class="k">Dietary</span><span class="v">${(p.dietaryRequirements||[]).join(', ')||'—'}</span></div>
      ${p.otherMedications?`<div class="kv"><span class="k">Medication</span><span class="v">${esc(p.otherMedications)}</span></div>`:''}`}
      <!-- AC-6: consents line removed from the profile UI (consent data is kept in the model/DTO). -->
    </div>
    ${camp}
    ${lead?'':`<div class="card"><div class="h3" style="margin-top:0">Parent / guardian</div>
      <div class="kv"><span class="k">Name</span><span class="v">${esc(p.parentGuardianName||'—')}${p.parentRelation?' ('+esc(p.parentRelation)+')':''}</span></div>
      <div class="kv"><span class="k">Phone</span><span class="v"><a href="tel:${esc(p.parentPhone||'')}" style="color:#4f46e5;text-decoration:none">${esc(fmtPhone(p.parentPhone)||'—')}</a></span></div></div>`}
    ${notesHtml}`;
  const camperEl=document.getElementById('camper');
  if(camperEl)camperEl.scrollTop=0;
  if(push&&STACK[STACK.length-1]!=='camper')STACK.push('camper');

  _showScreen('camper');
}

/* SIGN OUT / IN */
function signOutPrompt(id,name){
  modal(`<h3>Sign out · ${esc(name)}</h3><p class="sub" style="margin:4px 0 8px">Signing this youth OUT of camp.</p>
    <label>Your name</label><input class="fld" id="soLeader" value="${esc(LAST_LEADER||'')}" placeholder="e.g. Sarah Doyle">
    <label>Reason</label><textarea id="soReason" placeholder="e.g. picked up by parents"></textarea>
    <label>Were parents met at pickup?</label><div class="seg" id="soPm"><button class="on" data-pm="yes" onclick="soPm(this)">Yes</button><button data-pm="no" onclick="soPm(this)">No</button></div>
    <button class="btn" onclick="signOutReview('${id}','${esc(name)}')">Review ${icSm('arrowr')}</button>
    <button class="btn ghost" style="margin-top:6px" onclick="closeModal()">Cancel</button>`);
  window._soPm='yes';
}
function soPm(b){document.querySelectorAll('#soPm button').forEach(x=>x.classList.remove('on'));b.classList.add('on');window._soPm=b.dataset.pm;}
function signOutReview(id,name){
  const leader=document.getElementById('soLeader').value.trim(),reason=document.getElementById('soReason').value.trim(),pm=window._soPm==='yes';
  if(!leader){toast('Add your name first');return;}if(!reason){toast('Add a reason');return;}
  LAST_LEADER=leader;window._soDraft={id,leader,reason,pm};

/* ===== NOTES ===== */
RENDER.testimonies=async function(){
  // A testimony is stored as a note with category 'testimony'. The student is optional —
  // the default is a general testimony with no specific student identified.
  // CH-2: the dropdown previously fetched only /campers (= isCamper, lifecycle ≥ arrived),
  // so a church login's youth who have NOT yet signed in (lifecycle 'registered') never
  // appeared and the list looked empty. Mirror RENDER.firstday: pull BOTH /registrants
  // (pre-arrival youth, kind 'camper') and /campers (arrived students, kind 'student') and
  // dedupe by id, so every one of the church's young people is selectable.
  const [campPage,regs]=await Promise.all([
    api('/campers?pageSize=300').catch(()=>[]),
    api('/registrants').catch(()=>[]),
  ]);
  const campers=(Array.isArray(campPage)?campPage:campPage.items||[]).filter(c=>c.kind==='student');
  const regYouth=(regs||[]).filter(r=>r.kind==='camper'&&r.status!=='cancelled');
  const byId={};
  campers.forEach(c=>{byId[c.id]={id:c.id,firstName:c.firstName,lastName:c.lastName,churchName:c.churchName};});
  regYouth.forEach(r=>{if(!byId[r.id])byId[r.id]={id:r.id,firstName:r.firstName,lastName:r.lastName,churchName:r.churchName};});
  const items=Object.values(byId).sort((a,b)=>(a.firstName+a.lastName).localeCompare(b.firstName+b.lastName));
  const opts=`<option value="" selected>No specific student identified</option>`
    +items.map(c=>`<option value="${c.id}">${esc(c.firstName+' '+c.lastName)} · ${esc(c.churchName)}</option>`).join('');
  paint('testimonies',`<div class="rowsb" style="margin-bottom:8px"><span class="lbl" style="margin:0">Submit a testimony</span>${helpTip('Record a God-moment from camp. Choosing a student is optional — leave it blank for a general testimony. Saved for leaders and directors to review.')}</div>
    <div class="infobox" style="font-size:.82rem">Record a testimony or God-moment from camp. Pick a student if it's about one, or leave it as a general testimony. It is saved with the records that leaders &amp; directors review.</div>
    <div class="card"><label>Student (optional)</label><select id="tmCamper">${opts}</select>
    <label>Your name (leader)</label><input class="fld" id="tmLeader" value="${esc(LAST_LEADER||'')}" placeholder="e.g. Sarah Doyle">
    <label>Testimony</label><textarea id="tmBody" placeholder="What happened? Whose story is it? What did God do?" style="min-height:120px"></textarea>
    <button class="btn" onclick="submitTestimony()">Submit testimony</button></div>`,'Submit Testimonies','Day 2+');
};
async function submitTestimony(){const camperId=sel('tmCamper'),leader=val('tmLeader'),body=val('tmBody');
  if(!body){toast('Write the testimony');return;}LAST_LEADER=leader;
  const full=leader&&leader!==ACTOR.displayName?`${body}\n— logged by ${leader}`:body;
  const payload={body:full,category:'testimony'};if(camperId)payload.camperId=camperId;
  try{await api('/notes',{method:'POST',body:payload});toast('Testimony submitted');const t=document.getElementById('tmBody');if(t)t.value='';}catch(e){toast(e.message);}}
RENDER.notes=async function(){
  // /notes/recent returns bare notes (no camper details) — join /campers for name/church/zone/gender/grade.
  const [notes,page]=await Promise.all([api('/notes/recent'),api('/campers?pageSize=300').catch(()=>[])]);
  const camps=Array.isArray(page)?page:page.items||[];const cmap={};camps.forEach(c=>{cmap[c.id]=c;});
  const noteRecs=(notes||[]).map(n=>{const c=cmap[n.camperId]||{};return Object.assign({},n,{camperName:c.firstName?(c.firstName+' '+c.lastName):(n.camperId||'No specific student'),church:c.churchName,zone:c.zone,gender:c.gender,grade:c.grade,cat:n.category||'note'});});
  // AC-8: synthesise "Signed out" records from the attendance data — students no longer at camp
  // (atCamp:false / lifecycle checked_out|departed) with a sign-out event. Each surfaces as a
  // record alongside testimonies/notes, sourced from signOutHistory.
  const signedOut=camps.filter(c=>c.atCamp===false&&(c.signOutHistory||[]).some(e=>e.type==='out')).map(c=>{
    const last=(c.signOutHistory||[]).filter(e=>e.type==='out').slice(-1)[0]||{};
    return {camperName:c.firstName+' '+c.lastName,church:c.churchName,zone:c.zone,gender:c.gender,grade:c.grade,
      cat:'signedout',body:last.reason?('Reason: '+last.reason):'Signed out of camp',authorName:last.leaderName||'—',createdAt:last.timestamp||c.updatedAt};
  });
  window._notesAll=[...noteRecs,...signedOut].sort((a,b)=>String(b.createdAt||'').localeCompare(String(a.createdAt||'')));
  const churches=[...new Set(window._notesAll.map(n=>n.church).filter(Boolean))].sort();
  const zonesPresent=[...new Set(window._notesAll.map(n=>n.zone).filter(Boolean))].sort();
  // AC-8: record filter gains "Signed out".
  const recSel=`<div><label>Record</label><select id="ntCat" onchange="drawNotes()"><option value="all">All records</option><option value="testimony">Testimony</option><option value="note">Student note</option><option value="firstaid">First-aid</option><option value="signedout">Signed out</option></select></div>`;
  const minSel=`<div><label>Ministry</label><select id="ntChurch" onchange="drawNotes()"><option value="all">All ministries</option>${churches.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('')}</select></div>`;
  const zoneSel=`<div><label>Zone</label><select id="ntZone" onchange="drawNotes()"><option value="all">All zones</option>${zonesPresent.map(z=>`<option value="${z}">${z} Zone</option>`).join('')}</select></div>`;
  // AC-7: swap Zone and Ministry positions — Zone first, then Ministry.
  paint('notes',`<button class="btn alt" onclick="exportNotes()">${icSm('download')} Export (CSV)</button>
    <div class="selrow">${recSel}${zoneSel}</div><div class="selrow">${minSel}</div>
    <div id="notesList"></div>`,'Testimonies & Student Notes','All zones · whole camp');
  drawNotes();
};
function drawNotes(){
  let list=window._notesAll||[];
  const cat=sel('ntCat')||'all',ch=sel('ntChurch')||'all',z=sel('ntZone')||'all';
  if(cat!=='all')list=list.filter(n=>(n.cat||'note')===cat);
  if(ch!=='all')list=list.filter(n=>n.church===ch);
  if(z!=='all')list=list.filter(n=>n.zone===z);
  const box=document.getElementById('notesList');if(!box)return;
  const badge=c=>c==='testimony'?'<span class="pill info">Testimony</span>':c==='signedout'?'<span class="pill warn">Signed out</span>':c==='firstaid'?'<span class="pill amb">First-aid</span>':'<span class="pill ok">Student note</span>';
  box.innerHTML=list.length?list.map(n=>{const c=n.cat||'note';
    const right=(n.gender)?`<span class="sub" style="white-space:nowrap">${n.grade?'Yr '+n.grade:(n.gender==='male'?'Guys':'Girls')}</span>`:'';
    // First-aid records carry a 4-line body (Problem/Treatment/First-aider/Brought by) — render
    // the Problem + Treatment lines distinctly rather than as one blob.
    let bodyHtml;
    if(c==='firstaid'){const p=_faParse(n.body);
      bodyHtml=`<div style="font-size:.86rem;margin:4px 0">
        ${p.problem?`<div><b style="color:var(--alert-ink)">Problem:</b> ${esc(p.problem)}</div>`:''}
        ${p.treatment?`<div><b style="color:var(--consent-ok-ink)">Treatment:</b> ${esc(p.treatment)}</div>`:''}
        ${p.firstAider?`<div class="sub" style="color:var(--ink-2)">First-aider: ${esc(p.firstAider)}${p.broughtBy?' · brought by '+esc(p.broughtBy):''}</div>`:''}</div>`;
    }else{bodyHtml=`<div style="font-size:.86rem;color:#475569;margin:4px 0">${esc(n.body)}</div>`;}
    return `<div class="card"><div class="rowsb" style="align-items:center"><div class="nm">${esc(n.camperName||'—')}</div>${right}</div>
    ${bodyHtml}
    <div class="sub">${esc(n.authorName)} · ${dtFmt(n.createdAt)}${n.church?' · '+esc(n.church):''} · ${badge(c)}</div></div>`;}).join(''):emptyState('note','No records match these filters.');
}
async function exportNotes(){
  try{const csv=await api('/notes/export');if(!csv||typeof csv!=='string'){toast('Nothing to export');return;}
    const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);const a=document.createElement('a');
    a.href=url;a.download='testimonies-and-notes-'+new Date().toISOString().slice(0,10)+'.csv';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
    toast('Exported');
  }catch(e){toast(e.message);}}

/* Bug-7: Bulk Church Update — one form listing every church with its login username (pre-filled)
   and a password field. Save applies all changed usernames + any entered passwords at once;
   a blank password leaves that church's password unchanged. */
function bulkChurchUpdate(){
  const churches=(window._allChurches||[]);const users=(window._allUsers||[]);
  const rows=churches.map(c=>{
    const cu=users.find(u=>u.role==='church'&&u.churchId===c.id);
    if(!cu)return `<div style="padding:8px 0;border-top:1px solid var(--line)"><div style="font-weight:700;font-size:.82rem;overflow:hidden;text-overflow:ellipsis">${esc(c.name)}</div><div class="sub" style="color:var(--danger)">No login account — add one first.</div></div>`;
    return `<div style="padding:8px 0;border-top:1px solid var(--line)">
      <div style="font-weight:700;font-size:.82rem;margin-bottom:5px;overflow:hidden;text-overflow:ellipsis">${esc(c.name)}</div>
      <div style="display:flex;gap:6px">
        <input class="fld" data-bcu="${cu.id}" data-cur="${esc(cu.username||'')}" value="${esc(cu.username||'')}" placeholder="username" autocapitalize="none" autocorrect="off" spellcheck="false" style="flex:1;margin:0">
        <input class="fld" data-bcp="${cu.id}" type="text" placeholder="new password (blank = keep)" autocapitalize="none" autocorrect="off" spellcheck="false" autocomplete="off" style="flex:1;margin:0">
      </div></div>`;
  }).join('');
  modal(`<h3>Bulk Church Update</h3>
    <p class="sub" style="margin:2px 0 6px">Update usernames and passwords for several churches at once. The username is pre-filled — edit any you want to change. Leave a password blank to keep the current one.</p>
    <div style="max-height:54vh;overflow:auto;margin:4px 0 10px">${rows||'<p class="note-hint">No churches yet.</p>'}</div>
    <button class="btn" onclick="saveBulkChurch()">Save all</button>
    <button class="btn ghost" style="margin-top:6px" onclick="closeModal()">Cancel</button>`);
}
async function saveBulkChurch(){
  const userInputs=[...document.querySelectorAll('#sheet [data-bcu]')];
  const passById={};document.querySelectorAll('#sheet [data-bcp]').forEach(p=>passById[p.getAttribute('data-bcp')]=p.value);
  // Validate everything first so one bad row never leaves a half-applied batch.
  const jobs=[];
  for(const inp of userInputs){
    const id=inp.getAttribute('data-bcu');const cur=inp.getAttribute('data-cur')||'';
    const uname=inp.value.trim();const pass=(passById[id]||'').trim();
    if(uname!==cur){
      if(!/^[A-Za-z0-9._-]{2,40}$/.test(uname)){toast('Invalid username: '+(uname||'(empty)'));return;}
      jobs.push({type:'username',id,username:uname});
    }
    if(pass){
      if(pass.length<6){toast('Passwords must be 6+ characters');return;}
      jobs.push({type:'password',id,password:pass});
    }
  }
  if(!jobs.length){toast('No changes to save');return;}
  let unC=0,pwC=0;
  try{
    for(const j of jobs){
      if(j.type==='username'){await api('/accounts/users/'+j.id,{method:'PATCH',body:{username:j.username}});unC++;}
      else{await api('/accounts/users/password',{method:'POST',body:{userId:j.id,password:j.password}});pwC++;}
    }
    closeModal();toast(`Saved · ${unC} username${unC===1?'':'s'}, ${pwC} password${pwC===1?'':'s'}`);await _rAccts();
  }catch(e){toast(e.message);await _rAccts();}
}

// Pure date helpers (UTC-anchored to match dayLong/timeFmt). YYYY-MM-DD in/out.
function _addDays(dateStr,n){const d=new Date(dateStr+'T12:00:00Z');if(isNaN(d))return'';d.setUTCDate(d.getUTCDate()+n);return d.toISOString().slice(0,10);}
function _datesBetween(start,end){const out=[];if(!start)return out;const s=new Date(start+'T12:00:00Z');let e=end?new Date(end+'T12:00:00Z'):s;if(isNaN(s)||isNaN(e)||e<s)return start&&!isNaN(s)?[start]:[];let cur=new Date(s);let guard=0;while(cur<=e&&guard++<60){out.push(cur.toISOString().slice(0,10));cur.setUTCDate(cur.getUTCDate()+1);}return out;}

function renderCheckinDaysPreview(){
  const el=document.getElementById('stDaysPreview');if(!el)return;
  const days=_datesBetween(val('stStart'),val('stEnd'));
  el.innerHTML=days.length?days.map(d=>`${dayLong(d)} <span style="opacity:.6">${d}</span>`).join(' &nbsp;·&nbsp; '):'<span style="opacity:.6">Set a start date to generate check-in days.</span>';
}
// Start date pre-fills the end date to the 4th day (e.g. Mon → Thu) when the end is
// empty or invalid; an explicit end the admin already chose is left untouched.
function onStartDateChange(){
  const start=val('stStart'),endEl=document.getElementById('stEnd');
  if(start&&endEl&&(!endEl.value||new Date(endEl.value)<new Date(start))){endEl.value=_addDays(start,3);}
  renderCheckinDaysPreview();
}
async function saveSettings(){
  try{
    const days=_datesBetween(val('stStart'),val('stEnd'));
    // PC-4: tentPrice/classroomPrice no longer sent from the UI (fields removed). The
    // CampSettings columns remain in the DB (deprecated) but are not surfaced or updated here.
    // Timezone is intentionally fixed at Australia/Brisbane (owner decision, Phase 6): the camp
    // is always Brisbane-time, so this re-asserts it on every save (self-healing). There is no
    // timezone field in the UI by design — if the camp ever moves timezones, this is the one line
    // a developer changes. Drives compliance-export timestamp localisation (audit-export.service).
    const churchLock=!!document.getElementById('stChurchLock')?.checked;
    const zoneLock=!!document.getElementById('stZoneLock')?.checked;
    const churchCheckinRestrict=!!document.getElementById('stChurchCheckinRestrict')?.checked;
    await api('/settings',{method:'PATCH',body:{campName:val('stName'),year:Number(val('stYear'))||new Date().getFullYear(),startDate:val('stStart'),endDate:val('stEnd'),timezone:'Australia/Brisbane',checkInDays:days,churchLoginLocked:churchLock,zoneLeaderLoginLocked:zoneLock,churchCheckinTimeRestricted:churchCheckinRestrict}});
    SETTINGS=await api('/settings',{noCache:true});SESSIONS=[];SEL_SESSION=null;SCHED_DAY=null;DEVO_DAY=null;
    toast('Settings saved');
  }catch(e){toast(e.message);}
}

/* ===== DATA (director/admin): filterable registration table + Elvanto-format export ===== */
let _dataCache=null; // cached /registrants for client-side filtering, default-sorted to import order
let _dataSortKey=null,_dataSortDir=1; // active column sort; null key = default import order
RENDER.data=async function(){
  if(!['director','admin'].includes(ACTOR.role)){paint('data','<p class="note-hint">This area is restricted to directors and admins.</p>','Data','');return;}
  const [regs,churches]=await Promise.all([
    api('/registrants').catch(()=>[]),
    api('/accounts/churches').catch(()=>[]),
  ]);
  // Default order = the order records were imported in (createdAt asc) — /registrants
  // itself returns alphabetical (last name), so re-sort here rather than trust the API order.
  _dataCache=(regs||[]).slice().sort((a,b)=>(a.createdAt||'').localeCompare(b.createdAt||''));
  _dataSortKey=null;_dataSortDir=1;
  const chOpts=['<option value="">All churches</option>'].concat(
    (churches||[]).map(c=>`<option value="${esc(c.id)}">${esc(c.name)}</option>`)).join('');
  const gradeOpts=['<option value="">All grades</option>','<option value="leader">Leaders</option>']
    .concat([7,8,9,10,11,12].map(g=>`<option value="${g}">Grade ${g}</option>`)).join('');
  paint('data',`<div class="card">
    <div class="h3" style="margin-top:0">Registration data</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">
      <select class="fld" id="dfCh" style="flex:1;min-width:140px" onchange="dataApply()">${chOpts}</select>
      <select class="fld" id="dfGen" style="flex:1;min-width:110px" onchange="dataApply()">
        <option value="">All genders</option><option value="male">Male</option><option value="female">Female</option></select>
      <select class="fld" id="dfGr" style="flex:1;min-width:120px" onchange="dataApply()">${gradeOpts}</select>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn" onclick="dataExport(true)">Export filtered</button>
      <button class="btn ghost" onclick="dataExport(false)">Export all</button>
    </div>
    <div id="dataCount" class="note-hint" style="margin-top:6px"></div>
    <div style="overflow-x:auto;margin-top:8px"><table id="dataTbl" style="min-width:860px;border-collapse:collapse;font-size:.8rem"></table></div>
  </div>`,'Data','Registrations');
  dataApply();
};
function dataFilters(){
  return {
    churchId:document.getElementById('dfCh')?.value||'',
    gender:document.getElementById('dfGen')?.value||'',
    grade:document.getElementById('dfGr')?.value||'',
  };
}
const DATA_COLS=[['Name','name'],['Church','church'],['Gender','gender'],['Grade','grade'],['Reg type','regType'],['Cost','cost'],['Discount code','discount'],['Mobile','mobile'],['Medical','medical'],['Dietary','dietary'],['Other','other'],['Blue card','blueCard']];
function _dataSortVal(r,key){
  switch(key){
    case 'name':return (r.lastName+', '+r.firstName).toLowerCase();
    case 'church':return (r.churchName||'').toLowerCase();
    case 'gender':return (r.gender||'').toLowerCase();
    case 'grade':return r.kind==='leader'?9999:(r.grade??-1);
    case 'regType':return (r.registrationType||'').toLowerCase();
    case 'cost':return r.registrationCost??-1;
    case 'discount':return (r.discountCode||'').toLowerCase();
    case 'mobile':return (r.mobile||'').replace(/\D/g,'');
    case 'medical':return (r.medicalConditions||[]).join(', ').toLowerCase();
    case 'dietary':return (r.dietaryRequirements||[]).join(', ').toLowerCase();
    case 'other':return (r.otherMedications||'').toLowerCase();
    case 'blueCard':return (r.blueCardNumber||'').toLowerCase();
    default:return '';
  }
}
// 3-state header click: unsorted (import order) → asc → desc → back to unsorted.
function dataSort(key){
  if(_dataSortKey!==key){_dataSortKey=key;_dataSortDir=1;}
  else if(_dataSortDir===1){_dataSortDir=-1;}
  else{_dataSortKey=null;_dataSortDir=1;}
  dataApply();
}
function dataApply(){
  const f=dataFilters();let rows=(_dataCache||[]).filter(r=>{
    if(f.churchId&&r.churchId!==f.churchId)return false;
    if(f.gender&&r.gender!==f.gender)return false;
    if(f.grade==='leader'){if(r.kind!=='leader')return false;}
    else if(f.grade){if(r.kind==='leader'||String(r.grade??'')!==f.grade)return false;}
    return true;
  });
  if(_dataSortKey)rows=rows.slice().sort((a,b)=>{
    const av=_dataSortVal(a,_dataSortKey),bv=_dataSortVal(b,_dataSortKey);
    if(av<bv)return -1*_dataSortDir;if(av>bv)return 1*_dataSortDir;return 0;
  });
  const td=v=>`<td style="border-bottom:1px solid var(--line);padding:5px 8px;white-space:nowrap;max-width:220px;overflow:hidden;text-overflow:ellipsis">${esc(v||'—')}</td>`;
  const body=rows.map(r=>{
    const grade=r.kind==='leader'?'Leader':(r.grade??'—');
    const cost=r.registrationCost!=null?'$'+r.registrationCost.toLocaleString():'—';
    return `<tr>${td(r.lastName+', '+r.firstName)}${td(r.churchName)}${td(r.gender)}${td(grade)}${td(r.registrationType)}${td(cost)}${td(r.discountCode)}${td(fmtPhone(r.mobile))}${td((r.medicalConditions||[]).join(', '))}${td((r.dietaryRequirements||[]).join(', '))}${td(r.otherMedications)}${td(r.blueCardNumber)}</tr>`;
  }).join('');
  const t=document.getElementById('dataTbl');
  const thead=DATA_COLS.map(([label,key])=>{
    const arrow=_dataSortKey===key?(_dataSortDir===1?' ▲':' ▼'):'';
    return `<th style="text-align:left;border-bottom:2px solid var(--line);padding:6px 8px;color:var(--muted);cursor:pointer;user-select:none;white-space:nowrap" onclick="dataSort('${key}')">${label}${arrow}</th>`;
  }).join('');
  if(t)t.innerHTML=`<thead><tr>${thead}</tr></thead><tbody>${body||'<tr><td colspan="12" style="padding:10px;color:var(--muted)">No matching registrants</td></tr>'}</tbody>`;
  const c=document.getElementById('dataCount');if(c)c.textContent=`${rows.length} of ${(_dataCache||[]).length} registrants`;
}
async function dataExport(filtered){
  try{
    let qs='';
    if(filtered){const f=dataFilters();const params=new URLSearchParams();
      if(f.churchId)params.set('churchId',f.churchId);
      if(f.gender)params.set('gender',f.gender);
      if(f.grade==='leader')params.set('kind','leader');
      else if(f.grade)params.set('grade',f.grade);
      const s=params.toString();if(s)qs='?'+s;}
    const csv=await api('/export/registrants'+qs);
    if(!csv||typeof csv!=='string'){toast('Nothing to export');return;}
    const url=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
    const a=document.createElement('a');a.href=url;
    a.download='camp-registrations-'+new Date().toISOString().slice(0,10)+'.csv';
    document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
  }catch(e){toast(e.message);}
}
/* ===== ADMIN: INDIVIDUAL STUDENT DATA EDIT (at-camp) =====
   After camp commences there are no more spreadsheet uploads, so the admin corrects
   individual student records here. Students only (leaders unaffected). Merges
   /registrants (not yet arrived) + /campers (arrived) — same dual-fetch as RENDER.firstday. */
let _stuCache=[],_stuChurches=[];
function _stuNorm(r,atCamp){return {id:r.id,firstName:r.firstName,lastName:r.lastName,gender:r.gender,grade:r.grade??null,
  churchId:r.churchId,churchName:r.churchName,zone:r.zone,accommodationKind:r.accommodationKind??null,
  medical:(r.medicalConditions||[]).join(', '),dietary:(r.dietaryRequirements||[]).join(', '),atCamp};}
RENDER.adminStudents=async function(){
  const [regs,campers,churches]=await Promise.all([
    api('/registrants').catch(()=>[]),
    api('/campers').catch(()=>[]),
    api('/accounts/churches').catch(()=>[]),
  ]);
  const byId={};
  (regs||[]).filter(r=>r.kind==='camper').forEach(r=>{byId[r.id]=_stuNorm(r,false);});
  (campers||[]).filter(c=>c.kind==='student').forEach(c=>{byId[c.id]=_stuNorm(c,c.atCamp!==false);});
  _stuCache=Object.values(byId);
  _stuChurches=churches||[];
  const chOpts=['<option value="">All churches</option>'].concat(
    _stuChurches.map(c=>`<option value="${esc(c.id)}">${esc(c.name)}</option>`)).join('');
  const gradeOpts=['<option value="">All grades</option>'].concat(GRADES.map(g=>`<option value="${g}">Grade ${g}</option>`)).join('');
  paint('adminStudents',`<div class="card">
    <div class="rowsb" style="align-items:center"><div class="h3" style="margin-top:0">Student data</div>
      <button class="btn sm" onclick="stuAdd()">${icSm('plus')} Add student</button></div>
    <p class="sub" style="margin:2px 0 8px">Tap a student to correct their record ${helpTip('Use this once camp is running — later spreadsheet uploads are unlikely, so fixes are made per student here. Changes apply immediately.')}</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">
      <select class="fld" id="sfCh" style="flex:1;min-width:140px" onchange="stuApply()">${chOpts}</select>
      <select class="fld" id="sfGen" style="flex:1;min-width:110px" onchange="stuApply()">
        <option value="">All genders</option><option value="male">Male</option><option value="female">Female</option></select>
      <select class="fld" id="sfGr" style="flex:1;min-width:120px" onchange="stuApply()">${gradeOpts}</select>
    </div>
    <div class="search"><span>${ic('search')}</span><input id="sfQ" placeholder="Search by name…" oninput="stuApply()"></div>
    <div id="stuCount" class="note-hint" style="margin-top:6px"></div>
    <div style="overflow-x:auto;margin-top:8px"><table id="stuTbl" style="min-width:560px;width:100%;border-collapse:collapse;font-size:.8rem"></table></div>
  </div>`,'Individual Student Data Edit','Admin');
  stuApply();
};
function stuApply(){
  const ch=sel('sfCh')||'',gen=sel('sfGen')||'',gr=sel('sfGr')||'',q=(val('sfQ')||'').toLowerCase();
  const rows=_stuCache.filter(s=>{
    if(ch&&s.churchId!==ch)return false;
    if(gen&&s.gender!==gen)return false;
    if(gr&&String(s.grade??'')!==gr)return false;
    if(q&&!(s.firstName+' '+s.lastName).toLowerCase().includes(q))return false;
    return true;
  }).sort((a,b)=>a.lastName.localeCompare(b.lastName)||a.firstName.localeCompare(b.firstName));
  const td=v=>`<td style="border-bottom:1px solid var(--line);padding:6px 8px;white-space:nowrap;max-width:180px;overflow:hidden;text-overflow:ellipsis">${v}</td>`;
  const accLbl=k=>k==='tent'?'Tent':k==='classroom'?'Classroom':'—';
  const body=rows.map(s=>`<tr onclick="stuEdit('${s.id}')" style="cursor:pointer">
    ${td(esc(s.lastName+', '+s.firstName))}${td(esc(s.churchName||'—'))}${td(s.grade??'—')}${td(esc(s.gender==='male'?'M':s.gender==='female'?'F':'—'))}${td(esc(accLbl(s.accommodationKind)))}${td(s.atCamp?'<span class="pill ok">At camp</span>':'<span class="pill info">Registered</span>')}
  </tr>`).join('');
  const hdr=['Name','Church','Gr','M/F','Accom','Status'];
  const t=document.getElementById('stuTbl');
  if(t)t.innerHTML=`<thead><tr>${hdr.map(h=>`<th style="text-align:left;border-bottom:2px solid var(--line);padding:6px 8px;color:var(--muted)">${h}</th>`).join('')}</tr></thead><tbody>${body||'<tr><td colspan="6" style="padding:10px;color:var(--muted)">No matching students</td></tr>'}</tbody>`;
  const c=document.getElementById('stuCount');if(c)c.textContent=`${rows.length} of ${_stuCache.length} students`;
}
function _stuFormFields(s){
  const chSel=`<select id="seCh">${_stuChurches.map(c=>`<option value="${esc(c.id)}"${s&&c.id===s.churchId?' selected':''}>${esc(c.name)}</option>`).join('')}</select>`;
  const genSel=`<select id="seGen"><option value="male"${s&&s.gender==='male'?' selected':''}>Male</option><option value="female"${s&&s.gender==='female'?' selected':''}>Female</option><option value="other"${s&&s.gender==='other'?' selected':''}>Other</option></select>`;
  const grSel=`<select id="seGr"><option value="">—</option>${GRADES.map(g=>`<option value="${g}"${s&&s.grade===g?' selected':''}>Grade ${g}</option>`).join('')}</select>`;
  const accSel=`<select id="seAcc"><option value=""${s&&!s.accommodationKind?' selected':''}>—</option><option value="tent"${s&&s.accommodationKind==='tent'?' selected':''}>Tent</option><option value="classroom"${s&&s.accommodationKind==='classroom'?' selected':''}>Classroom</option></select>`;
  return `<label>First name</label><input class="fld" id="seFirst" value="${esc(s?s.firstName:'')}">
    <label>Last name</label><input class="fld" id="seLast" value="${esc(s?s.lastName:'')}">
    <label>Church</label>${chSel}
    <label>Gender</label>${genSel}

function _renderImportPreview(r){

  const errHtml=(r.errors||[]).slice(0,5).map(e=>`<div style="color:#b91c1c;font-size:.8rem">Row ${e.row}: ${esc(e.message)}</div>`).join('');
  let phantomHtml='';
  if(phantoms.length){
    const autoUser=n=>n.toLowerCase().replace(/[^a-z0-9]/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'').slice(0,30)||'church';
    const rows=phantoms.map((n,i)=>`<div style="border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:8px">
      <div style="font-weight:700;margin-bottom:6px">${esc(n)}</div>

        <div style="flex:2;min-width:140px"><label style="font-size:.7rem">Password (min 6)</label><input class="fld" id="pzPass_${i}" placeholder="min 6 chars"></div>
      </div></div>`).join('');
    const btnLabel=`Create ${phantoms.length} church${phantoms.length===1?'':'es'} ${icSm('arrowr')}`;
    phantomHtml=`<div class="warnbox">${icSm('alert')} ${phantoms.length} unrecognised church${phantoms.length===1?'':'es'} in the CSV — set zone, username &amp; password to create them first:</div>
      ${rows}
      <button class="btn" style="margin-top:6px" onclick="_createPhantomChurches(${esc(JSON.stringify(phantoms))})">${btnLabel}</button>
      <button class="btn ghost" style="margin-top:6px;margin-left:6px" onclick="_clearImport()">Cancel</button>`;
  }
  const confirmHtml=_pendingImportCsv&&!phantoms.length?`<button class="btn" style="margin-top:8px" onclick="_confirmImport()">Confirm &amp; import</button> <button class="btn ghost" style="margin-top:8px;margin-left:6px" onclick="_clearImport()">Cancel</button>`:'';
  const delCount=r.deleted||0;
  const delNote=delCount?` · <b style="color:#b91c1c">${delCount} to delete</b>`:'';
  box.innerHTML=`<div class="infobox"><b>Preview (dry-run):</b> ${r.created} to add \xb7 ${r.updated} to update \xb7 ${r.skipped} to skip${delNote} \xb7 ${(r.errors||[]).length} errors</div>
    ${phantomHtml}${errHtml}${confirmHtml}`;
}
async function _createPhantomChurches(names){
  const btn=event.currentTarget||event.target;
  const origLabel=btn?btn.textContent:'';
  if(btn){btn.disabled=true;btn.textContent='Creating…';}
  const autoUser=n=>n.toLowerCase().replace(/[^a-z0-9]/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'').slice(0,30)||'church';
  for(let i=0;i<names.length;i++){
    const name=names[i];
    const zone=sel('pzZone_'+i)||'Yellow';
    const username=(document.getElementById('pzUser_'+i)?.value||'').trim()||autoUser(name);
    const pass=(document.getElementById('pzPass_'+i)?.value||'').trim();
    if(pass.length<6){toast('Password for "'+name+'" must be 6+ chars');if(btn){btn.disabled=false;btn.textContent=origLabel;}return;}
    if(!/^[A-Za-z0-9._-]{2,40}$/.test(username)){toast('Username for "'+name+'" is invalid — use letters, numbers, . _ - only (min 2 chars)');if(btn){btn.disabled=false;btn.textContent=origLabel;}return;}
    try{await api('/accounts/churches',{method:'POST',body:{churchName:name,zone,accountFirstName:name,accountLastName:'Team',accountUsername:username,accountPassword:pass}});}
    catch(e){toast('Failed to create "'+name+'": '+(e.message||'error'));if(btn){btn.disabled=false;btn.textContent='Retry';}return;}
  }
  toast(names.length+' church'+(names.length===1?'':'es')+' created');
  try{const r=await api('/import/csv',{method:'POST',body:{csvData:_pendingImportCsv,updateExisting:true,dryRun:true}});_renderImportPreview(r);}catch(e){toast(e.message);}
}
async function _confirmImport(){
  if(!_pendingImportCsv){toast('No import pending');return;}
  try{
    const r=await api('/import/csv',{method:'POST',body:{csvData:_pendingImportCsv,updateExisting:true,dryRun:false}});
    _pendingImportCsv=null;
    const box=document.getElementById('impResult');if(box){box.style.display='block';
      box.innerHTML=`<div class="callbox"><b style="color:#15803d">${r.created}</b> new · <b>${r.updated}</b> updated · ${r.skipped} skipped · <b style="color:#b91c1c">${(r.errors||[]).length}</b> errors</div>`;}
    toast('Import complete');
  }catch(e){toast(e.message);}
}
function _clearImport(){_pendingImportCsv=null;const b=document.getElementById('impResult');if(b)b.style.display='none';}


/* ===== SETUP WIZARD ===== */
// Logical camp-setup order: settings first (unlocks dates), then churches/accounts, then
// accommodation (rooms → allocation), then the day-by-day content (schedule/devotionals),
// then family-facing info (FAQ/contacts). Each step auto-detects "done" for the green tick,
// and carries a short plain-language tip (rendered as a helpTip bubble in the checklist).
const WIZARD_STEPS=[
  {key:'settings',label:'Camp settings',icon:'gear',screen:'adminSettings',tip:'Set the camp name and dates first — the dates unlock the schedule, devotionals and check-in days.',check:()=>!!(SETTINGS&&SETTINGS.campName&&SETTINGS.startDate)},
  {key:'churches',label:'Churches',icon:'users',screen:'adminAccounts',tip:'Add every church attending — or let the registration upload auto-create any church it names (zone defaults to Yellow; set its login and zone afterwards via Account Info, which also holds the per-church accommodation override).',check:async()=>{try{const c=await api('/accounts/churches');return(c||[]).length>0;}catch(e){return false;}}},
  {key:'accounts',label:'Accounts',icon:'users',screen:'adminAccounts',tip:'Create login accounts for church leaders, zone leaders and directors.',check:async()=>{try{const u=await api('/accounts/users');return(u||[]).filter(x=>x.role!=='admin').length>0;}catch(e){return false;}}},
  {key:'accom',label:'Accommodation rooms',icon:'classroom',screen:'adminAccom',tip:'Set up your sleeping rooms and give each one a capacity.',check:async()=>{try{const b=await api('/accommodation/classrooms');return(b||[]).length>0;}catch(e){return false;}}},
  {key:'accomAlloc',label:'Accommodation allocation',icon:'home',screen:'accom',tip:'Assign churches to rooms. Eligible groups auto-fill each room to capacity.',check:async()=>{try{const a=await api('/accommodation/allocations');return Object.values(a||{}).some(arr=>Array.isArray(arr)&&arr.some(e=>e&&Number(e.n)>0));}catch(e){return false;}}},
  {key:'schedule',label:'Schedule',icon:'clock',screen:'adminSchedEdit',tip:'Fill in each day’s activities and times for campers to follow.',check:async()=>{try{const s=await api('/schedule');return(s||[]).length>0;}catch(e){return false;}}},
  {key:'devos',label:'Devotionals',icon:'book',screen:'adminDevos',tip:'Write the daily verse, reflection and prayer for each camp day.',check:async()=>{try{const days=SETTINGS?.checkInDays||[];if(!days.length)return false;const dv=await Promise.all(days.map(d=>api('/devotional/'+d).catch(()=>null)));return dv.some(x=>x&&(x.verse||x.reflection||x.prayer));}catch(e){return false;}}},
  {key:'faq',label:'FAQ',icon:'help',screen:'adminFaq',tip:'Add common questions and answers for families to read before camp.',check:async()=>{try{const f=await api('/faq');return(f||[]).length>0;}catch(e){return false;}}},
  {key:'contacts',label:'Ministry contacts',icon:'phone',screen:'adminContacts',tip:'Set each church’s leader phone numbers, used for first-aid and emergencies.',check:async()=>{try{const c=await api('/accounts/churches');return(c||[]).some(ch=>{const t=ch.contacts||{};return['male','female'].some(g=>['primary','backup'].some(k=>t[g]&&t[g][k]&&t[g][k].name&&String(t[g][k].name).trim()));});}catch(e){return false;}}},
];
RENDER.adminWizard=async function(){

  const allDone=checks.every(Boolean);
  paint('adminWizard',`<div class="card"><div class="lbl" style="margin-top:0">Setup checklist</div>
    ${steps}
    ${allDone?'<div class="callbox" style="margin-top:12px">'+icSm('check')+' All steps complete — camp is ready to go.</div>':'<p class="note-hint">Complete each step in order.</p>'}

/* ===== ADMIN SCHEDULE ===== */
// One editable table row (Time + Activity). Index r keeps input ids unique per day.
// Inputs are addressed by CLASS within each .sched-row (not index-based ids), so a row can be
// deleted from the middle without renumbering the rest — saveSchedDay reads the live rows.
function _schedRow(d,r,t,n){return `<div class="sched-row" style="display:grid;grid-template-columns:96px minmax(0,1fr) auto;gap:6px;margin-bottom:6px;align-items:center">`
  +`<input class="fld sr-t" type="time" value="${esc(t||'')}">`
  +`<input class="fld sr-n" placeholder="Activity" value="${esc(n||'')}">`
  +`<button class="iconbtn danger" type="button" title="Delete row" onclick="this.closest('.sched-row').remove()">${icSm('trash')}</button></div>`;}
const SCHED_MIN_ROWS=7;
RENDER.adminSchedEdit=async function(){
  const days=SETTINGS?.checkInDays||[];
  if(!days.length){paint('adminSchedEdit','<p class="note-hint">Set the camp dates first (Camp settings).</p>','Schedule','');return;}
  const blocks=await Promise.all(days.map(async d=>{
    const items=(await api('/schedule?day='+d).catch(()=>[])).slice()
      .sort((a,b)=>String(a.startTime||'').localeCompare(String(b.startTime||'')));
    const n=Math.max(SCHED_MIN_ROWS,items.length);
    let rows='';for(let r=0;r<n;r++){const it=items[r]||{};rows+=_schedRow(d,r,it.startTime,it.title);}
    return `<div class="card"><div class="h3" style="margin-top:0">${dayLong(d)} <span style="color:var(--muted);font-weight:600">· ${d}</span></div>
      <div style="display:grid;grid-template-columns:96px minmax(0,1fr) auto;gap:6px;font-size:.6rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px"><span>Time</span><span>Activity</span><span style="width:32px"></span></div>
      <div id="schedRows_${d}">${rows}</div>
      <div style="display:flex;gap:6px;margin-top:8px">
        <button class="btn ghost sm" style="flex:1" onclick="addSchedRow('${d}')">+ Add row</button>
        <button class="btn sm" style="flex:1" onclick="saveSchedDay('${d}')">Save ${dayLong(d)}</button></div></div>`;
  }));
  paint('adminSchedEdit',blocks.join(''),'Schedule','Fill a day, then Save');
};
function addSchedRow(d){const wrap=document.getElementById('schedRows_'+d);if(!wrap)return;
  wrap.insertAdjacentHTML('beforeend',_schedRow(d,wrap.children.length,'',''));}
// Table is the source of truth: saving replaces the whole day's schedule with the
// filled rows (time + title both present). Cleared rows are dropped.
async function saveSchedDay(d){
  const wrap=document.getElementById('schedRows_'+d);if(!wrap)return;
  const entries=[];
  for(const row of Array.from(wrap.children)){const t=(row.querySelector('.sr-t')||{}).value||'',n=(row.querySelector('.sr-n')||{}).value||'';if(t&&n)entries.push({startTime:t,title:n});}
  try{
    const existing=await api('/schedule?day='+d,{noCache:true}).catch(()=>[]);
    for(const it of (existing||[])){await api('/schedule/'+it.id,{method:'DELETE'});}
    for(const e of entries){await api('/schedule',{method:'POST',body:{day:d,startTime:e.startTime,title:e.title,type:'activity'}});}
    toast('Saved '+dayLong(d)+'');await _rSched();
  }catch(e){toast(e.message);await _rSched();}
}

   pre-camp/at-camp nav after an admin switched mode until the user navigated Home. */
window.addEventListener('storage',e=>{
  if(e.key==='ycp_campmode'&&e.newValue)_applyModeChange(e.newValue);
});
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState!=='visible'||!ACTOR||PREVIEW_MODE)return;
  // A backgrounded tab may have missed the storage event — re-check the authoritative mode.
  api('/settings').then(s=>{if(s&&s.campMode)_applyModeChange(s.campMode);}).catch(()=>{});
});

/* PWA: register the service worker (network-first HTML shell, network-only API,
   cache-first assets). On a new SW taking control after a deploy, reload once so
   users get the latest UI without a manual refresh. */
if('serviceWorker'in navigator){
  let _reloading=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(_reloading)return;_reloading=true;location.reload();
  });
  window.addEventListener('load',()=>{navigator.serviceWorker.register('/sw.js').catch(()=>{});});
}

</script>
</body>
</html>
