<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1e1b4b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Youth Camp">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon.svg">
<link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<title>My Youth Camp</title>
<style>
:root{
/* palette */
--navy:#1e1b4b;--blue:#4f46e5;--blue2:#818cf8;--purple:#9333ea;--violet:#7c3aed;--teal:#06b6d4;--rose:#e11d48;--paper:#f5f4ff;--card:#fff;--ink:#1e1a3a;--muted:#6b7280;--line:#e4e2f5;--chip:#ede9fe;
/* indigo tints (C3) — previously scattered as raw hex; tokenised so the palette is one source of truth */
--violet-d:#5b21b6;--violet-dd:#3730a3;--tint:#f5f3ff;--tint-2:#ede9fe;--lav:#ddd6fe;--lav-2:#c4b5fd;
/* gender accents (C3 + AC-4) — bubble/bar colours: male blue, female pink */
--male:#1d4ed8;--male-bg:#dbeafe;--female:#db2777;--female-bg:#fce7f3;
/* spacing scale (C5) — L-1 (Phase 5): dropped the genuinely-unused steps (--s1/--s5/--s6/--s7,
   --r-lg); the remaining tokens are referenced in live styles. */
--s2:8px;--s3:12px;--s4:16px;--r-sm:10px;--r:14px;
--shadow-sm:0 4px 12px rgba(30,27,75,.07);
/* L-1: --ok was an unused duplicate of --green (itself removed); --warn/--danger/--info are used. */
--warn:#b45309;--danger:#b91c1c;--info:#4f46e5;
/* Phase 4 (first-aid UX): darker secondary ink for legibility (replaces --muted for body-level
   secondary text on the first-aid screens) + SOFTENED alert/consent surfaces (calm, not alarming). */
--ink-2:#4b4868;
--alert-bg:#fff8ed;--alert-bd:#fcd9a6;--alert-ink:#9a5b15;
--consent-ok-bg:#f1faf3;--consent-ok-bd:#bfe6c8;--consent-ok-ink:#1f7a43;
--consent-no-bg:#fdf3f3;--consent-no-bd:#f0c9c9;--consent-no-ink:#9b3232;
/* ── Fluid type scale (A1) ──────────────────────────────────────────────
   All sizes are rem against the ROOT (html) element, which scales 16→17→18px
   at 768/1280 (see the html/@media rules below). So every tokenised size grows
   proportionally phone→tablet→laptop — this is the headline responsive lever.
   Values preserve the current phone sizes; the file's ~33 accreted literals are
   mapped to the nearest step (≤~1px deltas — flagged for on-device review).
   --pad is the fluid screen gutter; it steps up at 540/768 (see .screen). */
--t-display:2.8rem;  /* hero marquee number (cluster: 2.8) */
--t-xl:2.2rem;       /* large stat / budget grand total (cluster: 2.2) */
--t-h1:1.4rem;       /* hero h2 / detail header (cluster: 1.3–1.4) */
--t-h2:1.2rem;       /* prominent headers (cluster: 1.2–1.25) */
--t-h3:1.05rem;      /* card / modal h3 (cluster: 1.05–1.1) */
--t-lg:1rem;         /* prominent body, search input, bar title (cluster: 1.0) */
--t-body:.9rem;      /* default body (cluster: .9–.94) */
--t-sm:.84rem;       /* secondary text (cluster: .8–.88) */
--t-xs:.74rem;       /* captions / hints / labels (cluster: .72–.78) */
--t-2xs:.68rem;      /* small labels (cluster: .64–.7) — M-2: nudged up toward the 11px floor */
--t-micro:.7rem;     /* uppercase tracking badges — M-2: raised .58→.7rem (≈9.3→11.2px @16px root)
                        so the smallest text clears the ~11px legibility floor (was below it) */
--pad:14px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;height:100dvh;}
/* A1: explicit root size (= the previous implicit 16px), scaled up at tablet/laptop so
   every rem-based size grows proportionally. This is the core fluid-type mechanism. */
html{font-size:16px;}
body{font:var(--t-body)/1.55 "Plus Jakarta Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--ink);background:#0b0a1a;display:flex;justify-content:center;height:100dvh;overflow:hidden;}
/* height:100dvh on body+app (not 100% of the layout viewport): on mobile the layout
   viewport can be shorter than the visual viewport when the URL bar is hidden, which
   left a strip of dark body background BELOW the bottom nav ("nav not at the bottom").
   Anchoring both to the dynamic viewport makes #tabs sit flush at the bottom. */
.app{width:100%;max-width:460px;height:100dvh;background:var(--paper);display:flex;flex-direction:column;position:relative;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.5);}
/* Header bar is WHITE at every width (owner: match the desktop/web header on phone too).
   Previously this was a violet→navy gradient on phone and only turned white at ≥980px; now
   the base bar is white with dark text and a hairline bottom border, and the badges/sign-out
   are restyled to read on white. The ≥980px block keeps only the wide-specific tweaks
   (subtitle hidden, no wrap). The purple camp identity still lives in the hero cards. */
.bar{background:#fff;color:var(--ink);border-bottom:1px solid var(--line);padding:max(14px,env(safe-area-inset-top)) 14px 6px;display:flex;align-items:center;flex-wrap:wrap;column-gap:7px;row-gap:2px;flex:none;z-index:20;position:relative;}
.bar .bk{width:34px;height:34px;border-radius:50%;display:none;place-items:center;background:var(--chip);color:var(--violet-d);font-size:var(--t-h3);flex:none;cursor:pointer;align-self:center;}
.bar.canback .bk{display:grid;}
/* Title + subtitle share one line ("My Church Hub — All churches"); the subtitle
   truncates first, the title stays whole. */
.bar .ttl{flex:1 0 calc(100% - 41px);min-width:0;display:flex;align-items:baseline;gap:6px;overflow:hidden;}
.bar .ttl .t{font-weight:700;font-size:var(--t-lg);white-space:nowrap;flex:none;color:var(--navy);}
.bar .ttl .s{font-size:var(--t-xs);color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
.bar .ttl .s:not(:empty)::before{content:"— ";opacity:.7;}
/* Badges/sign-out: smaller and dropped to the bottom of the bar so they don't
   crowd the title's vertical space. */
.bar-actions{display:flex;align-items:center;gap:6px;flex:none;margin-left:auto;}
.mode-badge{font-size:var(--t-micro);font-weight:800;padding:2px 8px;border-radius:999px;white-space:nowrap;flex:none;letter-spacing:.03em;border:1px solid rgba(0,0,0,.12);}
.role-badge{font-size:var(--t-micro);font-weight:800;background:var(--chip);color:var(--violet-d);border:1px solid var(--lav);border-radius:999px;padding:2px 8px;white-space:nowrap;flex:none;letter-spacing:.03em;}
.sign-out{padding:3px 10px;border-radius:999px;background:#fff;color:var(--ink);font-size:var(--t-2xs);font-weight:700;flex:none;cursor:pointer;white-space:nowrap;border:1px solid var(--line);}
.stage{flex:1;position:relative;overflow:hidden;}
.screen{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:var(--pad) var(--pad) 26px;display:none;}
.screen.active{display:block;animation:rise .25s ease;}
@keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.tabs{display:flex;background:#fff;border-top:1px solid var(--line);flex:none;padding:4px 6px calc(4px + env(safe-area-inset-bottom));gap:2px;z-index:20;}
.tab{flex:1;text-align:center;padding:7px 4px 6px;font-size:var(--t-xs);color:var(--muted);cursor:pointer;border:none;background:none;position:relative;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px;border-radius:12px;transition:background .15s,color .15s;}
.tab .ic{display:block;transition:transform .15s;}
.tab.on{color:var(--blue);font-weight:700;background:var(--chip);}
.tab.on .ic{transform:scale(1.08);}
.tab .tb{position:absolute;top:4px;right:50%;transform:translateX(16px);background:var(--rose);color:#fff;font-size:var(--t-micro);font-weight:800;border-radius:999px;min-width:16px;height:16px;padding:0 4px;display:none;place-items:center;}
.hero{background:radial-gradient(130% 130% at 0% 0%,#9333ea,#1e1b4b 72%);color:#fff;border-radius:22px;padding:18px;margin-bottom:14px;position:relative;overflow:hidden;}
.hero:after{content:"";position:absolute;right:-40px;top:-40px;width:150px;height:150px;background:rgba(255,255,255,.06);border-radius:50%;}
.hero:before{content:"";position:absolute;left:-20px;bottom:-30px;width:100px;height:100px;background:rgba(124,58,237,.3);border-radius:50%;}
.hero .k{font-size:var(--t-2xs);letter-spacing:.16em;text-transform:uppercase;color:#d8b4fe;font-weight:700;}
.hero h2{font-size:var(--t-h1);margin:5px 0 2px;font-weight:800;}
.hero .cd{display:flex;gap:12px;align-items:flex-end;margin-top:12px;}
.hero .big{font-size:var(--t-display);font-weight:800;line-height:.9;}.hero .cd .meta{font-size:var(--t-sm);color:#e9d5ff;padding-bottom:4px;}
.nownext{background:linear-gradient(135deg,var(--violet-d),#1e1b4b);color:#fff;border-radius:16px;padding:14px 16px;margin-bottom:12px;}
.nownext .now{font-weight:800;}.nownext .nx{font-size:var(--t-sm);color:var(--lav);margin-top:2px;}
.notice{display:flex;gap:10px;align-items:flex-start;background:var(--tint);border:1px solid var(--lav);border-radius:14px;padding:12px 14px;margin-bottom:12px;cursor:pointer;transition:background .12s;}
.notice:active{background:var(--chip);}
.notice.urg{background:#fef2f2;border-color:#fecaca;}
.notice .nico{font-size:var(--t-lg);line-height:1.35;flex:none;}
.notice .nt{font-weight:700;font-size:var(--t-sm);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.notice .ns{font-size:var(--t-xs);color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.notice .ndis{flex:none;margin-left:6px;border:none;background:transparent;color:var(--muted);font-size:var(--t-h2);line-height:1;cursor:pointer;padding:0 2px;}
.notice .ndis:active{color:#111;}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(30,27,75,.06);}
.card.tap{cursor:pointer;transition:transform .12s,box-shadow .12s;}.card.tap:active{transform:scale(.985);box-shadow:none;}
.rowsb{display:flex;justify-content:space-between;align-items:center;gap:10px;}
.lbl{font-size:var(--t-xs);font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:2px 0 9px;}
.h3{font-size:var(--t-xs);font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin:16px 2px 9px;}
h3.sec{font-size:var(--t-xs);font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:18px 2px 9px;}
.bar7{height:9px;border-radius:999px;background:var(--chip);overflow:hidden;margin:9px 0 8px;}.bar7>i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--violet),var(--blue2));}
.pill{font-size:var(--t-2xs);font-weight:700;padding:3px 9px;border-radius:999px;display:inline-block;letter-spacing:.02em;white-space:nowrap;flex-shrink:0;}
.pill.ok{background:#dcfce7;color:#15803d;}.pill.warn{background:#fee2e2;color:#b91c1c;}.pill.amb{background:#fef3c7;color:#92400e;}.pill.info{background:var(--chip);color:var(--violet-d);}
.pills{display:flex;gap:7px;flex-wrap:wrap;}
/* A4: fluid tile grid — auto-fill gives a continuous 2→3→4 column progression as the
   container widens (min tile 132px), instead of a single 2→3 jump at 980px. */
.tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(132px,1fr));gap:11px;margin-bottom:4px;grid-auto-rows:1fr;}
.tile{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px 10px;min-height:92px;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;transition:transform .12s,box-shadow .12s;box-shadow:0 2px 8px rgba(30,27,75,.06);position:relative;}
.tile:active{transform:scale(.95);box-shadow:none;}.tile .ic{font-size:1.65rem;display:block;color:var(--purple);}.tile .l{font-size:var(--t-xs);font-weight:700;margin-top:7px;color:#1e1a3a;}
.tile .sub{max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* SVG icon system (3.1) + size helpers (C1/C4) */
.ic-svg{width:20px;height:20px;display:inline-block;vertical-align:middle;flex:none;stroke:currentColor;}
.ic-svg.ic-sm{width:16px;height:16px;}
.ic-svg.ic-lg{width:32px;height:32px;}
.ic-svg.ic-xl{width:48px;height:48px;}
.ic-svg.cwhite{stroke:#fff;color:#fff;width:16px;height:16px;}
/* Empty-state component (C4): consistent icon + message across lists */
.emptyst{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:40px 16px;color:var(--muted);text-align:center;}
.emptyst .ic-svg{color:var(--lav-2);}
.emptyst-msg{font-size:var(--t-sm);font-weight:600;max-width:30ch;}
/* Budget collapsible church rows (H/§5, L3 expander) */
.budchurch-body{max-height:0;overflow:hidden;transition:max-height .26s ease;}
.budchurch.open .budchurch-body{max-height:1200px;}
.budchurch .budchev{display:inline-block;transition:transform .2s;color:var(--lav-2);}
.budchurch.open .budchev{transform:rotate(90deg);}
.budcat-l{font-size:var(--t-sm);font-weight:600;}
.budcat-warn .budcat-l{color:var(--warn);}
.budcat-warn .ic-svg{color:var(--warn);}
/* A7/PC-12: classroom-allocation room cards as wrapping narrow tiles */
.accom-rooms{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;align-items:start;}
.accom-rooms>.card{margin-bottom:0;}
/* ── Accessibility & micro-interactions (E1/E4/L1) ── */
/* E1: visible focus ring on every interactive element (keyboard only via :focus-visible). */
button:focus-visible,a:focus-visible,select:focus-visible,input:focus-visible,textarea:focus-visible,
.tile:focus-visible,.row:focus-visible,.tab:focus-visible,.wide-nav-item:focus-visible,.iconbtn:focus-visible,.card.tap:focus-visible{
  outline:2px solid var(--blue);outline-offset:2px;border-radius:8px;}
/* E2 / M-1 (Phase 5): the iconbtn rule lives in ONE place now (below, with the visual chrome).
   The 32×32 visual box keeps a ≥44px HIT AREA via a transparent ::before, instead of the old
   contradictory pair (min-44 here vs width-32 below, which rendered a 44px box and ignored the
   intended compact look). */
/* L1: tactile press feedback on tappable surfaces (reduced-motion aware below). */
.tile:active,.row:active,.wide-nav-item:active,.budchurch-hd:active{transform:scale(.985);}
/* E4: honour prefers-reduced-motion — disable transitions/animations/transforms. */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important;}
  .screen.active{animation:none;}
  .tile:active,.row:active,.card.tap:active,.btn:active,.budchurch .budchev{transform:none;}
}
.tile .ic-svg{width:26px;height:26px;}
.tab .ic-svg{width:21px;height:21px;}
.notice .nico .ic-svg{width:18px;height:18px;}
.search .ic-svg{width:18px;height:18px;color:var(--blue);}
.btn .ic-svg{width:15px;height:15px;margin-right:3px;}
/* Account rows (admin → Accounts): one line per login with icon actions */
.acct-row{display:flex;align-items:center;gap:8px;padding:9px 2px;border-top:1px solid var(--line);}
.acct-row:first-child{border-top:none;}
.acct-actions{display:flex;gap:5px;flex:none;}
/* M-1: single source for .iconbtn — 32×32 visual chrome, ≥44px tappable via the ::before slop. */
.iconbtn{background:#f1f0ff;border:1px solid var(--line);border-radius:9px;width:32px;height:32px;display:grid;place-items:center;cursor:pointer;color:var(--blue);padding:0;position:relative;}
.iconbtn::before{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:44px;height:44px;}
.iconbtn .ic-svg{width:17px;height:17px;}
.iconbtn:active{background:#e0ddff;}
.iconbtn.danger{color:var(--danger);background:#fef2f2;border-color:#fecaca;}
.acct-legend{display:flex;flex-wrap:wrap;gap:12px;font-size:var(--t-xs);color:var(--muted);background:var(--tint);border-radius:10px;padding:9px 11px;margin-bottom:10px;}
.acct-legend span{display:inline-flex;align-items:center;gap:5px;}
.acct-legend .ic-svg{width:15px;height:15px;}
.tile .b{position:absolute;top:7px;right:8px;background:var(--rose);color:#fff;font-size:var(--t-micro);font-weight:800;border-radius:999px;padding:2px 6px;}
.row{display:flex;align-items:center;gap:11px;padding:11px 13px;background:#fff;border:1px solid var(--line);border-radius:14px;margin-bottom:8px;cursor:pointer;transition:background .12s;}
.row:active{background:var(--tint);}
.row.checked{background:#f0fdf4;border-color:#bbf7d0;}
.av{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;font-size:var(--t-sm);font-weight:700;color:var(--violet-d);background:var(--chip);flex:none;}
.av.male{background:var(--male-bg);color:var(--male);}.av.female{background:var(--female-bg);color:#be185d;}
.nm{font-weight:700;font-size:var(--t-body);color:var(--ink);}.sub{font-size:var(--t-xs);color:var(--muted);}
.chev{color:var(--lav-2);font-size:var(--t-h3);font-weight:700;}
.search{display:flex;align-items:center;gap:8px;background:#fff;border:2px solid var(--blue);border-radius:14px;padding:11px 13px;margin-bottom:12px;box-shadow:0 0 0 3px rgba(79,70,229,.08);}
.search input{border:none;outline:none;font-size:var(--t-lg);flex:1;background:none;font-family:inherit;}
.faq-item{background:#fff;border:1px solid var(--line);border-radius:13px;margin-bottom:8px;overflow:hidden;}
.faq-item .q{padding:13px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-weight:600;font-size:var(--t-body);gap:10px;}
.faq-item .q .pm{color:var(--blue);font-size:var(--t-h2);transition:transform .2s;flex:none;}
.faq-item .a{max-height:0;overflow:hidden;transition:max-height .25s ease;font-size:var(--t-sm);color:#475569;padding:0 14px;}
.faq-item.open .a{max-height:360px;padding:0 14px 13px;}.faq-item.open .q .pm{transform:rotate(45deg);}
.findcard{background:#f8fbff;border:1.5px solid #dbe6ff;border-radius:14px;padding:13px;margin-bottom:10px;}
.kv{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed #dbe6ff;font-size:var(--t-sm);gap:10px;}
.kv:last-of-type{border:none;}.kv .k{color:var(--muted);}.kv .v{font-weight:600;text-align:right;}
.kv2{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line);font-size:var(--t-body);gap:10px;}
.kv2:last-child{border:none;}.kv2 .k{color:var(--muted);}.kv2 .v{font-weight:600;text-align:right;}
.med{background:#fde2e1;color:#b91c1c;border-radius:8px;padding:4px 9px;font-size:var(--t-xs);font-weight:600;display:inline-block;margin:5px 0;}
.seg{display:flex;background:var(--chip);border-radius:14px;padding:4px;gap:4px;margin-bottom:12px;}
.seg button{flex:1;border:none;background:none;padding:9px 4px;border-radius:10px;font-size:var(--t-sm);font-weight:700;color:var(--muted);cursor:pointer;transition:background .15s,color .15s,box-shadow .15s;font-family:inherit;}
.seg button.on{background:#fff;color:var(--blue);box-shadow:0 2px 8px rgba(79,70,229,.15);}
.filters{display:flex;gap:8px;margin-bottom:11px;}
.filters select{flex:1;font-size:var(--t-sm);padding:8px 10px;}
.ncard{background:#fff;border:1px solid var(--line);border-left:4px solid var(--lav-2);border-radius:14px;padding:12px 14px;margin-bottom:9px;}
.ncard.urgent{border-left-color:var(--rose);}.ncard.zone{border-left-color:var(--teal);}
.ntag{font-size:var(--t-micro);font-weight:800;text-transform:uppercase;padding:2px 9px;border-radius:999px;background:var(--chip);color:var(--violet-d);letter-spacing:.03em;}
.ntime{margin-left:auto;font-size:var(--t-2xs);color:#94a3b8;}.ntop{display:flex;gap:7px;align-items:center;margin-bottom:4px;}
.ntitle{font-weight:700;font-size:var(--t-body);}.nbody{font-size:var(--t-sm);color:#475569;margin-top:2px;}.nfrom{font-size:var(--t-xs);color:#94a3b8;margin-top:5px;}
.noteitem{background:#faf5ff;border:1px solid #e9d5ff;border-radius:12px;padding:10px 12px;margin-bottom:7px;font-size:var(--t-sm);}
.noteitem .meta{font-size:var(--t-2xs);color:#94a3b8;margin-top:3px;}
.note-hint{font-size:var(--t-xs);color:var(--muted);text-align:center;margin-top:10px;}
/* ── Phase 4 — First-aid screens (Student Info / Records / log action) ──────────
   Calm, legible, token-only. Softened medical alert + consent (no alarm red/green);
   ministry-leader contacts are the focus; parent sits quietly at the bottom. */
.fa-id{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.fa-bubble{width:50px;height:50px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:var(--t-h3);}
.fa-bubble.male{background:var(--male-bg);color:var(--male);}
.fa-bubble.female{background:var(--female-bg);color:var(--female);}
.fa-id h2{font-size:var(--t-h1);font-weight:800;line-height:1.15;}
.fa-id .meta{font-size:var(--t-xs);color:var(--ink-2);margin-top:2px;}
.fa-status{display:inline-flex;align-items:center;gap:4px;font-size:var(--t-2xs);font-weight:800;padding:3px 9px;border-radius:999px;margin-top:5px;}
.fa-status.on{background:var(--consent-ok-bg);color:var(--consent-ok-ink);border:1px solid var(--consent-ok-bd);}
.fa-status.off{background:var(--alert-bg);color:var(--alert-ink);border:1px solid var(--alert-bd);}
.fa-alert{border:1px solid var(--alert-bd);background:var(--alert-bg);border-radius:var(--r);padding:var(--s4);margin-bottom:var(--s3);}
.fa-alert .ah{display:flex;align-items:center;gap:8px;font-weight:800;color:var(--alert-ink);font-size:var(--t-h3);margin-bottom:var(--s2);}
.fa-alert .row{display:flex;gap:9px;align-items:flex-start;padding:6px 0;border-top:1px solid var(--alert-bd);}
.fa-alert .row:first-of-type{border-top:none;}
.fa-alert .tag{font-size:var(--t-2xs);font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--alert-ink);background:#fff;border:1px solid var(--alert-bd);padding:3px 7px;border-radius:6px;flex:none;min-width:72px;text-align:center;}
.fa-alert .b{font-weight:700;font-size:var(--t-sm);}
.fa-calm{font-size:var(--t-sm);color:var(--ink-2);font-weight:600;}
.fa-consent{display:flex;align-items:center;gap:11px;border-radius:var(--r);padding:13px var(--s4);margin-bottom:var(--s3);font-weight:800;}
.fa-consent .ic-svg{flex:none;}
.fa-consent.yes{background:var(--consent-ok-bg);border:1px solid var(--consent-ok-bd);color:var(--consent-ok-ink);}
.fa-consent.no{background:var(--consent-no-bg);border:1px solid var(--consent-no-bd);color:var(--consent-no-ink);}
.fa-consent .sub{font-weight:600;font-size:var(--t-xs);opacity:.92;}
.fa-lead{border:1.5px solid var(--lav);background:var(--card);border-radius:var(--r);padding:var(--s4);margin-bottom:var(--s3);box-shadow:var(--shadow-sm);}
.fa-lead .lh{display:flex;align-items:center;gap:7px;font-size:var(--t-xs);font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--violet-dd);margin-bottom:var(--s2);}
.fa-lead .who{display:flex;align-items:center;gap:6px;margin-bottom:2px;}
.fa-lead .who .nm{font-weight:800;font-size:var(--t-body);}
.fa-lead .who .ptag{font-size:var(--t-2xs);font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:2px 7px;border-radius:999px;background:var(--tint-2);color:var(--violet-dd);}
.fa-lead .who .ptag.sec{background:var(--paper);color:var(--ink-2);border:1px solid var(--line);}
.fa-lead .sub{font-size:var(--t-xs);color:var(--ink-2);margin-bottom:8px;}
/* leader + parent call buttons: clear background, black text, bordered (icon is the affordance) */
.btn.fa-call{background:none;color:var(--ink);border:1.5px solid var(--lav);width:100%;}
.btn.fa-parent{background:none;color:var(--ink-2);border:1.5px solid var(--line);width:100%;font-weight:700;}
.fa-last{margin-top:6px;padding-top:14px;border-top:1px dashed var(--lav);}
.fa-diet{display:inline-block;font-size:var(--t-xs);font-weight:700;background:var(--tint-2);color:var(--violet-dd);border:1px solid var(--lav);padding:3px 9px;border-radius:999px;margin:2px 3px 2px 0;}
.fa-recent{background:var(--tint);border:1px solid var(--lav);border-radius:var(--r-sm);padding:11px var(--s3);font-size:var(--t-xs);}
.fa-recent .r{display:flex;gap:8px;padding:4px 0;}
.fa-recent .r .tm{color:var(--ink-2);flex:none;min-width:62px;}
.fa-rec{padding:12px 4px;border-bottom:1px solid var(--line);}
.fa-rec:last-child{border-bottom:none;}
.fa-rec .top{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.fa-rec .top .nm{font-weight:800;font-size:var(--t-sm);}
.fa-rec .top .tm{margin-left:auto;font-size:var(--t-xs);color:var(--ink-2);}
.fa-rec .ln{font-size:var(--t-sm);margin-top:2px;}
.fa-rec .ln b{color:var(--alert-ink);font-weight:800;}
.fa-rec .ln.tx b{color:var(--consent-ok-ink);}
.fa-form2{display:flex;flex-direction:column;gap:0;}
.fa-form2 > div{flex:1;}
@media(min-width:540px){.fa-form2{flex-direction:row;gap:10px;}}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px 0;color:var(--muted);gap:12px;}
.spin{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
/* Schedule-edit rows: let native time/text inputs shrink to their grid track (min-width:auto
   on inputs was overflowing the Time field into the Activity field on narrow phones). */
.sched-row input{min-width:0;}
/* Top loading bar (#nprog): a thin accent bar that animates whenever a real network request
   is in flight (cache hits skip it). Gives instant "it's working" feedback on button/tab taps
   that otherwise sat still during the 1–1.5s serverless round-trip. Anchored to the BOTTOM edge
   of the header bar (.bar, its positioned parent) rather than the very top of the screen. */
#nprog{position:absolute;bottom:-1px;left:0;height:3px;width:0;z-index:60;background:linear-gradient(90deg,var(--violet),var(--blue2));border-radius:0 2px 2px 0;opacity:0;transition:width .18s ease,opacity .3s ease;pointer-events:none;box-shadow:0 0 8px rgba(124,58,237,.55);}
#nprog.on{opacity:1;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#e2e8f0;flex-shrink:0;}
.sync-dot.pending{background:#fbbf24;animation:pulse 1s infinite;}
.sync-dot.synced{background:#22c55e;}
.sync-dot.error{background:#ef4444;}
/* B-1: check-in sync banner — amber while draining, red (tappable) when an online error
   dropped a tap. Uses status tokens; no new hex. */
.ci-sync{display:flex;align-items:center;gap:8px;border-radius:12px;padding:10px 13px;margin-bottom:10px;font-size:var(--t-sm);font-weight:700;}
.ci-sync-pending{background:#fef3c7;color:var(--warn);border:1px solid #fcd34d;}
.ci-sync-fail{background:#fee2e2;color:var(--danger);border:1px solid #fecaca;cursor:pointer;}
.ci-sync-fail:active{background:#fecaca;}
.loading .lt{font-size:var(--t-xs);font-weight:600;}
.callbox{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:14px;padding:13px;font-size:var(--t-sm);color:#166534;margin-bottom:10px;}
.warnbox{background:#fffbeb;border:1px solid #fcd34d;border-radius:14px;padding:13px;font-size:var(--t-sm);color:#92400e;margin-bottom:10px;}
.infobox{background:var(--tint);border:1px solid var(--lav);border-radius:14px;padding:13px;font-size:var(--t-sm);color:var(--violet-d);margin-bottom:10px;}
.toast{position:absolute;left:50%;bottom:88px;transform:translateX(-50%) translateY(20px);background:linear-gradient(135deg,var(--violet-dd),#1e1b4b);color:#fff;padding:11px 20px;border-radius:999px;font-size:var(--t-sm);font-weight:700;opacity:0;pointer-events:none;transition:.25s;z-index:40;max-width:90%;text-align:center;box-shadow:0 4px 16px rgba(79,70,229,.35);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.modal{position:absolute;inset:0;background:rgba(14,10,30,.6);display:none;align-items:flex-end;z-index:50;}
.modal.show{display:flex;}
.sheet{background:#fff;width:100%;border-radius:24px 24px 0 0;padding:20px 17px max(20px,env(safe-area-inset-bottom));animation:rise .2s;max-height:88dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.sheet::before{content:"";display:block;width:36px;height:4px;background:#e4e2f5;border-radius:2px;margin:0 auto 14px;}
.sheet h3{font-size:var(--t-h3);color:var(--navy);margin-bottom:8px;font-weight:800;}
label{display:block;font-size:var(--t-xs);font-weight:700;color:var(--muted);margin:12px 2px 5px;letter-spacing:.04em;text-transform:uppercase;}
.fld,select,textarea{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:11px 13px;font-size:var(--t-body);font-family:inherit;background:#fff;outline:none;transition:border-color .15s,box-shadow .15s;}
.fld:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,70,229,.1);}
textarea{min-height:84px;resize:vertical;}
.btn{display:block;width:100%;background:linear-gradient(135deg,var(--violet),var(--blue));color:#fff;border:none;border-radius:14px;padding:14px;font-size:var(--t-body);font-weight:700;text-align:center;cursor:pointer;margin-top:8px;letter-spacing:.01em;}
.btn:active{transform:scale(.98);opacity:.92;}.btn.alt{background:#fff;color:var(--blue);border:1.5px solid var(--blue);background:none;}
.btn.sm{width:auto;padding:8px 13px;margin:0;font-size:var(--t-xs);border-radius:10px;}
.btn.red{background:linear-gradient(135deg,#e11d48,#9f1239);}.btn.ghost{background:#f1f0ff;color:var(--violet-dd);}
.detail-hd{background:linear-gradient(135deg,#9333ea,#1e1b4b);color:#fff;border-radius:22px;padding:20px 18px;margin-bottom:14px;text-align:center;}
.detail-hd .av-lg{width:66px;height:66px;border-radius:50%;background:rgba(255,255,255,.2);display:grid;place-items:center;font-size:var(--t-h1);font-weight:800;margin:0 auto 10px;}
.detail-hd h2{font-size:var(--t-h1);}
.snap .bignum{font-size:var(--t-xl);font-weight:800;line-height:1;color:var(--navy);}
.accbadge{font-size:var(--t-2xs);font-weight:800;padding:7px 12px;border-radius:999px;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.accbadge.tent{background:#dcfce7;color:#15803d;}.accbadge.classroom{background:var(--chip);color:var(--violet-d);}.accbadge.mixed{background:#fef3c7;color:#92400e;}
.gbar{display:flex;height:16px;border-radius:999px;overflow:hidden;background:#eef2f8;margin:4px 0 6px;}
.gbar i{display:block;height:100%;}.gbar .m{background:linear-gradient(90deg,#818cf8,#4f46e5);}.gbar .f{background:linear-gradient(90deg,#f472b6,var(--female));}
.glabels{font-size:var(--t-xs);color:var(--muted);font-weight:600;display:flex;justify-content:space-between;}
.gradebars{display:flex;gap:6px;align-items:flex-end;height:92px;padding-top:8px;}
.gcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;justify-content:flex-end;}
.gcol .gbar-col{width:100%;max-width:30px;border-radius:6px 6px 3px 3px;background:linear-gradient(180deg,var(--lav-2),var(--blue));min-height:4px;}
.gcol.empty .gbar-col{background:#e6ecf5;}.gcol .n{font-size:var(--t-xs);font-weight:800;color:var(--navy);}.gcol .g{font-size:var(--t-micro);color:var(--muted);font-weight:700;}
.statband{display:flex;gap:8px;margin-bottom:12px;}
.statband .s{flex:1;background:#fff;border:1px solid var(--line);border-radius:14px;padding:11px 8px;text-align:center;}
.statband .s b{display:block;font-size:var(--t-h1);color:var(--navy);line-height:1.1;font-weight:800;}.statband .s span{font-size:var(--t-2xs);color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
/* 4-up accommodation tiles (home): a 2×2 grid on phone so the longer labels stay readable. */
.statband-4{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
/* Gender filter buttons (first-aid All Students). */
.fa-seg{display:flex;gap:6px;margin-bottom:10px;}
.fa-seg button{flex:1;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:10px;padding:8px;font-weight:700;font-family:inherit;font-size:var(--t-sm);cursor:pointer;}
.fa-seg button.on{background:var(--chip);border-color:var(--blue);color:var(--blue);}
@media(min-width:540px){.statband-4{grid-template-columns:repeat(4,1fr);}}
/* ── Reusable help tooltip (?) — works on hover (desktop) and tap (mobile via .open) ──
   Use helpTip('plain text') in any markup. Written for leaders who didn't build the app. */
.htip{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;border:1px solid var(--blue);background:var(--chip);color:var(--blue);font-size:11px;font-weight:800;line-height:1;cursor:pointer;position:relative;padding:0;font-family:inherit;vertical-align:middle;flex:0 0 auto;}
.htip-pop{position:absolute;z-index:200;top:calc(100% + 8px);left:50%;transform:translateX(-50%);width:max-content;max-width:240px;background:#1e1b4b;color:#fff;border-radius:10px;padding:9px 11px;font-size:.74rem;line-height:1.45;font-weight:500;text-transform:none;letter-spacing:normal;text-align:left;box-shadow:0 10px 28px rgba(20,16,60,.32);opacity:0;visibility:hidden;transition:opacity .12s;white-space:normal;}
.htip-pop::before{content:"";position:absolute;bottom:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-bottom-color:#1e1b4b;}
.htip:hover .htip-pop,.htip.open .htip-pop{opacity:1;visibility:visible;}
/* Keep the bubble on-screen near the right edge (e.g. icon at end of a heading row). */
.htip.tip-left .htip-pop{left:auto;right:0;transform:none;}
.htip.tip-left .htip-pop::before{left:auto;right:6px;transform:none;}
/* On/off toggle switch (admin Settings login locks). */
.tglrow{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 0;border-top:1px solid var(--line);}
.tglrow .tgl-l{font-weight:700;display:flex;align-items:center;gap:6px;}
.tglrow .sub{margin-top:2px;}
.tgl{position:relative;display:inline-flex;flex:0 0 auto;width:46px;height:26px;}
.tgl input{position:absolute;opacity:0;width:100%;height:100%;margin:0;cursor:pointer;z-index:1;}
.tgl .track{position:absolute;inset:0;background:#cbd2e0;border-radius:999px;transition:background .15s;}
.tgl .track::before{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:transform .15s;}
.tgl input:checked+.track{background:var(--blue);}
.tgl input:checked+.track::before{transform:translateX(20px);}
.selrow{display:flex;gap:8px;margin-bottom:12px;}.selrow>div{flex:1;}.selrow label{margin-top:0;}
.lead-tag{font-size:var(--t-micro);font-weight:800;background:var(--chip);color:#6d28d9;border-radius:6px;padding:1px 6px;margin-left:6px;vertical-align:middle;}
.gradepill{font-size:var(--t-micro);font-weight:800;background:#eef2f8;color:#475569;border-radius:6px;padding:1px 6px;margin-left:6px;vertical-align:middle;}
.err{background:#fde2e1;color:#7f1d1d;border-radius:10px;padding:9px 12px;font-size:var(--t-sm);margin-top:8px;display:none;}
/* Login is white-background / purple-text to match the in-app theme (was dark gradient). */
#login{position:absolute;inset:0;background:#fff;display:flex;flex-direction:column;justify-content:center;padding:28px;z-index:60;}
#login h1{color:var(--violet);font-size:1.85rem;text-align:center;margin-bottom:5px;letter-spacing:-.03em;font-weight:800;}
#login p{color:var(--purple);text-align:center;font-size:var(--t-sm);margin-bottom:22px;font-weight:600;}
#login .card{background:#fff;border:1px solid var(--line);box-shadow:0 14px 40px rgba(124,58,237,.12);border-radius:20px;}
.quick{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.quick button{flex:1;min-width:44%;border:1px solid var(--line);background:var(--chip);color:var(--violet-d,#6d28d9);border-radius:12px;padding:9px 8px;font-size:var(--t-xs);cursor:pointer;font-weight:700;font-family:inherit;transition:background .12s;}
.quick button:active{background:var(--lav,#ede9fe);}
/* ── At-camp preview banner ── */
#previewBanner{display:none;background:linear-gradient(90deg,#92400e,#b45309);color:#fff;
  padding:max(8px,env(safe-area-inset-top)) 14px 8px;font-size:var(--t-xs);font-weight:700;
  flex:none;z-index:19;align-items:center;gap:10px;}
#previewBanner.show{display:flex;}
/* When the preview banner is showing it becomes the topmost element and owns the
   safe-area inset, so the header below it must NOT also reserve the notch space
   (that double-padding pushed the banner content down over the Dynamic Island). */
#previewBanner.show + .bar{padding-top:14px;}
#previewBanner .pb-label{flex:1;letter-spacing:.03em;}
#previewBanner .pb-exit{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);
  color:#fff;border-radius:999px;padding:4px 12px;font-size:var(--t-xs);font-weight:800;
  cursor:pointer;white-space:nowrap;font-family:inherit;}
#previewBanner .pb-exit:active{background:rgba(255,255,255,.35);}
/* Wide-nav element is hidden on phone; shown only inside the 980px breakpoint */
.wide-nav{display:none;}
/* ===== Continuous responsive progression (A2/A3/A4) =====
   Replaces the old single-jump-at-980 behaviour. Below the 980px sidebar threshold the
   single-column shell now WIDENS with the viewport (was a fixed 460px strip — the owner's
   "every screen is phone-fixed" complaint) and the gutter grows. Grids that were flex/2-col
   gain columns progressively. The 980px block below remains the "switch to sidebar nav"
   point only. Everything here is additive; phone (<540px) is unchanged. */
@media(min-width:540px){
  .app{max-width:600px;}
  :root{--pad:18px;}
  .statband{flex-wrap:wrap;}
  .selrow{flex-wrap:wrap;}
}
@media(min-width:768px){
  html{font-size:17px;}              /* A1: bump root → all rem text grows ~6% */
  .app{max-width:720px;}
  :root{--pad:22px;}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}   /* enabled below sidebar too */
}
@media(min-width:900px){
  .app{max-width:820px;}
}
/* ===== Wide layout (≥980px) — strictly additive =====
   NOTE: the shell markup uses class="app" / id="bar" / id="stage", so the grid targets
   #app (added to the .app div), #bar (the header), and #stage (the content area). An
   earlier markup rebuild left these selectors as #header/#main, which matched nothing,
   so the desktop grid silently never activated (app stayed a 460px phone column). */
@media(min-width:980px){
  /* Full-width on large screens (owner: no centred bars on a 1080p display) — the cap
     and auto-margins were leaving ~160px gutters each side at 1920px. */
  #app{max-width:none;margin:0;width:100%;display:grid;grid-template-columns:220px 1fr;grid-template-rows:auto 1fr;grid-template-areas:"header header" "widenav main";height:100dvh;}
  #bar{grid-area:header;background:#fff;border-bottom:1px solid var(--line);color:var(--ink);padding:10px 20px;flex-wrap:nowrap;row-gap:0;}
  #bar .ttl{flex:0 0 auto;}
  #bar .ttl .s{display:none;}
  #bar .sign-out{background:transparent;border:1px solid var(--line);color:var(--ink);}
  #bar .bk{color:var(--ink);}
  #previewBanner.show{grid-column:1 / -1;}
  #tabs{display:none;}
  #stage{grid-area:main;padding:0;}
  .wide-nav{grid-area:widenav;display:flex;flex-direction:column;gap:2px;padding:14px 10px;border-right:1px solid var(--line);background:#f9f8ff;overflow-y:auto;}
  .wide-nav-item{display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:12px;cursor:pointer;font-size:var(--t-body);font-weight:500;color:var(--ink);text-decoration:none;transition:background .12s;}
  .wide-nav-item:hover{background:var(--chip);}
  .wide-nav-item.on{background:var(--lav);color:var(--violet-d);font-weight:700;}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  /* tiles stay fluid (auto-fill, larger min) so the wide main area fills with 4+ columns
     rather than being capped at 3. */
  .tiles{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));}
  /* A6 follow-up (Phase 2): dense card lists (My Youth roster, Budget church rows) use the
     horizontal space on laptop instead of staying a single tall column. Continuous 2-up grid;
     children's own margin-bottom is folded into the grid gap. Phone/tablet keep the single
     column (this rule is inside the 980 block). A snapshot/hero placed before .wide-cards stays
     full-width because it sits OUTSIDE the grid container. */
  .wide-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:10px;align-items:start;}
  .wide-cards>*{margin-bottom:0;}
  /* Bug-9: an expanded Budget church stays in its own column (a narrow dropdown) rather than
     stretching to fill the page width. */
}
@media(min-width:1280px){
  html{font-size:18px;}              /* A1: laptop root bump → all rem text grows again */
  /* one more column for the densest lists on a wide laptop */
  .wide-cards{grid-template-columns:repeat(auto-fill,minmax(300px,1fr));}
}
/* Bug-5: a phone in LANDSCAPE is wide (≥768px) but short, so the width-based root-font bumps
   above (17/18px) made text — especially the My Youth snapshot — far too big. On a short
   landscape viewport, hold the root font at the phone size and cap the big snapshot numbers.
   Tablets/laptops (height >600px) are unaffected. Placed last so it overrides the bumps. */
@media(orientation:landscape) and (max-height:600px){
  html{font-size:15px;}
  .snap .bignum,.hero .big{font-size:var(--t-h2);}
  .gradebars{height:64px;}
}
</style>
</head>
<body>
<div class="app" id="app">
  <div id="previewBanner">
    <span class="pb-label">${ic('preview')} PREVIEW — at-camp view is read-only</span>
    <button class="pb-exit" onclick="exitPreview()">Exit preview ×</button>
  </div>
  <header class="bar" id="bar" style="display:none">
    <div id="nprog"></div>
    <div class="bk" onclick="back()">&#8249;</div>
    <div class="ttl"><span class="t" id="barT">Camp Platform</span><span class="s" id="barS"></span></div>

<script>
/* ===== API (real backend) ===== */
/* The Express backend returns results bare (no {ok,data} envelope); errors come as
   an HTTP error status with a JSON body {code,message}. 204 = no content. */
/* Resilience (ported from connection-made-simple Phase 3): every request has an
   AbortController TIMEOUT so a hung fetch (cold start / flaky signal / slow DB)
   fails FAST with a recoverable error instead of leaving the UI on an infinite
   loading screen. Imports get a longer window. Concurrent in-flight GETs for the
   same path are COALESCED so the post-login prefetch and a navigation don't
   double-fire. */
const API_TIMEOUT_MS=20000, API_IMPORT_TIMEOUT_MS=90000;
const _inflight=new Map(); // path -> Promise (GET coalescing)
/* ===== DATA CACHE (30s TTL — makes back-navigation instant; ported from
   connection-made-simple). GET results are cached; every write invalidates the
   affected resource prefixes. Pass {noCache:true} to force a fresh read. ===== */
const Cache=(()=>{const store=new Map();const TTL=30000;
  const matches=(sk,k)=>sk===k||sk.startsWith(k+'/')||sk.startsWith(k+'?');
  return{
    get(k){const e=store.get(k);return(e&&Date.now()-e.ts<TTL)?e.data:null;},
    getStale(k){const e=store.get(k);return e?e.data:null;},
    set(k,d){store.set(k,{data:d,ts:Date.now()});},
    del(...keys){for(const k of keys){for(const sk of[...store.keys()]){if(matches(sk,k))store.delete(sk);}}},
    clear(){store.clear();}
  };})();
function _allCached(...paths){return paths.every(p=>Cache.get(p)!==null);}
// Map a write path to the cached resources it makes stale. /home aggregates almost
// everything, so any write drops it.
function _invalidate(path){
  // B-4 (Phase 5): drop only the resources a write genuinely makes stale. /home is the
  // aggregate view, so it's ALWAYS cleared — that keeps correctness even as the per-path
  // mappings are narrowed below.
  Cache.del('/home');
  if(path.startsWith('/import')){
    // An import rewrites the people set → registrants/campers + the allocation pool +
    // the check-in roster derive from it. Unrelated caches (faq/devotional/notifications/
    // schedule) are NOT touched (was a full Cache.clear() — needless re-fetch churn).
    Cache.del('/registrants','/campers','/accommodation','/checkin');
  }
  else if(path.startsWith('/accounts'))Cache.del('/accounts','/registrants');
  // Check-in SESSIONS derive from settings.checkInDays, so a settings write can change them →
  // clear /checkin. Schedule is de-linked from check-in (see CLAUDE.md "Daily check-in"), so a
  // settings write no longer clears /schedule.
  else if(path.startsWith('/settings'))Cache.del('/settings','/checkin');
  // A schedule write is independent of check-in (de-linked) → clear only /schedule.
  else if(path.startsWith('/schedule'))Cache.del('/schedule');
  else if(path.startsWith('/attendance')||path.startsWith('/checkin'))Cache.del('/checkin');
  else if(path.startsWith('/notifications'))Cache.del('/notifications');
  else if(path.startsWith('/notes'))Cache.del('/notes');
  // A per-student edit (adminStudents) can touch an ARRIVED student too — campers +
  // the check-in roster derive from the same person record.
  else if(path.startsWith('/registrants'))Cache.del('/registrants','/campers','/checkin');
  else if(path.startsWith('/accommodation'))Cache.del('/accommodation');
  else Cache.del(path);
}
/* Top loading bar (#nprog) driver. Reference-counted so overlapping fetches (e.g. a parallel
   Promise.all) hold the bar until the LAST one finishes. It creeps toward 90% while in flight,
   then snaps to 100% and fades — classic "nprogress" feel. Only real network requests call this
   (from _doFetch); cached GETs never reach here, so instant navigations don't flash the bar. */
let _npCount=0,_npTimer=null,_npVal=0,_npFadeTimer=null,_npResetTimer=null;
function _npStart(){
  _npCount++;
  if(_npCount>1)return;
  const el=document.getElementById('nprog');if(!el)return;
  // A fade-out/reset from the immediately-previous cycle can still be queued (setTimeout)
  // when a new request starts right after the last one finished — cancel it so it can't
  // yank opacity/width out from under this new cycle (was causing a visible flash or the
  // bar snapping backward partway through a load).
  clearTimeout(_npFadeTimer);clearTimeout(_npResetTimer);
  _npVal=8;el.classList.add('on');el.style.width=_npVal+'%';
  clearInterval(_npTimer);
  _npTimer=setInterval(()=>{_npVal+=Math.max(0.4,(90-_npVal)*0.09);if(_npVal>=90){_npVal=90;}el.style.width=_npVal+'%';},170);
}
function _npDone(){
  if(_npCount>0)_npCount--;
  if(_npCount>0)return;
  const el=document.getElementById('nprog');if(!el)return;
  clearInterval(_npTimer);_npTimer=null;
  el.style.width='100%';
  _npFadeTimer=setTimeout(()=>{
    if(_npCount===0)el.classList.remove('on');
    _npResetTimer=setTimeout(()=>{if(_npCount===0)el.style.width='0';},320);
  },180);
}
async function _doFetch(path,opt){
  _npStart();
  try{
  const isImport=path.indexOf('/import')===0||path.indexOf('/import')===path.length-7;
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),isImport?API_IMPORT_TIMEOUT_MS:API_TIMEOUT_MS);
  let res;
  try{
    res=await fetch(path,{method:opt.method||'GET',signal:ctrl.signal,
      headers:{'Content-Type':'application/json',...(TOKEN?{Authorization:'Bearer '+TOKEN}:{})},
      ...(opt.body!==undefined?{body:JSON.stringify(opt.body)}:{})});
  }catch(e){
    if(e&&e.name==='AbortError')throw new Error('Request timed out — check your connection and try again.');
    throw new Error('Network error — is the server running?');
  }finally{clearTimeout(timer);}
  if(res.status===401&&TOKEN){sessionExpired();throw new Error('Session expired — please sign in again.');}
  if(res.status===204)return null;
  let j=null;try{j=await res.json();}catch(e){j=null;}
  if(!res.ok)throw new Error((j&&(j.message||j.error))||('Request failed ('+res.status+')'));
  return j;
  }finally{_npDone();}
}
async function api(path,opt={}){
  const method=(opt.method||'GET').toUpperCase();
  if(method!=='GET'){
    if(PREVIEW_MODE){toast('Preview mode — sign-in actions are disabled');throw new Error('Preview mode — read only');}
    const r=await _doFetch(path,opt);
    _invalidate(path); // a write invalidates the resources it touched
    return r;
  }
  if(!opt.noCache){const cached=Cache.get(path);if(cached!==null)return cached;}
  if(_inflight.has(path))return _inflight.get(path);
  const p=_doFetch(path,opt)
    .then(d=>{if(!opt.noCache&&d!==null)Cache.set(path,d);return d;})
    .finally(()=>_inflight.delete(path));
  _inflight.set(path,p);
  return p;
}

function helpTip(text,opts){const o=opts||{};return `<button type="button" class="htip${o.left?' tip-left':''}" aria-label="Help: ${esc(text)}" onclick="_toggleTip(event,this)">?<span class="htip-pop">${esc(text)}</span></button>`;}

// position, measures, then nudges horizontally so neither edge runs past the viewport (8px margin).

function _clampTip(btn){const pop=btn.querySelector('.htip-pop');if(!pop)return;

}

// Real (non-preview) current camp day number, 1-based, from the actual check-in day dates —
// today's day if camp is underway, day 1 before camp starts, the last day after it ends.
function _realCampDayNumber(){
  const days=(SETTINGS&&SETTINGS.checkInDays)||[];
  if(!days.length)return 1;
  const sorted=[...days].sort();
  const today=new Date().toISOString().slice(0,10);
  let idx=sorted.findIndex(d=>d>=today);
  if(idx===-1)idx=sorted.length-1;
  return idx+1;
}

// B-3: apply a mode change detected from ANOTHER tab (storage event) or on tab re-focus.
// Mirrors what RENDER.home does on mode change, with the same PREVIEW_MODE guard (a previewing
// user must never be snapped out). If the current screen no longer exists in the new mode's nav,
// navigate home so the user isn't stranded on a dead screen.
function _applyModeChange(mode){
  if(!ACTOR||PREVIEW_MODE||!mode||mode===CAMP_MODE)return;
  CAMP_MODE=mode;
  if(SETTINGS)SETTINGS.campMode=mode;
  SESSIONS=[];SEL_SESSION=null; // mode-specific data must be refetched

  const owner=TAB_OF[cur]||cur;
  if(!tabs.has(owner)){STACK=['home'];gotoTab('home');}

  admin:'admin',adminAccounts:'admin',adminFaq:'admin',adminSettings:'admin',adminAccom:'admin',adminData:'admin',
  adminDevos:'admin',adminFaqEdit:'admin',adminSchedEdit:'admin',adminContacts:'admin',

  checkin:'checkin',search:'search',allstudents:'allstudents',records:'records',notifs:'notifs',compose:'notifs',
  data:'data',
  camper:'home',myyouth:'home',firstday:'home',schedule:'schedule',devotional:'home',faq:'home',notes:'home',testimonies:'home',budget:'home',accom:'home',import:'home'};

function _showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el=document.getElementById(id);if(el)el.classList.add('active');
  document.getElementById('bar').classList.toggle('canback',STACK.length>1);
  const tab=TAB_OF[id];
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',!!(tab&&t.dataset.tab===tab)));
}
function _paint(id,html,t,s){
  document.getElementById('barT').textContent=t;
  document.getElementById('barS').textContent=s||'';}
  
/* Navigation core (ported resilience from CMS Phase 5/8):
   - shows the target screen with a SPINNER immediately, so a slow RENDER never
     leaves the UI on a blank/stale screen ("pre-loading screen");
   - issues a nav token so a RENDER that finishes after the user has navigated
     away can bail via _stale() instead of overwriting the new screen
     ("stuck spinner / wrong page" guard). */
let _navToken=0, _navId=null;
function _stale(tok){return tok!==_navToken;}
function _spinner(id,label){
  const el=document.getElementById(id);
  if(el){el.innerHTML='<div class="loading"><div class="spin"></div><div class="lt">'+(label||'Loading…')+'</div></div>';el.scrollTop=0;}
  _showScreen(id);
}
async function _navTo(id,arg){
  const tok=++_navToken; _navId=id;
  // Stale-while-revalidate: if this screen already holds its previous render, show it
  // instantly and let RENDER repaint when (cached, usually instant) data arrives —
  // no spinner flash on revisits. Only first visits (empty screen) get a spinner.
  const el=document.getElementById(id);
  const hasContent=el&&el.innerHTML.trim()!==''&&!el.querySelector('.loading');
  if(hasContent)_showScreen(id);else _spinner(id);
  try{ if(RENDER[id]) await RENDER[id](arg,tok); }
  catch(e){ if(!_stale(tok)) { const el2=document.getElementById(id); if(el2)el2.innerHTML='<p class="note-hint">'+esc(e.message||'Something went wrong')+'</p>'; } }
}
async function go(id,arg){STACK.push(id);await _navTo(id,arg);}
async function gotoTab(id){
  // Phase 4: firstAid has no 'home' tab — its landing is Search. Redirect any home navigation
  // (incl. the post-login gotoTab('home')) so the role lands on its real first screen.
  if(id==='home'&&ACTOR&&ACTOR.role==='firstAid')id='search';
  const keepHome=['checkin','search','notifs'];
  STACK=keepHome.includes(id)?['home',id]:[id];
  await _navTo(id);
}
async function back(){if(STACK.length>1){STACK.pop();const id=STACK[STACK.length-1];await _navTo(id);}}

function paint(id,html,t,s){
  // Stale-render guard: if the user has navigated to a DIFFERENT screen while this
  // render was awaiting, don't overwrite it. (id===_navId means this is still the
  // active target — including same-screen re-renders.)
  if(_navId&&_navId!==id&&!STACK.includes(id))return;
  _paint(id,html,t,s);
  const el=document.getElementById(id);
  if(el){
    // D5 (scroll preservation): a SAME-SCREEN re-paint (the screen is already visible and
    // had content) keeps the current scroll position — opening a dropdown / re-rendering a
    // filtered list must not jump to top. A fresh navigation (screen not active, or empty)
    // resets to top. This subsumes the manual save/restore in the _r* re-loaders.
    const samePaint=el.classList.contains('active')&&el.innerHTML.trim()!==''&&!el.querySelector('.loading');
    const keepY=samePaint?el.scrollTop:0;
    el.innerHTML=html;
    el.scrollTop=keepY;
  }
  _showScreen(id);
  _renderWideNav(id);
}
/* ── Single nav source (D3) ──────────────────────────────────────────────────
   navModel(role, mode) is the ONE source of truth for navigation. It returns:
     { tabs:[{id,icon,label}], extras:[{id,icon,label}] }
   - `tabs`   = the bottom-nav set for this role×mode (matches debug.md "Role × mode").
   - `extras` = extra items shown only in the desktop sidebar (admin/director sub-screens).
   Both buildTabs() (bottom nav) and _renderWideNav() (sidebar) derive from this, so the two
   can never drift apart again (fixes the empty church/zoneLeader sidebar — CH-1/D1 — and the
   broken admin at-camp sidebar — AC-5/D2). The sidebar list = tabs ++ extras, in order. */
function navModel(role,mode){
  const T=(id,icon,label)=>({id,icon,label});
  if(role==='firstAid'){
    // Phase 4: Search is the home (finding a student is the whole job); Records = the first-aider's
    // logged actions; Schedule kept (owner). Medical Watch removed.
    return {tabs:[T('search','search','Search'),T('allstudents','users','All Students'),T('records','note','Records'),T('schedule','clock','Schedule')],extras:[]};
  }
  if(mode==='pre-camp'){
    if(role==='church'||role==='zoneLeader')
      return {tabs:[T('home','home','Home'),T('people','users','My Youth'),T('help','help','Help'),T('notifs','bell','Notices')],extras:[]};
    if(role==='director')
      return {tabs:[T('home','home','Home'),T('people','users','My Youth'),T('data','note','Data'),T('help','help','Help'),T('notifs','bell','Notices')],
              extras:[T('budget','star','Budget & Costings'),T('accom','classroom','Accommodation Allocations')]};
    /* admin pre-camp */
    return {tabs:[T('home','home','Home'),T('people','users','My Youth'),T('data','note','Data'),T('notifs','bell','Notices'),T('admin','gear','Admin')],
            extras:[T('budget','star','Budget & Costings'),T('accom','classroom','Accommodation Allocations')]};
  }
  /* at-camp */
  if(role==='church'||role==='zoneLeader')
    return {tabs:[T('home','home','Home'),T('checkin','check','Check-in'),T('search','search','Search'),T('notifs','bell','Notices')],extras:[]};
  if(role==='director')
    return {tabs:[T('home','home','Home'),T('checkin','check','Check-in'),T('search','search','Search'),T('notifs','bell','Notices')],
            extras:[T('notes','note','Notes')]};
  /* admin at-camp — D2/AC-5: exactly these 6 in the sidebar, in this order.
     Bottom tabs keep Admin (not Notices) to fit 4 slots; the sidebar shows the full 6. */
  return {tabs:[T('home','home','Home'),T('checkin','check','Check-in'),T('search','search','Search'),T('admin','gear','Admin')],
          extras:[T('notifs','bell','Notices'),T('accom','classroom','Accommodation Allocations')]};
}
/* Sidebar order for admin at-camp must be exactly:
   Home, Check In, Search, Notices, Accommodation Allocations, Admin Settings (D2).
   tabs=[Home,Check-in,Search,Admin] ++ extras=[Notices,Accommodation] would mis-order, so the
   sidebar uses a dedicated order for that one case below. */
function navSidebar(role,mode){
  const m=navModel(role,mode);
  if(role==='admin'&&mode==='at-camp'){
    const T=(id,icon,label)=>({id,icon,label});
    return [T('home','home','Home'),T('checkin','check','Check In'),T('search','search','Search'),
            T('notifs','bell','Notices'),T('accom','classroom','Accommodation Allocations'),T('admin','gear','Admin Settings')];
  }
  return [...m.tabs,...m.extras];
}
function _renderWideNav(activeId){
  let nav=document.getElementById('wideNav');
  if(!nav){
    nav=document.createElement('div');nav.id='wideNav';nav.className='wide-nav';
    const app=document.getElementById('app');if(!app)return;
    // Insert before the content area (#stage) so the sidebar takes the widenav grid cell.
    const stage=document.getElementById('stage');if(stage)app.insertBefore(nav,stage);else app.appendChild(nav);
  }
  if(!ACTOR){nav.innerHTML='';return;}
  const items=navSidebar(ACTOR.role,CAMP_MODE);
  const ids=new Set(items.map(i=>i.id));
  // D4: highlight the sidebar item that OWNS the active screen. If the screen is itself a
  // sidebar item (e.g. budget/accom/notes — which TAB_OF folds under 'home' for the bottom
  // bar), prefer it; otherwise fall back to TAB_OF's owner, then the id itself.
  const ownerOf=ids.has(activeId)?activeId:((typeof TAB_OF!=='undefined'&&TAB_OF[activeId])||activeId);
  nav.innerHTML=items.map(item=>
    `<div class="wide-nav-item${ownerOf===item.id?' on':''}" onclick="go('${item.id}')">${ic(item.icon)}<span>${esc(item.label)}</span></div>`
  ).join('');
  // Ctrl+S on wide saves settings when on the settings screen
  if(!window._ctrlSListener){
    window.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='s'&&ACTOR?.role==='admin'){e.preventDefault();if(typeof saveSettings==='function')saveSettings();}});
    window._ctrlSListener=true;
  }
}

function buildTabs(){
  // D3: bottom tabs derive from the single nav source (navModel). When no ACTOR yet
  // (pre-login), render nothing — the shell is hidden until login anyway.
  if(!ACTOR){document.getElementById('tabs').innerHTML='';return;}
  const items=navModel(ACTOR.role,CAMP_MODE).tabs;
  document.getElementById('tabs').innerHTML=items.map(t=>
    `<button class="tab" data-tab="${t.id}" onclick="gotoTab('${t.id}')"><span class="ic">${ic(t.icon)}</span>${t.label}</button>`
  ).join('');
}

// Displays AU mobile numbers consistently (e.g. CSV imports that dropped the leading 0
// via spreadsheet numeric coercion show "411928301" — this reformats to "0411 928 301").
// Anything that isn't a recognisable 9/10-digit AU mobile (incl. masked contact numbers
// like "0411****01") passes through unchanged.
function fmtPhone(phone){
  if(!phone)return phone||'';
  let d=String(phone).replace(/\D/g,'');
  if(d.length===11&&d.startsWith('61'))d='0'+d.slice(2);
  else if(d.length===9&&d.startsWith('4'))d='0'+d;
  if(d.length===10&&d.startsWith('04'))return d.slice(0,4)+' '+d.slice(4,7)+' '+d.slice(7);
  return phone;
}
function telLink(phone){
  if(!phone)return esc(phone||'');
  return `<a href="tel:${esc(phone)}" style="color:#4f46e5">${esc(fmtPhone(phone))}</a>`;
}

// Optimistic check-in queue — queued writes drain in order, survive brief offline.
const CHECKIN_QUEUE=[];let _draining=false,_onlineHandlerAdded=false;
let _undoTimer=null,_undoCamperId=null,_undoType=null;
let _lastRoster=null;
// B-1 (Phase 5): count entries that were hard-dropped on an ONLINE error (4xx etc.) so the
// check-in screen can surface a "N didn't save" banner. We deliberately keep the existing
// drop-on-error + no-persistence behaviour (owner chose "banner only") — this makes the loss
// VISIBLE and prompts a re-tap, it does not silently reconstruct lost taps.
let _checkinFailed=0;

function _queueEntry(camperId,type){
  CHECKIN_QUEUE.push({camperId,type,sessionId:SEL_SESSION});
  _updateSyncDots(camperId,'pending');
  if(!_draining)drainQueue();
  if(!_onlineHandlerAdded){window.addEventListener('online',drainQueue);_onlineHandlerAdded=true;}
}
async function drainQueue(){
  if(_draining)return;_draining=true;
  while(CHECKIN_QUEUE.length>0){
    const entry=CHECKIN_QUEUE[0];
    try{
      await api('/checkin',{method:'POST',body:{camperId:entry.camperId,sessionId:entry.sessionId,type:entry.type}});
      CHECKIN_QUEUE.shift();_markSynced(entry.camperId);
    }catch(e){
      if(!navigator.onLine)break; // wait for online event
      CHECKIN_QUEUE.shift();_markSynced(entry.camperId,'error');_checkinFailed++; // B-1: surface in the banner
    }
  }
  _draining=false;
  await RENDER.checkin();
}
function _updateSyncDots(camperId,state){
  document.querySelectorAll('.sync-dot[data-id="'+camperId+'"]').forEach(el=>{el.className='sync-dot '+state;});
}
function _markSynced(camperId,state='synced'){_updateSyncDots(camperId,state);}
function _optimisticState(camperId,roster,queue){
  const pending=queue.filter(e=>e.camperId===camperId);
  if(!pending.length)return roster.find(r=>r.id===camperId)?.present??false;
  return pending[pending.length-1].type==='in';
}
// B-1: clear the failed badge and re-attempt any entries still queued. We do NOT reconstruct
// dropped taps (no persistence by design) — the toast tells the user to re-tap red rows.
function _retryFailedCheckins(){
  _checkinFailed=0;
  if(CHECKIN_QUEUE.length)drainQueue();else RENDER.checkin();
  toast('Re-tap any row still marked red to check them in');
}

    <p class="note-hint">Tap a row to check in/out. Notes visible to zone leaders &amp; directors only.</p>`;

function _performCheck(camperId,type,name){
  // Check-out no longer asks for confirmation — reaching this point already required
  // actively opening the "Done" section and tapping the row, which is deliberate enough.
  // Optimistic flip
  _queueEntry(camperId,type);
  // Start undo window
  clearTimeout(_undoTimer);_undoCamperId=camperId;_undoType=type;
  _undoTimer=setTimeout(()=>{_undoCamperId=null;_hideUndoToast();},4000);
  // Immediate local re-render
  RENDER.checkin();
}
function _showUndoToast(type){
  let el=document.getElementById('undoToast');
  if(!el){el=document.createElement('div');el.id='undoToast';el.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;border-radius:10px;padding:10px 18px;display:flex;align-items:center;gap:10px;z-index:9999;font-size:.9rem';document.body.appendChild(el);}
  el.innerHTML=`${icSm('check')} ${type==='out'?'Checked out':'Checked in'} <button onclick="undoCheck()" style="background:#4f46e5;color:#fff;border:none;border-radius:8px;padding:5px 11px;cursor:pointer;font-size:.85rem;font-family:inherit;font-weight:700">Undo</button>`;
  el.style.display='flex';
}
function _hideUndoToast(){const el=document.getElementById('undoToast');if(el)el.style.display='none';}
function undoCheck(){
  clearTimeout(_undoTimer);
  const id=_undoCamperId,type=_undoType;
  _undoCamperId=null;_undoType=null;_hideUndoToast();
  if(!id)return;
  // Remove from queue if still pending
  const idx=CHECKIN_QUEUE.findIndex(e=>e.camperId===id);
  if(idx>=0){CHECKIN_QUEUE.splice(idx,1);RENDER.checkin();return;}
  // Already sent — send the reverse
  _queueEntry(id,type==='in'?'out':'in');
}

/* Parse a first-aid record body (4 labelled lines) back into its parts for display. */
function _faParse(body){const o={problem:'',treatment:'',firstAider:'',broughtBy:''};(body||'').split('\n').forEach(line=>{
  const m=line.match(/^(Problem|Treatment|First-aider|Brought by):\s*(.*)$/i);if(!m)return;
  const k=m[1].toLowerCase();const v=m[2];
  if(k==='problem')o.problem=v;else if(k==='treatment')o.treatment=v;else if(k==='first-aider')o.firstAider=v;else if(k==='brought by')o.broughtBy=v;});
  return o;}

function drawFaRecords(){
  const box=document.getElementById('faRecList');if(!box)return;

/* ===== BUDGET (director/admin) =====
   Tent/classroom prices come from Camp settings; the backend has no fee-tier, so every
   camper is charged the full price for their accommodation kind. */
/* ===== BUDGET & COSTINGS (rebuilt — brief §5) =====
   Costs come from per-registrant `registrationCost` (the CSV `Cost`), NOT from settings.
   A category = a distinct cost value within a (church, audience) scope; null cost =
   "Cost not recorded" (counted, flagged, $0 to totals — never dropped). Grand total
   reconciles exactly to the sum of every line total. This mirrors the pure helper
   src/services/budget.ts (the canonical, unit-tested algorithm). */
function _money(n){return '$'+Number(n||0).toLocaleString('en-AU',{maximumFractionDigits:2});}
function _budLabel(amount,full){
  if(amount==null)return 'Cost not recorded';
  if(amount===0)return 'Sponsored — '+_money(0);
  if(full!=null&&amount===full)return 'Full — '+_money(amount);
  if(full!=null&&full>0&&Math.abs(amount-full/2)<1)return 'Half — '+_money(amount);
  return 'Part — '+_money(amount);
}
function _budScopeRows(people,full){
  const by=new Map();
  people.forEach(p=>{const k=p.registrationCost==null?'null':String(p.registrationCost);
    let r=by.get(k);if(!r){r={amount:p.registrationCost==null?null:p.registrationCost,count:0,codes:new Map()};by.set(k,r);}
    r.count++;const c=(p.discountCode||'').trim();if(c)r.codes.set(c,(r.codes.get(c)||0)+1);});
  const rows=[...by.values()].map(r=>{let hint=null;if(r.codes.size===1){const [code,n]=[...r.codes.entries()][0];if(n===r.count)hint=code;}
    return {amount:r.amount,count:r.count,lineTotal:(r.amount||0)*r.count,unrecorded:r.amount==null,codeHint:hint};});
  rows.sort((a,b)=>a.amount==null?1:b.amount==null?-1:b.amount-a.amount);
  return rows;
}
function computeBudgetClient(regs,filterId){
  const people=(regs||[]).filter(r=>r.status!=='cancelled').filter(r=>!filterId||filterId==='all'||r.churchId===filterId)
    .map(r=>({churchId:r.churchId,churchName:r.churchName,kind:r.kind==='leader'?'leader':'camper',registrationCost:r.registrationCost==null?null:Number(r.registrationCost),discountCode:r.discountCode}));
  let full=null;people.forEach(p=>{if(p.registrationCost!=null&&p.registrationCost>0)full=full==null?p.registrationCost:Math.max(full,p.registrationCost);});
  const byChurch=new Map();
  people.forEach(p=>{let c=byChurch.get(p.churchId);if(!c){c={churchId:p.churchId,churchName:p.churchName,campers:[],leaders:[]};byChurch.set(p.churchId,c);}
    (p.kind==='leader'?c.leaders:c.campers).push(p);});
  const churches=[...byChurch.values()].map(c=>{const campers=_budScopeRows(c.campers,full),leaders=_budScopeRows(c.leaders,full);
    const camperCount=campers.reduce((s,r)=>s+r.count,0),leaderCount=leaders.reduce((s,r)=>s+r.count,0);
    const total=campers.reduce((s,r)=>s+r.lineTotal,0)+leaders.reduce((s,r)=>s+r.lineTotal,0);
    return {churchId:c.churchId,churchName:c.churchName,camperCount,leaderCount,total,campers,leaders};});
  churches.sort((a,b)=>a.churchName.localeCompare(b.churchName));
  return {grandTotal:churches.reduce((s,c)=>s+c.total,0),camperCount:churches.reduce((s,c)=>s+c.camperCount,0),
    leaderCount:churches.reduce((s,c)=>s+c.leaderCount,0),churchCount:churches.length,churches,fullAmount:full};
}
