name: CI

# Runs typecheck, tests and a dependency audit on every push / PR.
# Ready for when this folder gets its own GitHub remote (it is not a git repo yet).

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Tests
        run: npm run test
      - name: Dependency audit (high severity)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true
